components:
  schemas:
    addEndpointsNorthAmericaBase:
      title: Add North America Endpoints
      description: Add North America Endpoints.
      type: object
      properties:
        endpoints:
          type: array
          items:
            type: object
            properties:
              phoneNumber:
                type: string
                example: '+15555555555'
                pattern: ^\+(\d{11})$
              name:
                type: string
                example: Caller Name
              lang:
                type: string
                default: en
                enum:
                  - en
                  - fr
                example: en
              country:
                type: string
                example: USA
            required:
              - phoneNumber
              - name
              - country
          minItems: 1
          maxItems: 5000
    addStandardNorthAmericaEndpointsWithAddressId:
      title: Add North America Endpoints With Address ID (STANDARD)
      description: Add Standard North America Endpoints With Address ID.
