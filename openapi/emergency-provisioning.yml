openapi: 3.0.3
info:
  title: Unified Emergency Services Provisioning API
  version: 1.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-use-bandwidthcom-web-sites/
  description: >-
    The API specification for Bandwidth’s unified Emergency Services
    provisioning API.


    ## Base URL

    `https://api.bandwidth.com/api/v2`
  contact:
    email: support@bandwidth.com
    name: Bandwidth
    url: https://support.bandwidth.com
servers:
  - url: https://api.bandwidth.com/api/v2
