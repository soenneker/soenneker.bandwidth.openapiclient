    serviceActivationOrderStatusEnum:
      description: >-
        The status of the related Service Activation order if this New Number
        order had autoActivate set to true.
      type: string
      enum:
        - RECEIVED
        - PROCESSING
        - COMPLETE
        - PARTIAL
        - FAILED
        - MISSING_REQUIREMENTS
    visibleOrderStatusJson:
      enum:
        - RECEIVED
        - COMPLETE
        - PARTIAL
        - FAILED
        - BACKORDERED
        - PROCESSING
      type: string
    tnOrderHistoryResponse:
      properties:
        ResponseSelectWrapper:
          properties:
            ListOrderIdUserIdDate:
              properties:
                Links:
                  $ref: '#/components/schemas/links'
                OrderIdUserIdDate:
                  items:
                    $ref: '#/components/schemas/orderSummary'
                  type: array
                TotalCount:
                  type: integer
              type: object
          type: object
      type: object
    links:
      items:
        oneOf:
          - $ref: '#/components/schemas/selfLink'
      title: Links
      type: array
    selfLink:
      properties:
        href:
          description: URI of the link
          example: /self/uri
          type: string
        method:
          description: HTTP method to be used
          example: GET
          type: string
        rel:
          description: Specifies the relationship between this link and the resource.
          example: SelfResource
          type: string
      title: Self Link
      type: object
    orderSummary:
      properties:
        CountOfTNs:
          type: integer
        CustomerOrderId:
          type: string
          description: >-
            The customer-defined reference ID for this order, if one was
            provided at creation. Not unique — Bandwidth applies no uniqueness
            constraint, so multiple orders may share the same value. Each order
            has a distinct Bandwidth-assigned `orderId`.
        LastModifiedNote:
          $ref: '#/components/schemas/note'
        OrderDate:
          type: string
        OrderId:
          type: string
        OrderStatus:
          type: string
        OrderType:
          type: string
        SuppCount:
          type: integer
        TelephoneNumberDetails:
          $ref: '#/components/schemas/telephoneNumberDetails'
        VoiceIntegrationIds:
          $ref: '#/components/schemas/voiceIntegrationIds'
        BulkNumberSyncId:
          $ref: '#/components/schemas/bulkNumberSyncId'
        Tags:
          $ref: '#/components/schemas/phoneNumberTagsXml'
        accountId:
          type: integer
        lastModifiedDate:
          type: string
        userId:
          type: string
      type: object
    telephoneNumberDetails:
      properties:
        Cities:
          items:
            $ref: '#/components/schemas/cityWithCount'
          type: array
          xml:
            wrapped: true
        RateCenters:
          items:
            $ref: '#/components/schemas/rateCenterWithCount'
          type: array
          xml:
            wrapped: true
        States:
          items:
            $ref: '#/components/schemas/stateWithCount'
          type: array
          xml:
            wrapped: true
        Tiers:
          items:
            $ref: '#/components/schemas/tiers'
          type: array
          xml:
            wrapped: true
        Vendors:
          items:
            $ref: '#/components/schemas/vendors'
          type: array
          xml:
            wrapped: true
      type: object
    note:
      properties:
        Note:
          properties:
            Description:
              description: This is the Order Note description.
              type: string
            Id:
              description: >-
                This is the Order Note identifier that is automatically
                generated by system.
              type: string
            LastDateModifier:
              description: This is the date when Order Note was last modified.
              type: string
            UserId:
              description: >-
                The UserId is authenticated for access to the network via a
                username string. It is required for UserId to match the
                logged-in user when making a new note.
              type: string
          type: object
      type: object
    vendors:
      properties:
