openapi: 3.0.1
info:
  title: Number Acquisition
  description: >-
    Bandwidth's Number Acquisition API


    This API provides endpoints to order phone numbers via a New Number Order
    and to import previously acquired telephone numbers into an account via an
    Import to Account Orders order.
  contact:
    name: Bandwidth
    url: https://dev.bandwidth.com/apis/numbers-apis/number-acquisition/
    email: support@bandwidth.com
  version: 1.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-service/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
security:
  - Basic: []
  - Bearer: []
paths:
  /accounts/{accountId}/orders:
    get:
      description: >-
        Retrieve order IDs and order details for previously attempted new phone
        number orders. A maximum of 1,000 orders can be retrieved per request.
        If no date range or specific query parameter (marked by <b
        class="required">*</b> below) is provided, the order results will be
        limited to the last two years.

        <p>This request will return a list of the orders that match the criteria
        imposed by the provided query parameters.  The orders list contains a
        detailed description of each order.  Notice that the first elements of
        the payload provide link information that can be used to page through a
        paginated list of orders.  Pagination can be controlled by use of the
        size and page query parameters.</p>

        <p>This order returns a <code>204: No Content</code> when the endpoint
        finds no results matching the parameters provided.</p>
      operationId: listNewPhoneNumberOrders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/requiredPageQueryParam'
        - $ref: '#/components/parameters/requiredSizeQueryParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
        - $ref: '#/components/parameters/customerOrderIdQueryParam'
        - $ref: '#/components/parameters/newPhoneNumberOrderStatusQueryParam'
        - $ref: '#/components/parameters/userIdQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/listNewPhoneNumberOrders200Response'
        '204':
          $ref: '#/components/responses/listNewPhoneNumberOrders204Response'
        '400':
          $ref: '#/components/responses/listNewPhoneNumberOrders400Response'
      summary: List New Number Orders
      tags:
        - New Number Orders
    post:
      description: >-
        <span>A POST to the /orders resource is used to request that the system
        provide one or more phone number(s) for use by the account. The post
        creates a new number order record to preserve the request, as well as
        the response of the Bandwidth App API to the request.  A well-formed
        POST on the /orders resource will create an order record, and return an
        order ID string that can be used to uniquely identify the new number
        order request. 


        Capabilities that are not universally available are defined in the table
        below. The following request schemas and parameters are only allowed for
        numbers from specific region/country:

        | Number Region | Request Object Type | Request Parameter |

        |:--------------|:------------------|------------------|

        |NANP|rateCenterSearchAndOrderType|-|

        |NANP|areaCodeSearchAndOrderType|-|

        |NANP|npaNxxSearchAndOrderType|-|

        |NANP|tollFreeWildCharSearchAndOrderType|-|

        |NANP|tollFreeVanitySearchAndOrderType|-|

        |NANP|lataSearchAndOrderType|-|

        |NANP|zipSearchAndOrderType|-|

        |NANP|citySearchAndOrderType|-|

        |NANP|stateSearchAndOrderType|-|

        |NANP|combinedSearchAndOrderType|-|

        |NANP|-|backOrderRequested|

        |NANP|-|closeOrder|

        |NANP|-|protected TnAttribute|

        |NANP|-|reservationIdList in ExistingTelephoneNumberOrderType schema|


        <p>Please visit <a
        href='/docs/numbers/guides/searchingForNumbers/'>Guides and
        Tutorials</a> to learn more.</p>
      operationId: createNewPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/createNewPhoneNumberOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/createNewPhoneNumberOrder201Response'
        '400':
          $ref: '#/components/responses/createNewPhoneNumberOrder400Response'
      summary: Create New Number Orders
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/totals:
    get:
      description: Retrieves a total number of phone number orders.
      operationId: getTotalOrdersByStatus
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/statusQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/newNumberOrderTotalsResponse200'
      summary: Get New Number Order Phone Number Count Totals
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}:
    get:
      description: >-
        Get all of the details associated with an identified order. <p>Please
        visit <a href='/docs/numbers/guides/searchingForNumbers/'>Guides and
        Tutorials</a> to learn more.</p>
      operationId: getNewPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
        - $ref: >-
            #/components/parameters/newPhoneNumberOrderPhoneNumberDetailQueryParam
      responses:
        '200':
          $ref: '#/components/responses/retrieveNewPhoneNumberOrder200Response'
        '404':
          $ref: '#/components/responses/retrieveNewPhoneNumberOrder404Response'
      summary: Get New Number Order Details
      tags:
        - New Number Orders
    put:
      description: >-
        For orders that support Backorder capabilities, new number orders may
        stay in backordered state while the order is filled. While in this state
        it is possible to update the modifiable fields in the record, as well as
        to request that backorder processing of the order be ended.

        The fields that can be updated are...


        <ul>

        <li>The order name</li>

        <li>The customer order ID</li>

        <li>The backordered state.</li>

        </ul>


        Specifying a &lt;CloseOrder&gt; element (XML) or "closeOrder" key (JSON)
        with a value of true will cancel the backorder request, leaving the
        currently ordered numbers on the account.  No further numbers will be
        added to the account as a result of the order.
      operationId: updateNewPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/updateNewPhoneNumberOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/updateNewPhoneNumberOrder200Response'
        '400':
          $ref: '#/components/responses/updateNewPhoneNumberOrder400Response'
        '404':
          $ref: '#/components/responses/updateNewPhoneNumberOrder404Response'
      summary: Update New Number Order
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/areaCodes:
    get:
      description: Retrieves the area codes of the phone numbers from the specified order.
      operationId: listOrderAreaCodes
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/newNumberOrderAreaCodesResponse200'
      summary: List New Number Order Area Codes [NANP]
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/history:
    get:
      description: Retrieve a full history of updates and changes associated with an order.
      operationId: getOrderHistory
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getNewNumberOrderHistoryResponse200'
        '404':
          $ref: '#/components/responses/getNewNumberOrderHistoryResponse404'
      summary: Get New Number Order History
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/notes:
    get:
      description: >-
        Retrieve all notes associated with the order.

        <p>This order returns a <code>204: No Content</code> when the endpoint
        finds no results matching the parameters provided.</p>
      operationId: listOrderNotes
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/newNumberOrderNotesGetResponse200'
        '204':
          $ref: '#/components/responses/newNumberOrderNotesGetResponse204'
      summary: List New Number Order Notes
      tags:
        - New Number Orders
    post:
      description: >-
        Add a note to an order. This causes a notification to be sent to
        Bandwidth Operations, so that they may assist as necessary. A note may
        be up to 500 characters in length.
      operationId: createOrderNote
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/postNewNumberOrderNotesRequest'
      responses:
        '201':
          $ref: '#/components/responses/newNumberOrderNotesPostResponse201'
        '400':
          $ref: '#/components/responses/newNumberOrderNotesPostResponse400'
      summary: Create New Number Order Note
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/notes/{noteId}:
    put:
      description: Update a specified note. Notes may only be updated, not deleted.
      operationId: updateOrderNote
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
        - $ref: '#/components/parameters/noteIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/putNewNumberOrderNotesRequest'
      responses:
        '200':
          $ref: '#/components/responses/putNewNumberOrderNotesResponse200'
        '400':
          $ref: '#/components/responses/putNewNumberOrderNotesResponse400'
      summary: Update New Number Order Note
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/npaNxx:
    get:
      description: Retrieves the Npa-Nxx of the phone numbers from the specified order.
      operationId: listOrderNpaNxx
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getNewNumberOrderNpaNxxResponse200'
      summary: List New Number Order Npa-Nxx [NANP]
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/tns:
    get:
      description: >-
        Returns a list of phone numbers associated with the ID of a given new
        number order.
      operationId: listOrderTns
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getNewNumberOrderTnListResponse200'
        '404':
          $ref: '#/components/responses/getNewNumberOrderTnListResponse404'
      summary: List Phone Numbers from a New Number Order
      tags:
        - New Number Orders
  /accounts/{accountId}/orders/{orderId}/totals:
    get:
      description: >-
        Retrieves the total quantity of phone numbers from the specified new
        number order.
      operationId: getOrderTotals
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getNewNumberOrderIdTotalsResponse200'
      summary: Get Quantity Of Phone Numbers In New Number Order
      tags:
        - New Number Orders
  /cities:
    get:
      description: >-
        The /cities resource returns all the cities in the indicated state that
        are supported from a coverage perspective and, if requested, that
        contain orderable inventory. The values returned indicate the names of
        the cities and, if <b>available</b> is specified, then returns the
        available inventory by city. Note that the mapping between rate center
        and city is not completely predictable because multiple cities can be
        served by a single rate center and it may take multiple rate centers to
        serve a city. The rate centers results are more predictable because they
        are defined strictly in telecommunication terms. The rate centers and
        cities API calls return information about the Bandwidth CLEC network,
        including coverage data, indicating both the extent of on-net and
        off-net coverage, as well as number availability, again from an on-net
        and off-net perspective. The rules are as follows: <ul><li>If
        supported=true is specified, then the coverage or availability is
        reported for the Bandwidth CLEC only.</li><li>If supported is omitted or
        false, then the coverage or availability is reported for the combination
        of the Bandwidth CLEC and our partners.</li><li>If available=true is
        specified, then only rate centers in which we have available numbers are
        reported.</li><li>If available is omitted or false, then all rate
        centers within the scope defined by supported will be
        returned.</li></ul>These rules apply to both the /rateCenters and
        /cities API calls. <table border="1" cellpadding="0" cellspacing="0">
        <tbody> <tr> <td valign="top"> </td> <td valign="top"> Supported = true
        </td> <td valign="top"> Supported is missing </td> </tr> <tr> <td
        valign="top"> available = true </td> <td valign="top"> Available numbers
        within the Bandwidth CLEC network </td> <td valign="top"> Available
        numbers within the Bandwidth CLEC network combined with our partner
        networks </td> </tr> <tr> <td valign="top"> available is missing </td>
        <td valign="top"> Coverage in the Bandwidth CLEC </td> <td valign="top">
        Coverage of the combined Bandwidth CLEC + Partner networks </td> </tr>
        </tbody> </table>
      operationId: listCities
      parameters:
        - $ref: '#/components/parameters/stateQueryParam'
        - $ref: '#/components/parameters/availableCityQueryParam'
        - $ref: '#/components/parameters/supportedQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/listCities200Response'
        '400':
          $ref: '#/components/responses/listCities400Response'
        '500':
          $ref: '#/components/responses/listCities500Response'
      summary: List Cities [NANP]
      tags:
        - Coverage
  /rateCenters:
    get:
      description: >-
        The rateCenters resource returns all the rate centers in the indicated
        state that are supported from a coverage perspective and, if requested,
        that contain orderable inventory. The values returned indicate the names
        of the rate centers and, if the query parameter <b>available</b> is
        specified, then returns the available inventory by rate center. The rate
        centers API call returns information about the Bandwidth CLEC network,
        including coverage data, indicating both the extent of on-net and
        off-net coverage, as well as number availability, again from an on-net
        and off-net perspective. The rules are as follows: <ul><li>If
        supported=true is specified, then the coverage or availability is
        reported for the Bandwidth CLEC only.</li><li>If supported=true is
        omitted or false, then the coverage or availability is reported for the
        combination of the Bandwidth CLEC and our partners.</li><li>If
        available=true is specified, then only rate centers in which we have
        available numbers are reported.</li><li>If available is omitted or
        false, then all rate centers within the scope defined by supported will
        be returned.</li></ul>These rules apply to both the /rateCenters and
        /cities API calls. <table border="1" cellpadding="0" cellspacing="0">
        <tbody> <tr> <td valign="top"> </td> <td valign="top"> Supported = true
        </td> <td valign="top"> Supported is missing </td> </tr> <tr> <td
        valign="top"> available = true </td> <td valign="top"> Available numbers
        within the Bandwidth CLEC network </td> <td valign="top"> Available
        numbers within the Bandwidth CLEC network combined with our partner
        networks </td> </tr> <tr> <td valign="top"> available is missing </td>
        <td valign="top"> Coverage in the Bandwidth CLEC </td> <td valign="top">
        Coverage of the combined Bandwidth CLEC + Partner networks </td> </tr>
        </tbody> </table>
      operationId: listRateCenters
      parameters:
        - $ref: '#/components/parameters/stateQueryParam'
        - $ref: '#/components/parameters/availableRateCenterQueryParam'
        - $ref: '#/components/parameters/supportedQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/listRateCenters200Response'
        '400':
          $ref: '#/components/responses/listRateCenters400Response'
        '500':
          $ref: '#/components/responses/listRateCenters500Response'
      summary: List Rate Centers
      tags:
        - Coverage
  /coveredRateCenters:
    get:
      description: >-
        The Covered Rate Centers API returns information about the Bandwidth
        CLEC network, including coverage data. This indicates the extent of
        on-net and off-net coverage, as well as number availability.
      operationId: listCoveredRateCenters
      parameters:
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/embedQueryParam'
        - $ref: '#/components/parameters/optionalStateQueryParam'
        - $ref: '#/components/parameters/abbreviationQueryParam'
        - $ref: '#/components/parameters/nameQueryParam'
        - $ref: '#/components/parameters/zipQueryParam'
        - $ref: '#/components/parameters/cityQueryParam'
        - $ref: '#/components/parameters/lataQueryParam'
        - $ref: '#/components/parameters/tierQueryParam'
        - $ref: '#/components/parameters/npaQueryParam'
        - $ref: '#/components/parameters/npaNxxQueryParam'
        - $ref: '#/components/parameters/npaNxxXQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/listCoveredRateCenters200Response'
        '204':
          $ref: '#/components/responses/listCoveredRateCenters204Response'
        '303':
          $ref: '#/components/responses/listCoveredRateCenters303Response'
        '400':
          $ref: '#/components/responses/listCoveredRateCenters400Response'
        '500':
          $ref: '#/components/responses/listCoveredRateCenters500Response'
      summary: List Covered Rate Centers
      tags:
        - Coverage
  /coveredRateCenters/{rateCenterId}:
    get:
      description: Get information about a covered rate center by ID.
      operationId: getCoveredRateCenter
      parameters:
        - $ref: '#/components/parameters/rateCenterIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getCoveredRateCenter200Response'
        '404':
          $ref: '#/components/responses/getCoveredRateCenter404Response'
      summary: Get Covered Rate Center
      tags:
        - Coverage
  /accounts/{accountId}/availableNpaNxx:
    get:
      description: Retrieves a list of available Npa-Nxx phone numbers.
      operationId: getAvailableNpaNxx
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/areaCodeQueryParam'
        - $ref: '#/components/parameters/optionalStateQueryParam'
        - $ref: '#/components/parameters/quantityQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/getAvailableNpaNxx200Response'
        '400':
          $ref: '#/components/responses/getAvailableNpaNxx400Response'
        '404':
          $ref: '#/components/responses/getAvailableNpaNxx404Response'
      summary: List Available NPA-NXX Phone Numbers [NANP]
      tags:
        - Coverage
  /accounts/{accountId}/importToAccount:
    get:
      tags:
        - Import to Account Orders
      description: >
        Retrieve a list of the Import to Account orders that have previously
        been performed on the account. The query must always specify pagination
        parameters (size, page). The results can also be optionally limited with
        start date and end date. Returns a 204 if no results are found.
      summary: List Import to Account Orders
      operationId: listImportToAccountOrders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/requiredPageQueryParam'
        - $ref: '#/components/parameters/requiredSizeQueryParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/listImportToAccountOrders200Response'
        '204':
          $ref: '#/components/responses/importToAccount204Response'
        '400':
          $ref: '#/components/responses/listImportToAccountOrders400Response'
        '401':
          $ref: '#/components/responses/importToAccountUnauthorized401Response'
        '403':
          $ref: '#/components/responses/importToAccountForbidden403Response'
        '404':
          $ref: '#/components/responses/importToAccountNotFound404Response'
        '405':
          $ref: '#/components/responses/importToAccount405Response'
        '429':
          $ref: '#/components/responses/importToAccountTooManyRequests429Response'
        '500':
          $ref: '#/components/responses/importToAccount500Response'
  /accounts/{accountId}/importToAccount/{orderId}:
    get:
      tags:
        - Import to Account Orders
      description: >-
        Retrieve information about an Import to Account order with the specified
        ID.
      summary: Fetch Import to Account Order Status
      operationId: getImportToAccountOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/importToAccountOrderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/importToAccountNumberOrderResponseForGet'
        '401':
          $ref: '#/components/responses/importToAccountUnauthorized401Response'
        '403':
          $ref: '#/components/responses/importToAccountForbidden403Response'
        '404':
          $ref: '#/components/responses/getImportToAccountOrder404Response'
        '405':
          $ref: '#/components/responses/importToAccount405Response'
        '429':
          $ref: '#/components/responses/importToAccountTooManyRequests429Response'
        '500':
          $ref: '#/components/responses/importToAccount500Response'
  /accounts/{accountId}/importToAccount/{orderId}/history:
    get:
      tags:
        - Import to Account Orders
      description: Retrieves the history of the specified Import to Account order.
      summary: Fetch Import to Account Order History
      operationId: getImportToAccountOrderHistory
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/importToAccountOrderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getImportToAccountOrderHistory200Response'
        '401':
          $ref: '#/components/responses/importToAccountUnauthorized401Response'
        '403':
          $ref: '#/components/responses/importToAccountForbidden403Response'
        '404':
          $ref: '#/components/responses/importToAccountNotFound404Response'
        '405':
          $ref: '#/components/responses/importToAccount405Response'
        '429':
          $ref: '#/components/responses/importToAccountTooManyRequests429Response'
        '500':
          $ref: '#/components/responses/importToAccount500Response'
  /accounts/{accountId}/importToAccount/batches:
    get:
      tags:
        - Import to Account Orders
      description: >-
        The batches resource enumerates all of the batches that have been used
        for importing numbers into an account.

        If there is the need to import a large number of telephone numbers into
        an account, the import is submitted as a <b>batch</b>, which is a
        collection of submissions that are held together by a batch ID. This
        batch of orders can subsequently be retrieved by retrieving all of the
        orders that share a batch ID. Returns a 204 if no results are found.
      summary: List Import to Account Order Batches
      operationId: listImportToAccountOrderBatches
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/listImportToAccountOrderBatches200Response'
        '204':
          $ref: '#/components/responses/importToAccount204Response'
        '401':
          $ref: '#/components/responses/importToAccountUnauthorized401Response'
        '403':
          $ref: '#/components/responses/importToAccountForbidden403Response'
        '404':
          $ref: '#/components/responses/importToAccountNotFound404Response'
        '405':
          $ref: '#/components/responses/importToAccount405Response'
        '429':
          $ref: '#/components/responses/importToAccountTooManyRequests429Response'
        '500':
          $ref: '#/components/responses/importToAccount500Response'
  /accounts/{accountId}/importToAccount/batches/{batchId}:
    get:
      tags:
        - Import to Account Orders
      description: >-
        A batch ID identifies a specific batch of one or more orders that
        constitute a complete import of a (potentially large number of)
        telephone numbers. Retrieving the information associated with a specific
        batch ID describes the orders that were included in that batch, and the
        status and ID of those orders. Returns a 204 if no results are found.
      summary: Fetch Import to Account Orders Status by Batch ID
      operationId: listImportToAccountOrdersByBatchId
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/batchIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getImportToAccountOrdersByBatchId200Response'
        '204':
          $ref: '#/components/responses/importToAccount204Response'
        '401':
          $ref: '#/components/responses/importToAccountUnauthorized401Response'
        '403':
          $ref: '#/components/responses/importToAccountForbidden403Response'
        '404':
          $ref: '#/components/responses/importToAccountNotFound404Response'
        '405':
          $ref: '#/components/responses/importToAccount405Response'
        '429':
          $ref: '#/components/responses/importToAccountTooManyRequests429Response'
        '500':
          $ref: '#/components/responses/importToAccount500Response'
components:
  parameters:
    accountIdPathParam:
      description: User's account ID.
      example: '1234567'
      in: path
      name: accountId
      required: true
      schema:
        type: string
    requiredPageQueryParam:
      description: >-
        An ID of the first element in a page.  This value will indicate the
        first value, not the page number, of the initial entry in the page being
        requested. The initial page is tagged with the ID `1` as a convention.
      in: query
      name: page
      required: true
      schema:
        default: 1
        example: 1
        type: integer
    startDateQueryParam:
      description: >-
        The starting date of a search in yy-mm-dd format. startdate and enddate
        <strong>must</strong> be used as a pair.
      in: query
      name: startDate
      required: false
      schema:
        example: 22-10-31
        type: string
    requiredSizeQueryParam:
      description: The number of elements to retrieve
      in: query
      name: size
      required: true
      schema:
        example: 30
        type: integer
    endDateQueryParam:
      description: >-
        The ending date of a search in yy-mm-dd format. startdate and enddate
        <strong>must</strong> be used as a pair.
      in: query
      name: endDate
      required: false
      schema:
        example: 23-10-31
        type: string
    customerOrderIdQueryParam:
      description: >
        Filter orders by a customer-assigned reference ID. Because
        `customerOrderId` is not unique — Bandwidth applies no uniqueness
        constraint — this query may return multiple orders if the same value was
        used across multiple orders. Each result will have a distinct
        Bandwidth-assigned `orderId`. To retrieve a single specific order, use
        its `orderId` instead.
      example: ABCCorp12345
      in: query
      name: customerOrderId
      schema:
        type: string
    newPhoneNumberOrderStatusQueryParam:
      description: The status of the orders that should be in the returned set
      example: BACKORDERED
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/visibleOrderStatusJson'
    userIdQueryParam:
      description: The userId that submitted the order
      in: query
      name: userId
      schema:
        example: testUser
        type: string
    orderIdPathParam:
      description: ID of order to retrieve
      example: bf1305b8-8998-1111-2222-51ba3ce52d4e
      in: path
      name: orderId
      required: true
      schema:
        type: string
    importToAccountOrderIdPathParam:
      description: Import to Account order's ID.
      in: path
      name: orderId
      required: true
      schema:
        type: string
      example: 093a9f9b-1a78-4e47-b6e2-776a484596f4
    batchIdPathParam:
      description: Import to Account order's batch ID.
      in: path
      name: batchId
      required: true
      schema:
        type: string
      example: 093a9f9b-1a78-4e47-b6e2-776a484596f4
    newPhoneNumberOrderPhoneNumberDetailQueryParam:
      description: >-
        if true, an extended payload describing details about the ordered phone
        numbers will be provided
      example: true
      in: query
      name: tndetail
      required: false
      schema:
        default: false
        type: boolean
    statusQueryParam:
      description: >-
        The status of an order. Possible values are RECEIVED, COMPLETE, PARTIAL,
        BACKORDERED, FAILED, and PROCESSING.
      in: query
      name: status
      schema:
        type: string
    noteIdPathParam:
      description: Note ID
      example: '123'
      in: path
      name: noteId
      required: true
      schema:
        type: string
    stateQueryParam:
      name: state
      description: A 2 character state code.
      in: query
      required: true
      schema:
        type: string
      example: NC
    availableCityQueryParam:
      name: available
      description: >-
        If set to true, the payload includes the quantity of the available phone
        numbers in that city.
      in: query
      required: false
      schema:
        type: boolean
      example: true
    supportedQueryParam:
      name: supported
      description: >-
        If set to true, the payload will show rate centers that Bandwidth serves
        directly.
      in: query
      required: false
      schema:
        type: boolean
      example: true
    availableRateCenterQueryParam:
      name: available
      description: >-
        If set to true, the payload includes the quantity of the available phone
        numbers in that rate center.
      in: query
      required: false
      schema:
        type: boolean
      example: true
    pageQueryParam:
      name: page
      description: >-
        The starting value for a paginated response. The default is '1',
        indicating the first page of results.
      in: query
      required: true
      schema:
        type: number
      example: 1
    sizeQueryParam:
      name: size
      description: The number of rate centers to include in a paginated result payload.
      in: query
      required: true
      schema:
        type: number
      example: 50
    embedQueryParam:
      name: embed
      description: >-
        A set of fields to be included in the response. Lists of zip codes,
        cities, vendors, NpaNxxXs, and counts of available or limited available
        phone numbers are not included for each rate center by default. For
        example, if the payload should contain a list of the cities covered by
        the rate centers, then embed=cities would be included as a query
        parameter. A list of vendors is available only for admin users. No
        filter parameters are supported if LocalRateCenters is specified. In
        this case, only size, page, and any other embed parameters are
        supported.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
    abbreviationQueryParam:
      name: abbreviation
      description: A rate center's abbreviation.
      in: query
      required: false
      schema:
        type: string
      example: BARTLESVL
    nameQueryParam:
      name: name
      description: The name of a rate center.
      in: query
      required: false
      schema:
        type: string
      example: BARTLESVILLE
    zipQueryParam:
      name: zip
      description: A 5 digit ZIP code of the area covered by the rate center.
      in: query
      required: false
      schema:
        type: string
      example: '74029'
    cityQueryParam:
      name: city
      description: The name of a city covered by the rate center.
      in: query
      required: false
      schema:
        type: string
      example: DEWEY
    lataQueryParam:
      name: lata
      description: A 3 or 5 digit rate center's LATA.
      in: query
      required: false
      schema:
        type: number
      example: 538
    tierQueryParam:
      name: tier
      description: The tier associated with covered rate center; a value from 0 to 5.
      in: query
      required: false
      schema:
        type: number
      example: 0
    npaQueryParam:
      name: npa
      description: The 3 digit NPA or area code covered by the rate center.
      in: query
      required: false
      schema:
        type: number
      example: 918
    npaNxxQueryParam:
      name: npaNxx
      description: The 6 digits NPA and NXX values covered by the rate center.
      in: query
      required: false
      schema:
        type: number
      example: 918886
    npaNxxXQueryParam:
      name: npaNxxX
      description: >-
        The 7 digits of the NPA, NXX, and thousands-block values covered by the
        rate center.
      in: query
      required: false
      schema:
        type: number
      example: 9188862
    optionalStateQueryParam:
      name: state
      description: A 2 character state code
      in: query
      required: false
      schema:
        type: string
      example: OK
    rateCenterIdPathParam:
      name: rateCenterId
      in: path
      required: true
      schema:
        type: string
    areaCodeQueryParam:
      name: areaCode
      description: >-
        The allowed number ranges are [2-9] for the first digit and [0-9] for
        both the second and third digits.
      in: query
      required: false
      schema:
        type: string
      example: '919'
    quantityQueryParam:
      name: quantity
      description: >-
        Filters out any Npa-Nxx grouped phone numbers whose quantity falls short
        of the given quantity.
      in: query
      required: false
      schema:
        type: integer
      example: 150
