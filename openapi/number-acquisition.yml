    createNewPhoneNumberOrderNpaNxxSearchAndOrderNanpXmlExample:
      description: >-
        Specify the NpaNxx combination to be ordered. Valid Npa values ~ [2-9]
        for the first digit, and [0-9] for both the second and third digits.
        Valid Nxx values ~ [2-9] for the first digit, and [0-9] for both the
        second and third digits. A similar approach is viable for NPANXXXX. The
        EnableLCA flag turns LCA search on or off.


        Limitations:

        These order types are unsupported with BackOrderRequested=true
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
