    batches:
      type: object
      properties:
        Batches:
          type: object
          properties:
            Batch:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/batch'
    batch:
      type: object
      properties:
        BatchId:
          type: string
        OrderId:
          $ref: '#/components/schemas/orderId'
        OrderCreateDate:
          $ref: '#/components/schemas/orderCreatedDate'
        OrderStatus:
          type: string
        SubmittedTnCount:
          type: integer
        SuccessfulTnCount:
          type: integer
        BatchSize:
          type: integer
    batchId:
      description: >-
        A user-chosen ID for the batch of phone numbers. This batch ID can span
        multiple number submissions. Up to 10 alphanumeric characters. If the
        submission is not intended to be grouped into a batch of submissions
        then the batch ID must be globally unique. It is recommended that the
        batch IDs be globally unique, and that imports not be grouped together
        in batches by use of a common batch ID.
      type: string
    batchSize:
      description: >-
        The number of TNs in the batch, aggregated across all of the orders in
        the batch. This total spans API calls, so if 3 calls are necessary to
        import 15000 numbers, this value would be 15000. It is recommended to
        use a batch size equal to the number of telephone numbers in the API
        call, and use a different batch name for each API call - essentially
        limiting a batch to a single API call.
      type: integer
    origin:
      description: >-
        The origin type of numbers, defaulting to 'UNDEFINED' if not ported into
        IRIS.
      type: string
      enum:
        - UNDEFINED
        - PORTED_IN
    vendorName:
      description: >-
        The vendor that owns the number that is being ported in. If the number
        is manually ported to a partner's network then this would reflect that
        partner.
      type: string
    phoneNumberInventoryGroupId:
      description: >-
        Relevant for international numbers only. The PhoneNumberInventoryGroupId
        denotes a specific category for an international phone number to belong
        to. An international number requires a PhoneNumberInventoryGroup
        similarly to how a NANP number requires a valid rate center association.
      type: integer
    billingType:
      description: Type of billing rules to be applied.
      type: string
      enum:
        - NOCHARGE
        - PORTIN
        - NEWNUMBER
        - PROJECTPORT
    tnAttributes:
      description: List of phone number attributes to be assigned.
      type: object
      properties:
        TnAttribute:
          type: string
          enum:
            - Protected
    initialStatus:
      description: >-
        TN status to be assigned to imported telephone numbers. Requires the
        "Protected" TnAttribute.
      type: string
      enum:
        - Available
    orderId:
      description: The identifier that uniquely identifies an order.
      type: string
      maxLength: 255
    orderCreatedDate:
      description: Creation date of the order.
      type: string
    error:
      title: Error
      type: object
      properties:
        id:
          type: string
          description: A unique identifier for this particular instance of this problem.
          example: optional-error-id
        type:
          $ref: '#/components/schemas/errorType'
        description:
          $ref: '#/components/schemas/errorDescription'
        code:
          $ref: '#/components/schemas/errorCode'
        meta:
          type: object
          description: >-
            A meta object containing application-specific information or
            non-standard metadata about the error.
        source:
          $ref: '#/components/schemas/errorSource'
      required:
        - code
        - description
    errorCode:
      type: integer
      format: int32
      description: >-
        An application-specific error code for services with extensive error
        scenarios to supplement `description`.
      minimum: 4
      example: 51130
    errorDescription:
      type: string
      description: >-
        A human-readable explanation that SHOULD be specific to this occurrence
        of the problem.
      example: There was an issue with a field in your request body
    errorType:
      type: string
      description: >-
        A short, human-readable summary of the problem that SHOULD NOT change
        from occurrence to occurrence of the problem.
      example: REQUEST_ERROR
    errorSource:
      title: Error Source
      type: object
      properties:
        parameter:
          type: string
          description: A string indicating which URI query parameter caused the error.
          example: someParameter
        field:
          type: string
          description: A string indicating which request body field caused the error.
          example: someField
        header:
          type: string
          description: A string indicating which header field caused the error.
    importExternalTnsAsShared:
      description: >-
        If set to true, the order will import any external numbers as shared
        numbers, adding voice service to the destination account without
        affecting existing messaging configuration or provisioning. If the
        numbers are being imported to the same account as their existing
        messaging service, they must be imported to the same SIP peer where
        messaging is already active. If omitted or set to false, the order will
        reject importing any external numbers.
      type: boolean
      default: false
    importToAccountErrorResponse:
      type: object
      properties:
        ErrorResponse:
          type: object
          properties:
            irisStatus:
              type: object
              properties:
                Code:
                  type: integer
                Description:
                  type: string
    importToAccountOrderStatus:
      description: The status of an Import to Account order.
      type: string
      enum:
        - RECEIVED
        - COMPLETE
        - PARTIAL
        - FAILED
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security 

        tokens called bearer tokens. The name “Bearer authentication” can be
        understood as “give access to the bearer

        of this token.” The client must send this token in the `Authorization`
        header when making requests to

        protected resources.


        - Example: `Authorization: Bearer <token>`


        Where `<token>` should be replaced with the token string without angle
        brackets.


        For more information, see the following guide:
        [Credentials](https://dev.bandwidth.com/docs/credentials)
tags:
  - name: New Number Orders
    description: >-
      <p>The Number Order API ("Orders") lets users procure phone numbers and
      add them to their Bandwidth account. Number Orders are asynchronous: when
      users submit a POST request, they receive an OrderId that they can poll or
      subscribe to updates for until the order reaches a final state.

      Users can procure numbers in several ways with the Number Order API:</p>

      <ul>
        <li>Search and Order: Provide search criteria and purchase numbers that match.</li>
        <li>Existing Number Order: Provide a list of specific numbers, and if they're still available, they'll be added to the account.</li>
        <li>Backordering: If numbers matching the specified criteria aren't currently available, they can be placed in backorder and Bandwidth will fulfill it automatically once they become available. Users can also use the Order Notification Webhook to receive callbacks or email notifications as the order progresses.</li>
      </ul>

      Related resources:<br/>

      <a
      href="https://dev.bandwidth.com/docs/numbers/guides/searchingForNumbers">Guide
      to Searching and Ordering Numbers</a><br/>

      <a
      href="https://dev.bandwidth.com/docs/numbers/webhooks/orderWebhook">Order
      Notification Webhook</a>

      </p>
  - name: Coverage
    description: >-
      These APIs provide information related to Bandwidth's geographic coverage
      and phone number types supported, as well as the availability of phone
      number inventory.
  - name: Import to Account Orders
    description: >-
      The Import to Account Order API allows users to import previously ported
      or otherwise acquired telephone numbers into their Bandwidth account.
      Import orders can be submitted individually or as part of a batch for
      large-scale imports. Users can track order status, view order history, and
      manage batches of import orders.
