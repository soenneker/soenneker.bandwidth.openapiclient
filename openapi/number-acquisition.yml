  examples:
    createNewPhoneNumberOrderCombinedSearchAndOrderLocalVanityNanpJsonExample:
      description: >-
        Specify areaCode and localVanity to order phone numbers matching a
        specific alphanumeric pattern between 4 and 7 characters long.

        Limitations: areaCode is required when searching for a local vanity
        number. No other parameter combinations are allowed here. This order
        type is unsupported with backOrderRequested=true.
      value:
        backOrderRequested: false
        customerOrderId: SJM00004
        orderType:
          areaCode: '617'
          endsIn: false
          localVanity: newcars
          quantity: 1
          type: combinedSearchAndOrderType
        subAccountId: 743
        tags:
          - tagName: customerId
            tagValue: 11111111-1111-1111-1111-111111111111
    createNewPhoneNumberOrderCombinedSearchAndOrderProtectedStatusNanpJsonExample:
      description: combinedSearchAndOrderType on a number in Protected status
      value:
        backOrderRequested: false
        customerOrderId: SJM00005
        orderType:
          city: RALEIGH
          enableLCA: false
          npaNxx: '919439'
          quantity: 1
          state: NC
          type: combinedSearchAndOrderType
        partialAllowed: false
        phoneNumberAttributes:
          - PROTECTED
        subAccountId: 743
        tags:
          - tagName: customerId
            tagValue: 11111111-1111-1111-1111-111111111111
    createNewPhoneNumberOrderCombinedSearchAndOrderNanpJsonExample:
      description: >-
        Specify any combination of: areaCode, rateCenter, state, npaNxx,
        npaNxxX, lata, city, and zip, with the following limitations: areaCode,
        npaNxx and npaNxxX are mutually exclusive; LCA search is supported only
        for one of the following criteria: npaNxx, npaNxxX, rateCenter and
        state; if city or rateCenter is specified, then state is required.
      value:
        backOrderRequested: false
        customerOrderId: SJM00003
        orderType:
          areaCode: '617'
          city: RALEIGH
          enableLCA: false
          lata: '224'
          quantity: 1
          rateCenter: RALEIGH
          state: NC
          type: combinedSearchAndOrderType
          zip: '27606'
        partialAllowed: false
        subAccountId: 743
        tags:
          - tagName: customerId
            tagValue: 11111111-1111-1111-1111-111111111111
    createNewPhoneNumberOrderExistingPhoneNumberOrderTypeJsonExample:
      description: >-
        Order a set of phone numbers known to be available. Typically, when the
        numbers have been found and/or reserved using a separate
        availableNumbers search. If the numbers have previously been reserved, a
        reservation ID must be included for each number.
      value:
        autoActivate: true
        customerOrderId: SJM00002
        orderType:
          phoneNumbers:
            - '+19193752369'
            - '+19193752720'
          reservationIds:
            - a8e7d1f9-2c5a-4e3b-8f1c-5d9a7b3e1f02
            - b4f6c8a1-7e9d-4023-95b7-1a6c4d8e3f5a
          type: existingPhoneNumberOrderType
        partialAllowed: false
        tags:
          - tagName: customerId
            tagValue: 11111111-1111-1111-1111-111111111111
        requirementsPackageId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        subAccountId: 873
        voiceConfigurationPackageId: d21315af-9b5b-4b45-a6f4-9106cbfe87d1
        voiceIntegrationIds:
          - 5fa85f64-5717-4562-b3fc-2c963f66afa6
          - 5fa85f64-5717-4562-b3fc-2c963f66afa7
    createNewPhoneNumberOrderAreaCodeSearchAndOrderNanpXmlExample:
      description: >-
        Allowed ranges ~ [2-9] for the first digit and [0, 9] for both the
        second and third digits.
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Area Code Order</Name>
            <BackOrderRequested>false</BackOrderRequested>
            <AreaCodeSearchAndOrderType>
                <AreaCode>435</AreaCode>
                <Quantity>1</Quantity>
            </AreaCodeSearchAndOrderType>
            <PartialAllowed>true</PartialAllowed>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderCitySearchAndOrderNanpXmlExample:
      description: Specify the City and State to be ordered from.
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Area Code Order</Name>
            <BackOrderRequested>false</BackOrderRequested>
            <CitySearchAndOrderType>
                <Quantity>1</Quantity>
                <City>RALEIGH</City>
                <State>NC</State>
            </CitySearchAndOrderType>
            <PartialAllowed>true</PartialAllowed>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderCombinedSearchAndOrderLocalVanityNanpXmlExample:
      description: >-
        Specify AreaCode and LocalVanity to order phone numbers matching a
        specific alphanumeric pattern between 4 and 7 characters long.

        Limitations: AreaCode is always required. No parameter combinations are
        allowed here/ This order type is unsupported with
        BackOrderRequested=true.
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Local Vanity Order</Name>
            <CombinedSearchAndOrderType>
                <AreaCode>617</AreaCode>
                <LocalVanity>newcars</LocalVanity>
                <Quantity>1</Quantity>
                <EndsIn>false</EndsIn>
            </CombinedSearchAndOrderType>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderCombinedSearchAndOrderProtectedStatusNanpXmlExample:
      description: CombinedSearchAndOrderType with established Protected status
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Area Code Order</Name>
            <BackOrderRequested>false</BackOrderRequested>
            <CombinedSearchAndOrderType>
                <NpaNxx>919439</NpaNxx>
                <City>RALEIGH</City>
                <State>NC</State>
                <EnableLCA>false</EnableLCA>
                <Quantity>1</Quantity>
            </CombinedSearchAndOrderType>
            <TnAttributes>
                    <TnAttribute>Protected</TnAttribute>
                    <TnAttribute>External</TnAttribute>
                    <TnAttribute>Imported</TnAttribute>
            </TnAttributes>
            <PartialAllowed>true</PartialAllowed>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderCombinedSearchAndOrderNanpXmlExample:
      description: >-
        Specify the any combination of: AreaCode, RateCenter, State, NpaNxx,
        NpaNxxX, Lata, City, Zip. But with following limitations: AreaCode,
        NpaNxx and NpaNxxX are mutually exclusive, LCA search is supported only
        for one of the following criteria: NpaNxx, NpaNxxX, RateCenter and
        State. If City or RateCenter is specified, then State is required.
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Area Code Order</Name>
            <BackOrderRequested>false</BackOrderRequested>
            <CombinedSearchAndOrderType>
                <Quantity>1</Quantity>
                <AreaCode>617</AreaCode>
                <RateCenter>RALEIGH</RateCenter>
                <State>NC</State>
                <NpaNxx>919439</NpaNxx>
                <NpaNxxX>9194391</NpaNxxX>
                <Lata>224</Lata>
                <City>RALEIGH</City>
                <Zip>27606</Zip>
                <EnableLCA>false</EnableLCA>
            </CombinedSearchAndOrderType>
            <PartialAllowed>true</PartialAllowed>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderExistingTelephoneNumberOrderTypeXmlExample:
      description: >-
        Order a set of phone numbers known to be available. This often results
        if the numbers have been found using a separate availableNumbers search.
        If the numbers have previously been reserved, a reservation ID must be
        included
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Existing Number Order</Name>
            <ExistingTelephoneNumberOrderType>
                <TelephoneNumberList>
                    <TelephoneNumber>+19193752369</TelephoneNumber>
                    <TelephoneNumber>+19193752720</TelephoneNumber>
                    <TelephoneNumber>+19193752648</TelephoneNumber>
                </TelephoneNumberList>
                <ReservationIdList>
                    <ReservationId>[GUID]</ReservationId>
                    <ReservationId>[GUID]</ReservationId>
                </ReservationIdList>
            </ExistingTelephoneNumberOrderType>
            <SiteId>743</SiteId>
            <VoiceConfigurationPackageId>d21315af-9b5b-4b45-a6f4-9106cbfe87d1</VoiceConfigurationPackageId>
            <RequirementsPackageId>3fa85f64-5717-4562-b3fc-2c963f66afa6</RequirementsPackageId>
            <VoiceIntegrationIds>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa6</VoiceIntegrationId>
              <VoiceIntegrationId>5fa85f64-5717-4562-b3fc-2c963f66afa7</VoiceIntegrationId>
            </VoiceIntegrationIds>
            <AutoActivate>true</AutoActivate>
            <Tags>
              <Tag>
                <TagName>customerId</TagName>
                <TagValue>11111111-1111-1111-1111-111111111111</TagValue>
              </Tag>
            </Tags>
        </Order>
    createNewPhoneNumberOrderGeneralXmlExample:
      description: The 'wrapper' Request Payload'
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Order>
            <CustomerOrderId>SJM00001</CustomerOrderId>
            <!--
                There are various types of orders, all of which are submitted in the 'xxxOrderType'
                element of the Order Request payload. Replace
