            <CustomerOrderId>123456789</CustomerOrderId>
            <Name>Area Code Order</Name>
            <BackOrderRequested>false</BackOrderRequested>
            <NPANXXSearchAndOrderType>
                <NpaNxx>919439</NpaNxx>
