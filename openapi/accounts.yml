openapi: 3.0.1
info:
  description: Bandwidth's Account Management API
  title: Accounts API
  version: 2.0.0
  contact:
    name: Bandwidth Support
    email: support@bandwidth.com
    url: https://support.bandwidth.com
  termsOfService: https://www.bandwidth.com/legal/terms-of-use-bandwidthcom-web-sites/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
paths:
  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Retrieve account by ID
      tags:
        - Account
      description: >
        The account is the root resource for many of the operations in the
        Bandwidth App.

        The account is represented by an account ID, which is the resource that
        represents a Bandwidth customer, providing a root resource for all of
        the customer's attributes and services.

        The API calls that are used to manage the details of a customer account,
        and to manage the resources that a Bandwidth customer has access to or
        control over, are accessed through the /accounts resource.

        This API call retrieves information about the account indicated by the
        Account ID.


        **Addresses**: `Address` and `LinkedAddresses`


        - Address 
          - The service address of the account. Historically only US and Canadian addresses supported.
          - `Address` will continue to be populated as long as the address is US/ Canada based and only one linked address exists.
        - LinkedAddresses 
          - A list of address reference IDs that are linked at the account. 
          - These addresses can be fully international.
          - `LinkedAddresses` will replace `Address`, however will continue to be supported for US/ Canada addresses.  
          - A list of **one** address will be supported initially, however this will extend as more address usages are introduced.
          - `LinkedAddresses` can be created and managed through the /addresses resource. See: [Addresses](https://dev.bandwidth.com/apis/numbers-apis/end-user-management/#tag/Addresses/operation/createAddress) for more information.
          - A link to the individual Address API is returned within this object, see `Link`.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/accountResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/accountNotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/accountSystemErrorResponse'
  /accounts/{accountId}/sites:
    post:
      tags:
        - Sub-Accounts (Sites)
      description: Add a Sub-Account (Site) to the account
      summary: Create Sub-Account
      operationId: createSubAccount
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/createSubAccountRequest'
      responses:
        '201':
          $ref: '#/components/responses/subAccountCreatedResponse'
        '400':
          $ref: '#/components/responses/subAccountBadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '409':
          $ref: '#/components/responses/subAccountConflictErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/subAccountSystemErrorResponse'
    get:
      tags:
        - Sub-Accounts (Sites)
      description: Retrieve a list of all Sub-Accounts (Sites) associated with the account
      summary: List Sub-Accounts
      operationId: listSubAccounts
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/phoneNumberCounts'
        - $ref: '#/components/parameters/locationDetails'
        - $ref: '#/components/parameters/summary'
      responses:
        '200':
          $ref: '#/components/responses/subAccountsResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/subAccountsSystemErrorResponse'
  /accounts/{accountId}/sites/{siteId}:
    get:
      tags:
        - Sub-Accounts (Sites)
      description: Retrieves the information associated with the Sub-Account (Site) ID
      summary: Retrieve Sub-Account
      operationId: readSubAccount
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/subAccountResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/subAccountNotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/subAccountSystemErrorResponse'
    put:
      tags:
        - Sub-Accounts (Sites)
      description: Updates the contents of Sub-Account (Site)
      summary: Update Sub-Account
      operationId: updateSubAccount
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/createSubAccountRequest'
      responses:
        '200':
          $ref: '#/components/responses/subAccountResponse'
        '400':
          $ref: '#/components/responses/subAccountBadRequestErrorResponsePut'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/subAccountNotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/subAccountSystemErrorResponse'
    delete:
      tags:
        - Sub-Accounts (Sites)
      description: >-
        Deletes the Sub-Account (Site). Sub-Accounts (Sites) can only be deleted
        if there are no SIP Peers attached to it
      summary: Delete Sub-Account
      operationId: deleteSubAccount
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/successResponse200'
        '400':
          $ref: '#/components/responses/subAccountCantBeDeletedErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/subAccountNotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/subAccountSystemErrorResponse'
  /accounts/{accountId}/sites/{siteId}/sippeers:
    get:
      tags:
        - Locations (SIP Peers)
      description: >-
        Retrieve information about a location (SIP Peer) or set of locations on
        sub-account (site)
      summary: List Locations
      operationId: listLocations
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/locationsResponse'
        '400':
          $ref: '#/components/responses/locationResponseBadRequestType3'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    post:
      tags:
        - Locations (SIP Peers)
      description: >-
        Create Location (SIP Peer).<br>

        Possible errors in response:
        https://dev.bandwidth.com/docs/numbers/errors/#sippeervalidationerror
      summary: Create Location
      operationId: createLocation
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/createLocationRequest'
      responses:
        '201':
          $ref: '#/components/responses/locationCreatedResponse'
        '400':
          $ref: '#/components/responses/locationResponseBadRequestType1'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '409':
          $ref: '#/components/responses/locationResponseConflict'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/locationResponseServiceUnavailable'
  /accounts/{accountId}/sites/{siteId}/sippeers/{sipPeerId}:
    get:
      tags:
        - Locations (SIP Peers)
      description: Retrieves the information associated with the location (SIP Peer) ID
      summary: Retrieve Location
      operationId: readLocation
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/locationResponse'
        '400':
          $ref: '#/components/responses/locationResponseBadRequestType3'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/locationResponseNotFound'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    put:
      tags:
        - Locations (SIP Peers)
      description: >-
        There are a few rules used to eliminate IP address collisions.  The
        primary restriction is on the ability to share Term IP addresses across
        the Bandwidth API structural elements. Essentially...

        <ul>
          <li>Term Addresses cannot be shared anywhere</li>
          <li>VoiceHost and VoiceHostGroup addresses can be shared between locations and can be different than or the same as Term IP Addresses </li>
        </ul>

        If the CallingName field is missing from the payload, CNAM will default
        to false on the location.<br>

        Possible errors in response:
        https://dev.bandwidth.com/docs/numbers/errors/#sippeervalidationerror
      summary: Update Location
      operationId: updateLocation
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/updateLocationRequest'
      responses:
        '200':
          $ref: '#/components/responses/successResponse200'
        '400':
          $ref: '#/components/responses/locationResponseBadRequestType1'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/locationResponseNotFound'
        '409':
          $ref: '#/components/responses/locationResponseConflict'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    delete:
      tags:
        - Locations (SIP Peers)
      description: >-
        Delete Location (SIP Peer). <br>

        Possible errors in response:

        <ul><li>Delete not allowed while a Location (SIP Peer) has SMS
        feature</li></ul>
      summary: Delete Location
      operationId: deleteLocation
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/locationDeleteResponse'
        '400':
          $ref: '#/components/responses/locationResponseBadRequestType2'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/locationResponseNotFound'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/totalSeats:
    get:
      tags:
        - Account
      description: Retrieves the total number of seats on account
      operationId: getAccountTotalSeats
      summary: Retrieve the total number of seats on account
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/totalSeatsResponse'
        '400':
          $ref: '#/components/responses/totalSeatsBadRequestErrorResponse'
  /accounts/{accountId}/sites/{siteId}/sippeers/{sipPeerId}/totalSeats:
    get:
      tags:
        - Locations (SIP Peers)
      description: Retrieves the total number of seats on a Location (SIP Peer)
      operationId: getLocationTotalSeats
      summary: Get Total Seats for Location
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/sippeerTotalSeatsSuccessResponse'
        '400':
          $ref: '#/components/responses/sippeerTotalSeatsBadRequestErrorResponse'
  /admin/data/a2pClasses:
    get:
      tags:
        - Admin Data
      description: Retrieves A2P Classes.
      operationId: readA2pClasses
      summary: List A2pClasses
      responses:
        '200':
          $ref: '#/components/responses/a2pClassListResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/adminDataErrorResponse500'
  /admin/data/a2pClasses/{messageClass}:
    get:
      tags:
        - Admin Data
      description: Retrieve A2P Class.
      operationId: readA2pClass
      summary: Retrieve A2P Class
      parameters:
        - $ref: '#/components/parameters/messageClassPathParam'
      responses:
        '200':
          $ref: '#/components/responses/a2pClassResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/a2pClassNotFoundResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/adminDataErrorResponse500'
  /accounts/{accountId}/sites/{siteId}/sippeers/{sipPeerId}/associatedOutboundNumbers:
    get:
      tags:
        - Locations (SIP Peers)
      description: >-
        Retrieve list of Associated Outbound Numbers associated with the
        Location. If none exist, an empty list is returned.
      operationId: retrieveSipPeerAssociatedOutboundNumbers
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
        - $ref: '#/components/parameters/paginationPageQueryParam'
        - $ref: '#/components/parameters/paginationSizeQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/associatedOutboundNumbersResponse'
        '400':
          $ref: '#/components/responses/associatedOutboundNumbersResponseBadRequest'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
      summary: List Outbound Numbers by Location
    post:
      tags:
        - Locations (SIP Peers)
      description: Submit a list of new Associated Outbound Numbers.
      operationId: uploadSipPeerAssociatedOutboundNumbers
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/associatedOutboundNumbersRequest'
      responses:
        '200':
          $ref: '#/components/responses/createAssociatedOutboundNumbersResponse'
        '400':
          $ref: '#/components/responses/associatedOutboundNumbersResponseBadRequest'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
      summary: Associate Phone Numbers with a Location
  /accounts/{accountId}/sites/{siteId}/sippeers/{sipPeerId}/associatedOutboundNumbers/{associatedOutboundNumberId}:
    delete:
      tags:
        - Locations (SIP Peers)
      description: Delete Associated Outbound Number from SIP Peer.
      operationId: deleteSipPeerAssociatedOutboundNumbers
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
        - $ref: '#/components/parameters/locationIdPathParam'
        - $ref: '#/components/parameters/associatedOutboundNumberIdParam'
      responses:
        '200':
          $ref: '#/components/responses/successResponse200'
        '400':
          $ref: '#/components/responses/associatedOutboundNumbersResponseBadRequest'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/associatedOutboundNumbersResponseNotFound'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
      summary: Delete Number from Location
  /accounts/{accountId}/sites/{siteId}/totalSeats:
    get:
      tags:
        - Sub-Accounts (Sites)
      description: Retrieves the total number of seats on a Sub-Account (Site)
      operationId: getSubAccountTotalSeats
      summary: Retrieve count of UC trunking seats by Sub-Account (Site)
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/subAccountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/subAccountTotalSeatsSuccessResponse'
        '400':
          $ref: '#/components/responses/subAccountTotalSeatsBadRequestErrorResponse'
components:
  parameters:
    accountIdPathParam:
      description: User's account ID.
      example: '1234567'
      in: path
      name: accountId
      required: true
      schema:
        type: string
    phoneNumberCounts:
      name: phoneNumberCounts
      description: >-
        Provides response payload with total phone number count for every
        Sub-Account on Account if specified as true
      in: query
      required: false
      schema:
        type: boolean
        default: false
      example: true
    locationDetails:
      name: locationDetails
      description: >
        Provides a response payload with a list of locations for every
        Sub-Account on Account with fields:   
          <ul>
            <li>LocationId (PeerId)</li>
            <li>LocationName (PeerName)</li>
            <li>Description</li>
            <li>IsDefaultLocation (IsDefaultPeer)</li>
            <li>Address</li>
            <li>FinalDestinationUri</li>
            <li>PremiseTrunks</li>
            <li>CallingName</li>
            <li>SsSendToCustomer</li>
          </ul>  
          <p>Also each Sub-Account will contain a count of locations on it:</p>
          <ul>
            <li>SipPeerCount</li>
          </ul>
      in: query
      required: false
      schema:
        type: boolean
        default: false
      example: true
    summary:
      name: summary
      description: >-
        Provides response payload with list of basic information about every
        Location for every Sub-Account on Account and overrides sipPeerDetails
        parameter if specified as true
      in: query
      required: false
      schema:
        type: boolean
        default: false
      example: true
    subAccountIdPathParam:
      name: siteId
      description: Sub-Account ID
      in: path
      required: true
      schema:
        type: integer
      example: 407
    locationIdPathParam:
      name: sipPeerId
      description: ID of the location
      in: path
      required: true
      schema:
        type: integer
      example: 500017
    messageClassPathParam:
      name: messageClass
      description: Message Class name
      in: path
      required: true
      schema:
        type: string
      example: TestClass
    paginationPageQueryParam:
      description: >-
        Retrievals must be paginated, using page and size indicators.  The page
        parameter contains the page number, e.g. "1" in the case of the first
        page
      example: 1
      in: query
      name: page
      required: true
      schema:
        type: integer
    paginationSizeQueryParam:
      description: >-
        The size parameter indicates the number of Associated Outbound Numbers
        to return in the payload
      example: 10
      in: query
      name: size
      required: true
      schema:
        type: integer
    associatedOutboundNumberIdParam:
      in: path
      name: associatedOutboundNumberId
      required: true
      schema:
        type: integer
  requestBodies:
    createSubAccountRequest:
      description: Sub-Account (Site) Request
      required: true
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/createSubAccountXmlRequest'
          examples:
            Non-UC Example:
              $ref: '#/components/examples/createSubAccountForNonUcXmlExample'
            UC Example:
              $ref: '#/components/examples/createSubAccountForUcXmlExample'
            Global Address Example:
              $ref: '#/components/examples/createSubAccountForGlobalAddressXmlExample'
        application/json:
          schema:
            $ref: '#/components/schemas/createSubAccountJsonRequest'
          examples:
            Non-UC Example:
              $ref: '#/components/examples/createSubAccountForNonUcJsonExample'
            UC Example:
              $ref: '#/components/examples/createSubAccountForUcJsonExample'
            Global Address Example:
              $ref: >-
                #/components/examples/createSubAccountForGlobalAddressJsonExample
    createLocationRequest:
      description: Create Location (SIP Peer) Request
      required: true
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/createLocationXmlRequest'
          examples:
            createLocationWithVoiceHostsExample:
              $ref: '#/components/examples/createLocationWithVoiceHostsXmlExample'
            createLocationWithVoiceHostGroupsExample:
              $ref: >-
                #/components/examples/createLocationWithVoiceHostGroupsXmlExample
            createLocationWithOriginationRoutePlanExample:
              $ref: >-
                #/components/examples/createLocationWithOriginationRoutePlanXmlExample
        application/json:
          schema:
            $ref: '#/components/schemas/createLocationJsonRequest'
          examples:
            createLocationWithVoiceHostsExample:
              $ref: '#/components/examples/createLocationWithVoiceHostsJsonExample'
            createLocationWithVoiceHostGroupsExample:
              $ref: >-
                #/components/examples/createLocationWithVoiceHostGroupsJsonExample
            createLocationWithOriginationRoutePlanExample:
              $ref: >-
                #/components/examples/createLocationWithOriginationRoutePlanJsonExample
    updateLocationRequest:
      description: Update Location (SIP Peer) Request
      required: true
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/updateLocationXmlRequest'
          examples:
            updateLocationExample:
              $ref: '#/components/examples/updateLocationXmlExample'
        application/json:
          schema:
            $ref: '#/components/schemas/updateLocationJsonRequest'
          examples:
            updateLocationExample:
              $ref: '#/components/examples/updateLocationJsonExample'
    associatedOutboundNumbersRequest:
      content:
        application/xml:
          examples:
            associatedOutboundNumbersRequestExample:
              $ref: >-
                #/components/examples/createAssociatedOutboundNumbersRequestXmlExample
          schema:
            properties:
              AssociatedOutboundNumbers:
                $ref: '#/components/schemas/associatedOutboundNumberRequest'
        application/json:
          examples:
            associatedOutboundNumbersRequestExample:
              $ref: >-
                #/components/examples/createAssociatedOutboundNumbersRequestJsonExample
          schema:
            properties:
              associatedOutboundNumbers:
                type: array
                items:
                  $ref: '#/components/schemas/associatedOutboundNumberRequestJson'
      description: OK
  responses:
    successResponse201:
      description: Created
    successResponse200:
      description: OK
    errorResponse401:
      description: Unauthorized
    errorResponse403:
      description: Forbidden
    errorResponse404:
      description: Not Found
    errorResponse429:
      description: Too Many Requests
    errorResponse500:
      description: Internal Server Error
    totalSeatsResponse:
      description: OK
      content:
        application/xml:
          examples:
            totalSeatsSuccessExample:
              $ref: '#/components/examples/totalSeatsSuccessXmlExample'
          schema:
            $ref: '#/components/schemas/accountUcTrunkingSeats'
        application/json:
          examples:
            totalSeatsSuccessJsonExample:
              $ref: '#/components/examples/totalSeatsSuccessJsonExample'
          schema:
            $ref: '#/components/schemas/accountUcTrunkingSeatsJson'
    totalSeatsBadRequestErrorResponse:
      description: Bad Request
      content:
        application/xml:
          examples:
            totalSeatsErrorExample:
