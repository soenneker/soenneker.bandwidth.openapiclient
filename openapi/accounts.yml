          $ref: '#/components/schemas/isDefaultLocation'
    locationJson:
      type: object
      properties:
        locationId:
          $ref: '#/components/schemas/id'
        locationName:
          $ref: '#/components/schemas/name'
        description:
          $ref: '#/components/schemas/description'
        isDefaultLocation:
          $ref: '#/components/schemas/isDefaultLocation'
        finalDestinationUri:
          $ref: '#/components/schemas/finalDestinationUri'
        voiceHosts:
          description: >-
            These addresses, comprised of HostName and optional Port, are used
            by the Bandwidth network to send calls to for Origination services.
            The VoiceHosts list of IP addresses used for an active/standby
            address selection mechanism, where the first address is attempted,
            followed by the second address and so on. Except under failure
            situations the first address in the list is preferred. Maximum of 10
            hosts - can be IP address or Fully Qualified Domain Name
          properties:
            hosts:
              type: array
              items:
                $ref: '#/components/schemas/hostJson'
        voiceHostGroups:
          description: >-
            The VoiceHostGroups element is comprised of one VoiceHostGroup
            element, which is used to randomly distribute traffic amongst up to
            10 IP addresses. Failover behavior is retained within the group
          type: array
          items:
            type: object
            properties:
              hosts:
                type: array
                items:
                  $ref: '#/components/schemas/hostJson'
        originationRoutePlan:
          $ref: '#/components/schemas/originationRoutePlanJson'
        terminationHosts:
          x-internal: true
          description: >-
            These addresses, comprised of IP or Subnet(CIDR format) and optional
            Port, are used by the Bandwidth network to send calls to for
            Termination services. Maximum of 10 hosts - can be IP address or
            subnets. In case of subnet you should specify NetworkAddress of
            subnet as IP
          properties:
            terminationHosts:
              type: array
              items:
                $ref: '#/components/schemas/locationTerminationHostJson'
        products:
          type: array
          items:
            type: string
            enum:
              - Origination
              - Termination
              - MESSAGING
              - E911
              - TollFree
              - UcTrunking
              - EdgeManagement
              - CORE
              - Iris
              - NumberManagement
              - Analytics
              - CampaignManagement
        address:
          $ref: '#/components/schemas/addressJson'
        premiseTrunks:
          $ref: '#/components/schemas/premiseTrunks'
        callingName:
          $ref: '#/components/schemas/locationLineOptionDtoJson'
