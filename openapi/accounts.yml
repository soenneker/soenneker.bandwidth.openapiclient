    hosts:
      type: object
      description: >-
        These addresses, comprised of HostName and optional Port, are used by
        the Bandwidth network to send calls to for Origination services. The
        VoiceHosts list of IP addresses used for an active/standby address
        selection mechanism, where the first address is attempted, followed by
        the second address and so on. Except under failure situations the first
        address in the list is preferred. Maximum of 10 hosts - can be IP
        address or Fully Qualified Domain Name
      properties:
        Hosts:
          type: array
          items:
            $ref: '#/components/schemas/host'
    host:
      type: object
      properties:
        HostName:
          $ref: '#/components/schemas/hostName'
        Port:
          $ref: '#/components/schemas/port'
    originationRoutePlan:
      type: object
      description: >-
        The OriginationRoutePlan element consists of an action and a list of
        prioritized and weighted routes that tell Bandwidth where to send phone
        calls to phone numbers associated with the route plan.
      properties:
        Id:
          $ref: '#/components/schemas/originationRoutePlanId'
        Route:
          type: array
          items:
            $ref: '#/components/schemas/originationRoutePayload'
        Action:
          $ref: '#/components/schemas/originationRoutePlanAction'
    originationRoutePayload:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/originationRoutePayloadName'
        Endpoint:
          $ref: '#/components/schemas/originationRoutePayloadEndpoint'
        Priority:
          $ref: '#/components/schemas/originationRoutePayloadPriority'
        Weight:
          $ref: '#/components/schemas/originationRoutePayloadWeight'
        EndpointType:
          $ref: '#/components/schemas/originationRoutePayloadEndpointType'
