    id:
      type: integer
      example: 12345
    name:
      type: string
      example: Name of the resource
    description:
      type: string
      example: Description of the resource
    accountRelationship:
      type: string
      enum:
        - BASIC_ACCOUNT
        - SMALL_ACCOUNT
        - MEDIUM_ACCOUNT
        - LARGE_ACCOUNT
        - KEY_ACCOUNT
    accountType:
      type: string
      enum:
        - Business
        - Catapult
        - Holding
    altSpid:
      type: string
    associatedCatapultAccount:
      type: string
    billingCycle:
      description: >-
        BillingCycle is the day of the month that the account's billing cycle
        closes. Valid values are 1, 5, 15, and 20.
      format: int32
      type: integer
      enum:
        - 1
        - 5
        - 15
        - 20
    customerSegment:
      description: >-
        CustomerSegment is used to classify accounts for reporting and business
        purposes.
      type: string
      example: Trial
    default911Provider:
      description: >-
        The Default911Provider is the 911 provider that will be used for
        emergency services if no other 911 provider is specified on a phone
        number or order.
      type: string
      example: default911_provider
    externalId:
      description: >-
        An external identifier that can be used to associate the Bandwidth
        account with an account in another system.
      type: string
      example: external_id_12345
    globalAccountNumber:
      description: >-
        Global Account Number (GAN), A globally unique identifier for the
        account. This value is often used when integrating with Bandwidth
        systems.
      type: string
      example: BW-7123456
    maxTnsForAutomatedPort:
      description: >-
        The maximum number of telephone numbers that can be included in an
        automated port order for this account. If not specified, the system
        default will be used. (Values greater than '49' are invalid for Manual
        TN Overflow thresholds.)
      format: int32
      type: integer
      example: 25
    nenaId:
      description: >-
        NENA ID is the National Emergency Number Association (NENA) identifier
        for the account. This value is used for E911 services.
      type: string
      example: '1234567'
    penaltyType:
      description: >-
        The PenaltyType indicates whether or not a penalty will be applied to
        port-in orders for this account.
      type: string
    portCarrierType:
      description: The PortCarrierType indicates the type of carrier for porting purposes.
      enum:
        - WIRELESS
        - WIRELINE
      type: string
    pricing:
      description: Pricing is used to specify the pricing model for the account.
      type: string
      example: Standard
    spid:
      description: >-
        SPID is the Service Provider Identifier for the account. This value is
        used for E911 services.
      type: string
      example: '9999'
    addressLine2:
      description: >-
        AddressLine2 is used to specify Unit, Suite, Floor, etc. in the Service
        Address. AddressLine2 is optional when not needed to fully specify the
        ServiceAddress.
      type: string
      example: Apt 12B
    city:
      description: City is mandatory in cases where the ServiceAddress is mandatory.
      type: string
      example: Raleigh
    country:
      description: >-
        Country is the country of the ServiceAddress. This value will be derived
        from the StateCode, so it should generally be omitted. If provided, it
        must be the name of the country or country code, for example 'United
        States' or 'US'.
      type: string
      example: United States
    county:
      description: The county where the subscriber or business is located.
      type: string
      example: Wake
    houseNumber:
      description: >-
        The HouseNumber is the street address number of the ServiceAddress.
        HouseNumber is mandatory for port-in orders in which the ServiceAddress
        is mandatory.
      type: string
      example: '123'
    housePrefix:
      description: >-
        The HousePrefix is the non-numeric address number prefix of the
        ServiceAddress. This element is optional when not needed to fully
        specify the ServiceAddress.
      type: string
      example: ABC
    houseSuffix:
      description: >-
        The HouseSuffix is the non-numeric address number suffix of the
        ServiceAddress. This element is optional when not needed to fully
        specify the ServiceAddress.
      type: string
      example: E
    latitude:
      type: string
      example: '41.5868'
    longitude:
      type: string
      example: '93.62496'
    plusFour:
      description: PlusFour is the 4 digits that are sometimes suffixed to the Zip Code.
      type: string
      example: '1234'
    postDirectional:
      description: >-
        The PostDirectional is the street name post directional of the
        ServiceAddress. This element is optional when not needed to fully
        specify the ServiceAddress.
      type: string
      example: NW
    preDirectional:
      description: >-
        The PreDirectional is the non-numeric street name prefix of the
        ServiceAddress. This element is optional when not needed to fully
        specify the ServiceAddress.
      type: string
      example: SE
    stateCode:
      description: >-
        StateCode is the 2-letter abbreviation of the state of the
        ServiceAddress. StateCode is mandatory in cases where the ServiceAddress
        is mandatory.
      type: string
      example: NC
    streetName:
      description: >-
        The StreetName is mandatory in cases where the ServiceAddress is
        mandatory.
      type: string
      example: Main
    streetSuffix:
      description: >-
        The StreetSuffix is the street suffix of the ServiceAddress. This
        element is optional when not needed to fully specify the ServiceAddress.
      type: string
      example: St
    zip:
      description: >-
        Zip is the Zip Code of the ServiceAddress. Zip is mandatory in cases
        where the ServiceAddress is mandatory.
      type: string
      example: '27607'
    email:
      type: string
      example: test@bandwidth.com
    fax:
      type: string
      example: '+19195554321'
    firstName:
      type: string
      example: John
    lastName:
      type: string
      example: Doe
    mobile:
      type: string
      example: '+19195559876'
    phone:
      type: string
      example: '+19195551234'
    suffix:
      type: string
      example: Jr.
    title:
      type: string
      example: Mr
    websiteAddress:
      type: string
