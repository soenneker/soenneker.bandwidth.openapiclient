      type: object
      properties:
        BulkPortin:
          $ref: '#/components/schemas/bulkPortinPatch'
    bulkPortinPatch:
      type: object
      properties:
        CustomerOrderId:
          description: Internal customer order id for tracking the order.
          example: CUST12345
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        RequestedFocDate:
          description: >-
            If present this will specify the date and time that the port-in is
            requested to happen. The actual time and date is subject to
            negotiation with the losing carriers.
          allOf:
            - $ref: '#/components/schemas/datePatch'
        AlternateSpid:
          description: >-
            Unique customer AltSPID to be applied to the port-in requests. Can
            be changed only for DRAFT bulk port-in.
          example: X455
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        BillingTelephoneNumber:
          description: >-
            Account or Billing telephone number for order. This will be unusual
            for bulk port-in requests that are expected to decompose into
            port-in requests from multiple carriers, because the value will be
            different for each losing carrier.
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        Subscriber:
          $ref: '#/components/schemas/subscriberPatch'
        LoaAuthorizingPerson:
          description: First and last name of person who authorized LOA.
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        AccountNumber:
          description: >-
            Account number associated with the account on the losing carrier,
            often required for wireless ports, or enterprise ports. This will be
            unusual for bulk port-in requests that are expected to decompose
            into port-in requests from multiple carriers.
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        PinNumber:
          description: PIN Number, often required for wireless ports.
          allOf:
            - $ref: '#/components/schemas/stringPatch'
        SiteId:
          description: >-
            This is the Site / Sub-Account ID made visible in the
            /accounts/{accountId}/sites API call.
          allOf:
            - $ref: '#/components/schemas/intPatch'
        PeerId:
          description: >-
            This is the SIP Peer / Location ID made visible in the
            /accounts/{accountId}/sites/{siteId}/sipPeers API call.
          example: '521434'
          allOf:
            - $ref: '#/components/schemas/intPatch'
        ProcessingStatus:
          description: >-
            This is the processing status the bulk portin should transition
            into.
          allOf:
            - $ref: '#/components/schemas/processingStatusPatch'
        TnAttributes:
          description: >-
            Attributes to be assigned to the telephone number. Optional
            parameter. Possible values - `Protected`.
          allOf:
            - $ref: '#/components/schemas/tnAttributesPatch'
        TargetRespOrgId:
          type: string
          minLength: 5
          maxLength: 5
          description: >-
            For toll free port-ins, this value specifies the RespOrg ID that the
            toll free numbers should be ported to.  When porting to Bandwidth,
            the value is generally JYT01.  When specified in a bulk port-in, the
            value will be applied to all subtending toll free port-in orders,
            unless overridden in the subtending order.  The value should be 5
            characters in length, consisting of digits a-z, A-Z, and 0-9.
          example: JYT01
        RetryValidation:
          description: |-
            Only allowed for PUT and PATCH requests.

             When telephone numbers are included in a bulk port-in order, Bandwidth accesses a vendor to determine if the numbers are portable, and who currently serves the numbers. In the event that we do not receive a response from our vendor after a number of retries, we give up and place the order in the INVALID_DRAFT_TNS state. This scenario can occur if our vendor is performing maintenance. Including RetryValidation with a value of true will cause the order to return to VALIDATE_DRAFT_TNS and we will repeat our attempts to retrieve the portability data from the vendor. This element is included in the synchronous response to the PUT or PATCH, when included in the request, but is not included in subsequent GET requests for the order.
          type: boolean
        VoiceConfigurationPackageId:
          type: string
          description: >-
            VoiceConfigurationPackageId is the identifier of the voice
            configuration package containing the voice origination settings.
            When specified in a bulk port-in, the value will be applied to all
            subtending port-in orders, unless overriden in the subtending order.
        losingResellerName:
          type: string
          maxLength: 60
          pattern: '[A-z0-9 -]+'
          description: >-
            Name of the company serving the telephone numbers prior to the port.
            Some Canada ports may be rejected unless this information is
            supplied.
          example: ResellerName
          xml:
            name: LosingResellerName
