  parameters:
    AccountIdPathParam:
      name: accountId
      description: User's account ID.
      in: path
      required: true
      schema:
        type: string
      example: '1234567'
    OrderIdPathParam:
      name: orderId
      description: ''
      in: path
      required: true
      schema:
        type: string
    NoteIdPathParam:
      name: noteId
      description: Note ID
      in: path
      required: true
      schema:
        type: string
      example: '123'
    DocumentTypeQueryParam:
      name: documentType
      description: >-
        This query parameter allows you to include the document type metadata at
        the same

        time you upload the file.  The value may be one of&#58; LOA, INVOICE,
        CSR, or OTHER.
      in: query
      required: false
      schema:
        type: string
      example: LOA
    MetadataQueryParam:
      name: metadata
      description: >-
        if true it will return meta-data associated with the file used to
        describe the file.
      in: query
      required: false
      schema:
        type: boolean
        default: false
      example: true
  examples:
    bulkPortinHistorySimpleExampleJson:
      value:
        orderHistory:
          - orderDate: 2018-06-12T13:44:47.604Z
            note: Draft order has been created/updated
            author: systemUser
            status: DRAFT
          - orderDate: 2018-06-12T13:49:02.328Z
            note: Draft order has been created/updated
            author: systemUser
            status: DRAFT
            difference: 'subAccountId : 0 --> 743'
          - orderDate: 2018-06-12T13:49:46.350Z
            note: Order has been submitted/updated
            author: systemUser
            status: IN_PROGRESS
          - orderDate: 2018-06-12T13:51:13.855Z
            note: Order has been submitted/updated
            author: systemUser
            status: IN_PROGRESS
            difference: 'SubscriberType : "" --> residential'
