  /tns:
    get:
      description: >-
        Retrieve information about one or more Telephone Numbers (TNs), where
        the TNs are chosen based on the search parameters provided in the API
        Call.


        In this table are presented capabilities that are not universally
        available. The following request query parameters are only allowed for
        numbers from specific region/country:

        | Number Region | Request Query Parameter |

        |:--------------|:------------------------|

        |NANP|city|

        |NANP|tier|

        |NANP|npaNxx|

        |NANP|npaNxxx|

        |NANP|lata|

        |NANP|state|

        |NANP|ratecenter|


        When the  query parameters listed in the table above are passed, only in
        service North American Numbering Plan phone numbers are returned.
      operationId: ListTnsByGet
      parameters:
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/countryCodeA3QueryParam'
        - $ref: '#/components/parameters/phoneNumberTypeQueryParam'
        - $ref: '#/components/parameters/areaCodeQueryParam'
        - $ref: '#/components/parameters/cityQueryParam'
        - $ref: '#/components/parameters/tierQueryParam'
        - description: The internal account id assigned to the customer that "owns" the TN.
          example: 5000125
          in: query
          name: accountId
          required: false
          schema:
            type: integer
        - description: A E.164 TN.
          example: '+19199918388'
          in: query
          name: fullNumber
          required: false
          schema:
            type: string
        - description: >-
            An IP address or subnet (CIDR format) associated with the TN. Filter
            for subnet applies by exact match.
          example: 47.16.211.63 or 69.22.181.68/30
          in: query
          name: host
          required: false
          schema:
            type: string
        - description: A service type value to filter the TNs returned in the payload.
          example: E911
          in: query
          name: service
          required: false
          schema:
            enum:
              - E911
              - Voice
              - Hosted_E911
            type: string
        - description: >-
            <p>The 6-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXX are [2-9] for the first digit and [0-9] for both the second and
            third digits.</li></ul>
          example: 919859
          in: query
          name: npaNxx
          required: false
          schema:
            type: integer
        - description: >-
            <p>The 7-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXXX are [2-9] for the first digit and [0-9] the rest of the (X)
            digits.</li></ul>
          in: query
          name: npaNxxx
          required: false
          schema:
            type: integer
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  Typically this is a 3 or 5 digit value.
          example: 435
          in: query
          name: lata
          required: false
          schema:
            type: integer
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  This `ratecenter` must be combined with a
            `state` in the query.  If State is not included in the query then
            the query will fail.
          example: PLANO
          in: query
          name: rateCenter
          required: false
          schema:
            type: string
        - description: >-
            A State search filter - all returned TNs will be in the entered
            State.  This is a 2-character State or Province abbreviation.
          example: TX
          in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              examples:
                Domestic and international phone numbers:
                  value:
                    links:
                      first: https://api.bandwidth.com:443/api/v2/tns?page=1&size=2
                      next: >-
                        https://api.bandwidth.com:443/api/v2/tns?page=%2B390541605183&size=2
                    phoneNumberCount: 2
                    phoneNumbers:
                      - accountId: 12346158
                        country: FRA
                        countryCodeA3: FRA
                        isHostedVoice: false
                        isOnNetVendor: true
                        lastModified: '2020-03-03T15:30:07.000Z'
                        phoneNumber: '+33140289561'
                        phoneNumberType: GEOGRAPHIC
                        status: Inservice
                      - accountId: 101
                        city: JERSEY CITY
                        countryCodeA3: USA
                        isHostedVoice: false
                        isOnNetVendor: true
                        lastModified: '2019-01-02T20:00:42.000Z'
