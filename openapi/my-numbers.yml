openapi: 3.1.0
info:
  title: My Numbers
  description: >-
    Bandwidth's My Numbers API - Read-only inventory and reporting endpoints for
    phone numbers in your account.
  contact:
    name: Bandwidth
    url: https://dev.bandwidth.com/apis/numbers-apis/my-numbers
    email: support@bandwidth.com
  version: 1.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-service/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
security:
  - Basic: []
  - Bearer: []
paths:
  /accounts/{accountId}/inserviceNumbers:
    get:
      description: >-
        Retrieves a list of in-service phone numbers associated with the account
        ID.


        In this table are presented capabilities that are not universally
        available. The following request query parameters are only allowed for
        numbers from specific region/country:

        | Number Region | Request Query Parameter |

        |:--------------|:------------------------|

        |NANP|city|

        |NANP|tier|

        |NANP|npaNxx|

        |NANP|npaNxxx|

        |NANP|lata|

        |NANP|state|

        |NANP|ratecenter|


        When the  query parameters listed in the table above are passed, only in
        service North American Numbering Plan phone numbers are returned.
      operationId: ReadInserviceTns
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
        - $ref: '#/components/parameters/countryCodeA3QueryParam'
        - $ref: '#/components/parameters/phoneNumberTypeQueryParam'
        - $ref: '#/components/parameters/areaCodeQueryParam'
        - $ref: '#/components/parameters/cityQueryParam'
        - $ref: '#/components/parameters/tierQueryParam'
        - description: >-
            <p>The 6-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXX are [2-9] for the first digit and [0-9] for both the second and
            third digits.</li></ul>
          example: 919859
          in: query
          name: npaNxx
          required: false
          schema:
            type: integer
        - description: >-
            <p>The 7-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXXX are [2-9] for the first digit and [0-9] the rest of the (X)
            digits.</li></ul>
          in: query
          name: npaNxxx
          required: false
          schema:
            type: integer
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  Typically this is a 3 or 5 digit value.
          example: 435
          in: query
          name: lata
          required: false
          schema:
            type: integer
        - description: >-
            A State search filter - all returned TNs will be in the entered
            State.  This is a 2-character State or Province abbreviation.
          example: TX
          in: query
          name: state
          required: false
          schema:
            type: string
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  This `ratecenter` must be combined with a
            `state` in the query.  If State is not included in the query then
            the query will fail.
          example: PLANO
          in: query
          name: ratecenter
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phoneNumberListResponse'
              example:
                totalCount: 59
                links:
                  first: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/inserviceNumbers?page=1&size=15
                  next: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/inserviceNumbers?page=%2B18043814905&size=15
                phoneNumbers:
                  - '+18043024183'
                  - '+18042121778'
                  - '+18042146066'
                  - '+18043814903'
                  - '+18043814905'
            application/xml:
              examples:
                example:
                  description: example
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <TNs>
                       <TotalCount>59</TotalCount>
                       <Links>
                          <first>( a link goes here )</first>
                          <next>( a link goes here )</next>
                       </Links>
                       <TelephoneNumbers>
                          <Count>15</Count>
                          <TelephoneNumber>+18043024183</TelephoneNumber>
                          <TelephoneNumber>+18042121778</TelephoneNumber>
                          <TelephoneNumber>+18042146066</TelephoneNumber>
                          <TelephoneNumber>+18043814903</TelephoneNumber>
                          <TelephoneNumber>+18043814905</TelephoneNumber>
                          <TelephoneNumber>+18043814864</TelephoneNumber>
                          <TelephoneNumber>+18043326094</TelephoneNumber>
                          <TelephoneNumber>+18042121771</TelephoneNumber>
                          <TelephoneNumber>+18043024182</TelephoneNumber>
                          <TelephoneNumber>+18043814900</TelephoneNumber>
                          <TelephoneNumber>+18047672642</TelephoneNumber>
                          <TelephoneNumber>+18043024368</TelephoneNumber>
                          <TelephoneNumber>+18042147950</TelephoneNumber>
                          <TelephoneNumber>+18043169931</TelephoneNumber>
                          <TelephoneNumber>+18043325302</TelephoneNumber>
                       </TelephoneNumbers>
                    </TNs>
              schema:
                $ref: '#/components/schemas/accountTelephoneNumbersHistoryResponse'
          description: OK
        '204':
          content:
            application/xml: {}
          description: No Content
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/xml: {}
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: List in-service phone numbers
      tags:
        - My Numbers
  /accounts/{accountId}/inserviceNumbers/totals:
    get:
      description: Returns the total number of in-service numbers for the given account.
      operationId: ReadInserviceTnsCount
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phoneNumberCountResponse'
              example:
                count: 62
            application/xml:
              examples:
                example:
                  description: example
                  value: "<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<Quantity>\n\t    <Count>62</Count>\n</Quantity>"
              schema:
                $ref: '#/components/schemas/telephoneNumberTotalsHistory'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: Get in-service phone number count
      tags:
        - My Numbers
  /accounts/{accountId}/inserviceNumbers/{tn}:
    get:
      description: >-
        Check if a given phone number is in service. Returns a 200 OK with no
        body if the number is in-service on the account, and a 404 Not Found if
        the number is not in-service on the account.
      operationId: ReadInserviceTn
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - description: The telephone number to check
          example: '+18043024183'
          in: path
          name: tn
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
      summary: Get in-service phone number
      tags:
        - My Numbers
  /accounts/{accountId}/discnumbers:
    get:
      description: >-
        Retrieves a list of disconnected numbers associated with the account.
        There are optional search parameters to limit the discNumbers payload
      operationId: GetDisconnectedTns
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phoneNumberListResponse'
              example:
                totalCount: 2
                phoneNumbers:
                  - '+14158714245'
                  - '+14352154439'
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <TNs>
                      <TotalCount>2</TotalCount>
                      <TelephoneNumbers>
                        <Count>2</Count>
                        <TelephoneNumber>+14158714245</TelephoneNumber>
                        <TelephoneNumber>+14352154439</TelephoneNumber>
                      </TelephoneNumbers>
                    </TNs>
              schema:
                $ref: '#/components/schemas/tNs'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: List disconnected phone numbers
      tags:
        - My Numbers
  /accounts/{accountId}/discnumbers/totals:
    get:
      description: Retrieves a total number of disconnects.
      operationId: GetTotalNumberDisconnects
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phoneNumberCountResponse'
              example:
                count: 4
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <Quantity>
                      <Count>4</Count>
                    </Quantity>
              schema:
                $ref: '#/components/schemas/quantity'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: Get disconnected phone number count
      tags:
        - My Numbers
  /accounts/{accountId}/sites/{siteId}/inserviceNumbers:
    get:
      description: >-
        Retrieves all the telephone numbers currently in-service for the given
        Site.


        In this table are presented capabilities that are not universally
        available. The following request query parameters are only allowed for
        numbers from specific region/country:

        | Number Region | Request Query Parameter |

        |:--------------|:------------------------|

        |NANP|city|

        |NANP|tier|

        |NANP|npaNxx|

        |NANP|npaNxxx|

        |NANP|lata|

        |NANP|state|

        |NANP|ratecenter|


        When the  query parameters listed in the table above are passed, only in
        service North American Numbering Plan phone numbers are returned.
      operationId: RetrieveSiteInserviceNumbers
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/SiteIdPathParam'
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/startDateQueryParam'
        - $ref: '#/components/parameters/endDateQueryParam'
        - $ref: '#/components/parameters/countryCodeA3QueryParam'
        - $ref: '#/components/parameters/phoneNumberTypeQueryParam'
        - $ref: '#/components/parameters/areaCodeQueryParam'
        - $ref: '#/components/parameters/cityQueryParam'
        - $ref: '#/components/parameters/tierQueryParam'
        - description: >-
            <p>The 6-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXX are [2-9] for the first digit and [0-9] for both the second and
            third digits.</li></ul>
          example: 919859
          in: query
          name: npaNxx
          required: false
          schema:
            type: integer
        - description: >-
            <p>The 7-digit prefix associated with the TN.</p><ul><li>Allowed
            number ranges for NPA are [2-9] for the first digit and [0-9] for
            both the second and third digits.</li><li>Allowed number ranges for
            NXXX are [2-9] for the first digit and [0-9] the rest of the (X)
            digits.</li></ul>
          in: query
          name: npaNxxx
          required: false
          schema:
            type: integer
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  Typically this is a 3 or 5 digit value.
          example: 435
          in: query
          name: lata
          required: false
          schema:
            type: integer
        - description: >-
            A Rate Center search filter - all returned TNs will be in the
            entered Rate Center.  This `ratecenter` must be combined with a
            `state` in the query.  If State is not included in the query then
            the query will fail.
          example: PLANO
          in: query
          name: rateCenter
          required: false
          schema:
            type: string
        - description: >-
            A State search filter - all returned TNs will be in the entered
            State.  This is a 2-character State or Province abbreviation.
          example: TX
          in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phoneNumberListResponse'
              example:
                totalCount: 54
                links:
                  first: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/sites/407/inserviceNumbers?page=1&size=3
                  next: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/sites/407/inserviceNumbers?page=%2B14352161523&size=3
                phoneNumbers:
                  - '+14352154855'
                  - '+14352154870'
                  - '+14352161523'
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <TNs>
                       <TotalCount>54</TotalCount>
                       <Links>
                          <first>
                             <!-- SNIP -->
                          </first>
                          <next>
                             <!-- SNIP -->
                          </next>
                       </Links>
                       <TelephoneNumbers>
                          <Count>3</Count>
                          <TelephoneNumber>+14352154855</TelephoneNumber>
                          <!-- SNIP -->
                          <TelephoneNumber>+14352161523</TelephoneNumber>
                       </TelephoneNumbers>
                    </TNs>
              schema:
                $ref: '#/components/schemas/accountTelephoneNumbersHistoryResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: List sub-account in-service phone numbers
      tags:
        - My Numbers
  /accounts/{accountId}/sites/{siteId}/totaltns:
    get:
      description: Retrieves Site telephone numbers total count
      operationId: RetrieveSiteTnsCount
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - description: ID of the Site to retrieve count of TNs
          example: '407'
          in: path
          name: siteId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/subAccountPhoneNumberCountResponse'
              example:
                totalCount: 26
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <SiteTNsResponse>
                       <SiteTNs>
                          <TotalCount>26</TotalCount>
                       </SiteTNs>
                    </SiteTNsResponse>
              schema:
                $ref: '#/components/schemas/siteTNsResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: Get sub-account phone number count
      tags:
        - My Numbers
  /accounts/{accountId}/sites/{siteId}/sippeers/{sippeerId}/tns:
    get:
      description: >-
        Retrieve information about a Telephone number or set of Telephone
        numbers
      operationId: ReadSipPeerTns
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/SiteIdPathParam'
        - $ref: '#/components/parameters/SipPeerTnsPageQueryParam'
        - $ref: '#/components/parameters/SipPeerTnsSizeQueryParam'
        - description: ID of the Sip Peer to retrieve TNs information
          example: '500017'
          in: path
          name: sippeerId
          required: true
          schema:
            type: string
        - description: >-
            If the value is false SipPeerTelephoneNumber will contain FullNumber
            tags only. This makes processing faster
          example: false
          in: query
          name: includeAttributes
          required: false
          schema:
            default: true
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/locationPhoneNumbersResponse'
              example:
                links:
                  first: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/sites/407/sippeers/500017/tns?page=1&size=3
                  next: >-
                    https://api.bandwidth.com/api/v2/accounts/12345/sites/407/sippeers/500017/tns?page=%2B12053161118&size=3
                phoneNumbers:
                  - phoneNumber: '+12052160148'
                    callingNameDisplay: true
                    phoneNumberAttributes:
                      - Protected
                      - External
                      - Imported
                    messagingSettings:
                      smsEnabled: true
                  - phoneNumber: '+12053161118'
                    callingNameDisplay: false
                    messagingSettings:
                      smsEnabled: true
                  - phoneNumber: '+12053160118'
                    callForward: '+12014563025'
                    callingNameDisplay: false
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <SipPeerTelephoneNumbersResponse>
                       <Links>
                          <first>( a link goes here )</first>
                          <next>( a link goes here )</next>
                       </Links>
                       <SipPeerTelephoneNumbers>
                          <SipPeerTelephoneNumber>
                             <FullNumber>+12052160148</FullNumber>
                             <CallingNameDisplay>true</CallingNameDisplay>
                             <TnAttributes>
                                <TnAttribute>Protected</TnAttribute>
                                <TnAttribute>External</TnAttribute>
                                <TnAttribute>Imported</TnAttribute>
                             </TnAttributes>
                             <MessagingSettings>
                                <SmsEnabled>true</SmsEnabled>
                             </MessagingSettings>
                          </SipPeerTelephoneNumber>
                          <SipPeerTelephoneNumber>
                             <FullNumber>+12053161118</FullNumber>
                             <CallingNameDisplay>false</CallingNameDisplay>
                             <MessagingSettings>
                                <SmsEnabled>true</SmsEnabled>
                             </MessagingSettings>
                          </SipPeerTelephoneNumber>
                          <SipPeerTelephoneNumber>
                             <FullNumber>+12053160118</FullNumber>
                             <CallForward>+12014563025</CallForward>
                             <CallingNameDisplay>false</CallingNameDisplay>
                          </SipPeerTelephoneNumber>
                       </SipPeerTelephoneNumbers>
                    </SipPeerTelephoneNumbersResponse>
              schema:
                $ref: '#/components/schemas/sipPeerTelephoneNumbersResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INVALID_REQUEST
                message: Bad request
                description: The request parameters are invalid.
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: NOT_FOUND
                message: Resource not found
                description: The requested resource was not found.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/myNumbersErrorResponse'
              example:
                code: INTERNAL_ERROR
                message: Internal server error
                description: An unexpected error occurred.
          description: Internal Server Error
      summary: List location phone numbers
      tags:
        - My Numbers
  /accounts/{accountId}/sites/{siteId}/sippeers/{sippeerId}/tns/{tn}:
    get:
      description: Retrieve information about telephone number on Sip Peer.
      operationId: ReadSipPeerTn
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/SiteIdPathParam'
        - description: ID of the Sip Peer to retrieve TN information
          example: '500017'
          in: path
          name: sippeerId
          required: true
          schema:
            type: string
        - description: A E.164 Telephone Number
          example: '+15209072451'
          in: path
          name: tn
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/locationPhoneNumberItem'
              example:
                phoneNumber: '+15209072451'
                callForward: '+17042661720'
                callingNameDisplay: true
                phoneNumberAttributes:
                  - Protected
                  - External
                  - Imported
                messagingSettings:
                  smsEnabled: true
            application/xml:
              examples:
                example:
                  value: |-
                    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                    <SipPeerTelephoneNumberResponse>
                        <SipPeerTelephoneNumber>
                            <FullNumber>+15209072451</FullNumber>
                            <CallForward>+17042661720</CallForward>
                            <CallingNameDisplay>true</CallingNameDisplay>
                            <TnAttributes>
                                <TnAttribute>Protected</TnAttribute>
                                <TnAttribute>External</TnAttribute>
                                <TnAttribute>Imported</TnAttribute>
