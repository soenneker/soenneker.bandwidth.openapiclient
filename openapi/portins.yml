    listPortinTns200JsonExample:
      summary: JSON example for list port-in TNs 200 response
      value:
        count: 1
        phoneNumbers:
          - '+19192809870'
    listPortinTns200XmlExample:
      summary: XML example for list port-in TNs 200 response
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <TelephoneNumbers>
            <Count>1</Count>
            <TelephoneNumber>+19192809870</TelephoneNumber>
        </TelephoneNumbers>
    listPortinTns400JsonExample:
      summary: JSON example for list port-in TNs 400 response
      value:
        code: '7304'
        description: Invalid order ID format.
    listPortinTns400XmlExample:
      summary: XML example for list port-in TNs 400 response
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
