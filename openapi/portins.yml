      value:
        orderId: 93118edd-9874-41b6-89a3-d8c783fe83cf
        status: RECEIVED
    csrGetResponseJsonExample:
      summary: JSON example for a single CSR order
      value:
        customerOrderId: someValue
        lastModifiedBy: systemUser
        orderCreateDate: '2019-10-25T09:51:17Z'
        accountId: 1
        orderId: a2f55ebe-782a-4242-983b-6ae6cfa97833
        lastModifiedDate: '2019-10-25T12:51:22Z'
        status: COMPLETE
        accountNumber: '987654321'
        accountTelephoneNumber: '+19196194444'
        endUserName: bandwidthGuy
        authorizingUserName: importantAuthGuy
        customerCode: '123'
        endUserPin: '12345'
        addressLine1: 900 Main Campus Dr
        city: Raleigh
        state: NC
        zipCode: '27612'
        typeOfService: residential
        csrData:
          accountNumber: '123456789'
          customerName: JOHN SMITH
          serviceAddress:
            unparsedAddress: 900 MAIN CAMPUS DR
            city: RALEIGH
