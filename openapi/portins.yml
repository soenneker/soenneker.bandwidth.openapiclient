  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security 

        tokens called bearer tokens. The name "Bearer authentication" can be
        understood as "give access to the bearer

        of this token." The client must send this token in the `Authorization`
        header when making requests to

        protected resources.


        - Example: `Authorization: Bearer <token>`


        Where `<token>` should be replaced with the token string without angle
        brackets.


        For more information, see the following guide:
        [Credentials](https://dev.bandwidth.com/docs/account/credentials/management)
  parameters:
    tnPortoutPasscodesPageQueryParam:
      name: page
      description: >-
        An ID of the first element in a page. This value will indicate the first
        value, not the count, of the initial entry in the page being requested.
        Note in the example that the page is the TN that begins the page. The
        initial page is tagged with the ID `1`.
      in: query
      required: true
      schema:
        type: string
        default: '1'
      example: '1'
    tnPortoutPasscodesSizeQueryParam:
      name: size
      description: The number of items to include in a page.
      in: query
      required: true
      schema:
        type: integer
        default: 500
      example: 250
    AccountIdPathParam:
      name: accountId
      description: User's account ID.
      in: path
      required: true
      schema:
        type: string
      example: '1234567'
    loaOrderIdPathParam:
      name: orderId
      description: The port-in order ID.
      in: path
      required: true
      schema:
        type: string
      example: d28f4d00-4af1-4b03-b1d4-fc0a9e9ef6b3
    loaFileIdPathParam:
      name: fileid
      description: The LOA file ID.
      in: path
      required: true
      schema:
        type: string
      example: file123
    OrderIdPathParam:
      name: orderId
      description: The port-in order ID.
      in: path
      required: true
      schema:
        type: string
      example: d28f4d00-4af1-4b03-b1d4-fc0a9e9ef6b3
    modifiedDateFromQueryParam:
      name: modifiedDateFrom
      description: The earliest date that the order was last modified.
      in: query
      required: false
      schema:
        type: string
      example: '2014-08-05 00:00:00+00:00'
    modifiedDateToQueryParam:
      name: modifiedDateTo
      description: >-
        The latest date that the order was last modified. If no modifiedDateTo
        is specified when a modifiedDateFrom is specified then 'now' will be
        presumed to be the modifiedDateTo.
      in: query
      required: false
      schema:
        type: string
      example: '2014-08-05 00:00:00+00:00'
    pageQueryParam:
      name: page
      description: >-
        The CSR order id corresponding to the page that you want to start from.
        "1" is used as a convention for the first CSR order for the account.
        Defaults to 1, if not provided.
      in: query
      required: false
      schema:
        type: string
      example: ca8065d1-ec1a-43da-af40-1dcee43becb5
    sizeQueryParam:
      name: size
      description: The maximum number of results to retrieve.
      in: query
      required: false
      schema:
        type: integer
        default: 300
      example: 30
    statusQueryParam:
      name: status
      description: Displays the CSR orders with a given order status.
      in: query
      required: false
      schema:
        type: string
      example: complete
  schemas:
    genericErrorResponseJson:
      type: object
      description: Generic JSON error response.
      properties:
        code:
          type: string
          description: Error code.
        description:
          type: string
          description: Human-readable error description.
    portinTnsResponseJson:
      type: object
      description: >-
        Response containing a list of telephone numbers associated with a
        port-in order.
      properties:
        count:
          description: >-
            Total count of telephone numbers associated with the specified
            port-in order.
          type: integer
          example: 1
        phoneNumbers:
          description: >-
            List of telephone numbers in E.164 format (E.164), e.g.
            +19192809870.
          type: array
          items:
            type: string
            maxLength: 12
          example:
            - '+19192809870'
    telephoneNumbers:
      type: object
      properties:
        TelephoneNumbers:
          type: object
          properties:
            Count:
              description: >-
                Total count of telephone numbers associated with the specified
                port-in number.
              type: integer
            TelephoneNumber:
              description: List of telephone numbers in E.164 format.
              type: array
              items:
                type: string
    portinStatistics:
      type: object
      description: Statistics of port-in orders for an account.
      properties:
        statusCounts:
          type: object
          description: Count of port-in orders by status.
          properties:
            EXCEPTION:
              type: integer
              example: 45
            FOC:
              type: integer
              example: 120
            PENDING_DOCUMENTS:
              type: integer
              example: 30
            SUBMITTED:
              type: integer
              example: 200
            REQUESTED_CANCEL:
              type: integer
              example: 15
            REQUESTED_SUPP:
              type: integer
              example: 25
            MISSING_REQUIREMENT:
              type: integer
              example: 30
            PENDING_CARRIER_APPROVAL:
              type: integer
              example: 20
        totalOrders:
          type: integer
          description: Total number of port-in orders.
          example: 435
        timestamp:
          type: string
          format: date-time
          description: The timestamp of when the statistics were generated.
          example: '2024-08-22T14:00:00Z'
    csrRequestJson:
      type: object
      description: JSON request body for creating or updating a CSR order.
      required:
        - workingOrBillingTelephoneNumber
      properties:
        customerOrderId:
          type: string
          description: Optional customer-defined reference ID for this order.
          maxLength: 255
        workingOrBillingTelephoneNumber:
          type: string
          description: Working or Billing telephone number in E.164 format.
        accountNumber:
          type: string
          description: The main account number on the bill.
          maxLength: 20
        accountTelephoneNumber:
          type: string
          description: >-
            The account telephone number assigned by the current service
            provider.
          maxLength: 12
        endUserName:
          type: string
          description: The name of the end user associated with the telephone number.
          maxLength: 100
        authorizingUserName:
          type: string
          description: The name of the end user who signed the authorization.
          maxLength: 100
        customerCode:
          type: string
          description: The customer code associated with the service provider.
          maxLength: 3
        endUserPin:
          type: string
          description: The end user personal identification number (PIN).
          maxLength: 50
        endUserPassword:
          type: string
          description: The end user password to access the CSR, if applicable.
          maxLength: 100
        addressLine1:
          type: string
          description: Address line 1 portion of the service address.
          maxLength: 200
        city:
          type: string
          description: City where the telephone number is being serviced.
          maxLength: 100
        state:
          type: string
          description: State or province abbreviation (XX format).
          maxLength: 2
        zipCode:
          type: string
          description: >-
            ZIP code or postal code where the telephone number is being
            serviced.
          maxLength: 10
        typeOfService:
          type: string
