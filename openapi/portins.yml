openapi: 3.0.1
info:
  title: Porting
  description: >-
    Bandwidth's Porting API


    This API provides endpoints to manage port-in orders, including retrieving
    and updating activation status for telephone numbers being ported into the
    Bandwidth network.
  contact:
    name: Bandwidth
    url: https://dev.bandwidth.com/apis/numbers-apis/porting/portins/
    email: support@bandwidth.com
  version: 2.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-service/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
security:
  - Basic: []
  - Bearer: []
paths:
  /accounts/{accountId}/csrs:
    get:
      tags:
        - Porting
      description: >-
        Retrieves the CSR orders for the given account ID.

        Please visit <a href='/docs/numbers/porting/port-ins/csrs'>Guides and
        Tutorials</a>
      summary: List CSR orders
      operationId: readCsrOrders
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/modifiedDateFromQueryParam'
        - $ref: '#/components/parameters/modifiedDateToQueryParam'
        - $ref: '#/components/parameters/pageQueryParam'
        - $ref: '#/components/parameters/sizeQueryParam'
        - $ref: '#/components/parameters/statusQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/csrListResponse200'
        '400':
          $ref: '#/components/responses/csrBadRequestError'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    post:
      tags:
        - Porting
      description: Creates the CSR order
      summary: Create CSR order
      operationId: createCsrOrder
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/csrCreateRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/csrCreateResponse201'
        '400':
          $ref: '#/components/responses/csrBadRequestError'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/csrs/{orderId}:
    get:
      tags:
        - Porting
      description: Retrieves the CSR order for the given account ID by order ID.
      summary: Get CSR order
      operationId: readCsrOrder
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/OrderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/csrGetResponse200'
        '400':
          $ref: '#/components/responses/csrBadRequestError'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    put:
      tags:
        - Porting
      description: Update CSR order
      summary: Update CSR order
      operationId: updateCsrOrder
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/OrderIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/csrUpdateRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/csrUpdateResponse200'
        '400':
          $ref: '#/components/responses/csrBadRequestError'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/portins/statistics:
    get:
      tags:
        - Port-in Statistics
      summary: Retrieve port-in order statistics
      description: >-
        Fetches the statistics of port-in orders for a specific account ID,
        including status counts and total orders.
      operationId: getPortinStatistics
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/portinStatisticsResponse200'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/portinStatisticsForbiddenError'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '502':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/portins/{orderId}/activationStatus:
    get:
      tags:
        - Porting
      operationId: retrievePortinActivationStatus
      summary: Retrieve port-in order activation status
      description: >-
        Retrieve the status (activated or not activated) of TNs associated with
        the customer activated (triggered) order. <br><br>

        At this time all phone numbers associated with a PON will be activated
        at the same time.
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/OrderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/activationStatusResponse200'
        '400':
          $ref: '#/components/responses/activationStatusResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/activationStatusResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    put:
      tags:
        - Porting
      operationId: updatePortinActivationStatus
      summary: Update port-in order activation status
      description: >
        Sets the activation time for the port-in order.  <br> <br>

        This API call is used to set the Activation time of the customer
        activated (triggered) port.</p>


        <ul>

        <li>If the time is in the past all of the TNs in the port-in request
        will be activated 'immediately'.</li>

        <li>For automated on-net port-ins, if the time is within three days
        after the approved FoC date, the auto-activation time for the port will
        be set to that time.</li>

        <li>For automated off-net port-ins, if the date matches the actual FOC
        date and the time is between 6:00 AM ET and 10:00 PM ET, the
        auto-activation time for the port will be set to that time.</li>

        </ul>
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/OrderIdPathParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/activationStatusJson'
            examples:
              example:
                value:
                  autoActivationDate: '2014-08-30T18:30:00+03:00'
          application/xml:
            schema:
              $ref: '#/components/schemas/activationStatus'
            examples:
              example:
                value: |-
                  <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                  <ActivationStatus>
                      <AutoActivationDate>2014-08-30T18:30:00+03:00</AutoActivationDate>
                  </ActivationStatus>
      responses:
        '200':
          $ref: '#/components/responses/activationStatusPutResponse200'
        '400':
          $ref: '#/components/responses/activationStatusResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/activationStatusResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/tnPortoutPasscodes:
    get:
      tags:
        - Porting
      operationId: getTnPortOutPasscode
      summary: Retrieve tn port-out passcode
      description: >-
        Retrieve information about one or more Telephone Numbers (TNs) with port
        out passcode.
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/tnPortoutPasscodesPageQueryParam'
        - $ref: '#/components/parameters/tnPortoutPasscodesSizeQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/tnPortOutPasscodesGet200Response'
        '400':
          $ref: '#/components/responses/tnPortOutPasscodesGet400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    post:
      tags:
        - Porting
      operationId: retrieveTnPortOutPasscodes
      summary: Retrieve tn port-out passcodes
      description: >-
        Retrieve information about one or more Telephone Numbers (TNs), where
        the TNs are specified in the POST body.
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/tnPortOutPasscodesRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/tnPortOutPasscodesPost200Response'
        '400':
          $ref: '#/components/responses/tnPortOutPasscodesPost400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/portins/{orderId}/loas/{fileid}/metadata:
    get:
      tags:
        - LOA Metadata
      operationId: retrievePortinLoaMetadata
      summary: Retrieve port-in LOA file metadata
      description: Retrieves the metadata associated with the file.
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/loaOrderIdPathParam'
        - $ref: '#/components/parameters/loaFileIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/portinLoaMetadataGet200Response'
        '400':
          $ref: '#/components/responses/portinLoaMetadataBadRequestResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/portinLoaMetadataNotFoundResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    put:
      tags:
        - LOA Metadata
      operationId: updatePortinLoaMetadata
      summary: Update port-in LOA file metadata
      description: >-
        Associate metadata with the file named in the resource path. This will
        describe the file, and declare the data that is contained in the file,
        selected from a list of [LOA  INVOICE  CSR  OTHER].
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/loaOrderIdPathParam'
        - $ref: '#/components/parameters/loaFileIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/portinLoaMetadataPutRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/portinLoaMetadataPut200Response'
        '400':
          $ref: '#/components/responses/portinLoaMetadataBadRequestResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/portinLoaMetadataNotFoundResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
    delete:
      tags:
        - LOA Metadata
      operationId: deletePortinLoaMetadata
      summary: Delete port-in LOA file metadata
      description: Deletes the metadata previously associated with the identified file.
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/loaOrderIdPathParam'
        - $ref: '#/components/parameters/loaFileIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/portinLoaMetadataDelete200Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/portinLoaMetadataNotFoundResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/portins/{orderId}/tns:
    get:
      tags:
        - Porting
      description: >-
        Retrieves a list of telephone numbers associated with the specified
        port-in and displays them in the payload.
      operationId: listPortinTns
      summary: List port-in tns
      parameters:
        - $ref: '#/components/parameters/AccountIdPathParam'
        - $ref: '#/components/parameters/OrderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/listPortinTns200Response'
        '400':
          $ref: '#/components/responses/listPortinTns400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/listPortinTns404Response'
        '429':
          $ref: '#/components/responses/errorResponse429'
        5XX:
          $ref: '#/components/responses/errorResponse500'
components:
  examples:
    csrCreateRequestJsonExample:
      summary: JSON example for creating a CSR order
      value:
        workingOrBillingTelephoneNumber: '+19196191211'
        accountNumber: '987654321'
        accountTelephoneNumber: '+19196194444'
        endUserName: bandwidthGuy
        authorizingUserName: authorizingUserName
        customerCode: '123'
        endUserPin: '12345'
        endUserPassword: password
        addressLine1: 900 Main Campus Dr
        city: Raleigh
        state: NC
        zipCode: '27612'
        typeOfService: residential
    csrUpdateRequestJsonExample:
      summary: JSON example for updating a CSR order
      value:
        workingOrBillingTelephoneNumber: '+19196191211'
        workingTelephoneNumber: '+19196191211'
        billingTelephoneNumber: '+19196191211'
        customerName: name
        authorizingPersonName: name
        accountNumber: '987654321'
        workingTelephoneNumbersOnAccount:
          - '+19196191211'
        accountTelephoneNumber: '+19196194444'
        endUserName: bandwidthGuy
        authorizingUserName: authorizingUserName
        customerCode: '123'
        endUserPin: '12345'
        endUserPassword: password
        addressLine1: 900 Main Campus Dr
        city: Raleigh
        state: NC
        zipCode: '27612'
        typeOfService: residential
    csrListResponseJsonExample:
      summary: JSON example for listing CSR orders
      value:
        totalCount: 3
        csrOrders:
          - customerOrderId: someValue
            lastModifiedBy: systemUser
            orderCreateDate: '2019-10-25T09:51:17Z'
            accountId: 1
            orderId: a2f55ebe-782a-4242-983b-6ae6cfa97833
            lastModifiedDate: '2019-10-25T12:51:22Z'
            status: COMPLETE
            accountNumber: '987654321'
            accountTelephoneNumber: '+19196194444'
            endUserName: bandwidthGuy
            authorizingUserName: importantAuthGuy
            customerCode: '123'
            endUserPin: '12345'
            addressLine1: 900 Main Campus Dr
            city: Raleigh
            state: NC
            zipCode: '27612'
