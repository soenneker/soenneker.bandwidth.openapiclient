    listPortinTns404JsonExample:
      summary: JSON example for list port-in TNs 404 response
      value:
        code: '7005'
        description: The specified port-in order was not found.
    listPortinTns404XmlExample:
      summary: XML example for list port-in TNs 404 response
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <Errors>
            <Error>
                <Code>7005</Code>
