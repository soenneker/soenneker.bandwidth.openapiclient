      description: Not Found
    errorResponse405:
      description: Method Not Allowed
    activationStatusResponse200:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/activationStatusJson'
          examples:
            example:
              value:
                autoActivationDate: '2014-08-29T18:30:00+03:00'
                activatedPhoneNumbers:
                  - '+16052609021'
                notYetActivatedPhoneNumbers: []
        application/xml:
          schema:
            $ref: '#/components/schemas/activationStatusResponse'
          examples:
            example:
              value: |-
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <ActivationStatusResponse>
                    <ActivationStatus>
                        <AutoActivationDate>2014-08-29T18:30:00+03:00</AutoActivationDate>
                        <ActivatedTelephoneNumbersList>
                            <TelephoneNumber>+16052609021</TelephoneNumber>
                        </ActivatedTelephoneNumbersList>
                        <NotYetActivatedTelephoneNumbersList/>
                    </ActivationStatus>
                </ActivationStatusResponse>
    activationStatusPutResponse200:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/activationStatusJson'
          examples:
            example:
              value:
                autoActivationDate: '2014-08-30T18:30:00+03:00'
        application/xml:
          examples:
            example:
              value: |-
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <ActivationStatusResponse>
                    <ActivationStatus>
                        <AutoActivationDate>2014-08-30T18:30:00+03:00</AutoActivationDate>
                    </ActivationStatus>
                </ActivationStatusResponse>
    activationStatusResponse400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/activationStatusErrorResponseJson'
          examples:
            example:
              value:
                code: '7342'
                description: On demand port-in activation not yet allowed.
        application/xml:
          examples:
            example:
              value: |-
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <ActivationStatusResponse>
                    <ResponseStatus>
                        <ErrorCode>7342</ErrorCode>
                        <Description>On demand port-in activation not yet allowed.</Description>
                    </ResponseStatus>
                </ActivationStatusResponse>
    activationStatusResponse404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/activationStatusErrorResponseJson'
          examples:
            example:
              value:
                code: '7348'
                description: The order is already complete
        application/xml:
          examples:
            example:
              value: |-
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <ActivationStatusResponse>
                    <ResponseStatus>
                        <ErrorCode>7348</ErrorCode>
                        <Description>The order is already complete</Description>
                    </ResponseStatus>
                </ActivationStatusResponse>
    errorResponse401:
      description: Unauthorized
    errorResponse403:
      description: Forbidden
    errorResponse429:
      description: Too Many Requests
    errorResponse500:
      description: Internal Server Error
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security 

        tokens called bearer tokens. The name "Bearer authentication" can be
        understood as "give access to the bearer

        of this token." The client must send this token in the `Authorization`
        header when making requests to

        protected resources.


        - Example: `Authorization: Bearer <token>`


        Where `<token>` should be replaced with the token string without angle
        brackets.


        For more information, see the following guide:
        [Credentials](https://dev.bandwidth.com/docs/account/credentials/management)
  parameters:
    AccountIdPathParam:
      name: accountId
      description: User's account ID.
      in: path
      required: true
      schema:
        type: string
      example: '1234567'
    OrderIdPathParam:
      name: orderId
      description: The port-in order ID.
      in: path
      required: true
      schema:
        type: string
      example: d28f4d00-4af1-4b03-b1d4-fc0a9e9ef6b3
    modifiedDateFromQueryParam:
      name: modifiedDateFrom
      description: The earliest date that the order was last modified.
      in: query
      required: false
      schema:
        type: string
      example: '2014-08-05 00:00:00+00:00'
    modifiedDateToQueryParam:
      name: modifiedDateTo
      description: >-
        The latest date that the order was last modified. If no modifiedDateTo
        is specified when a modifiedDateFrom is specified then 'now' will be
        presumed to be the modifiedDateTo.
      in: query
      required: false
      schema:
        type: string
      example: '2014-08-05 00:00:00+00:00'
    pageQueryParam:
      name: page
      description: >-
        The CSR order id corresponding to the page that you want to start from.
        "1" is used as a convention for the first CSR order for the account.
        Defaults to 1, if not provided.
      in: query
      required: false
      schema:
        type: string
      example: ca8065d1-ec1a-43da-af40-1dcee43becb5
    sizeQueryParam:
      name: size
      description: The maximum number of results to retrieve.
      in: query
      required: false
      schema:
        type: integer
        default: 300
      example: 30
    statusQueryParam:
      name: status
      description: Displays the CSR orders with a given order status.
      in: query
      required: false
      schema:
        type: string
      example: complete
  schemas:
    csrRequestJson:
      type: object
      description: JSON request body for creating or updating a CSR order.
      required:
        - workingOrBillingTelephoneNumber
      properties:
        customerOrderId:
          type: string
          description: Optional customer-defined reference ID for this order.
          maxLength: 255
        workingOrBillingTelephoneNumber:
          type: string
          description: Working or Billing telephone number in E.164 format.
        accountNumber:
          type: string
          description: The main account number on the bill.
          maxLength: 20
        accountTelephoneNumber:
          type: string
          description: >-
            The account telephone number assigned by the current service
            provider.
          maxLength: 12
        endUserName:
          type: string
          description: The name of the end user associated with the telephone number.
          maxLength: 100
        authorizingUserName:
          type: string
          description: The name of the end user who signed the authorization.
          maxLength: 100
        customerCode:
          type: string
          description: The customer code associated with the service provider.
          maxLength: 3
        endUserPin:
          type: string
          description: The end user personal identification number (PIN).
          maxLength: 50
        endUserPassword:
          type: string
          description: The end user password to access the CSR, if applicable.
          maxLength: 100
        addressLine1:
          type: string
          description: Address line 1 portion of the service address.
          maxLength: 200
        city:
          type: string
          description: City where the telephone number is being serviced.
          maxLength: 100
        state:
          type: string
          description: State or province abbreviation (XX format).
          maxLength: 2
        zipCode:
          type: string
          description: >-
            ZIP code or postal code where the telephone number is being
            serviced.
          maxLength: 10
        typeOfService:
          type: string
          description: The type of service identifying the end user account.
          maxLength: 50
        status:
          type: string
          description: The order status.
        workingTelephoneNumber:
          type: string
          description: Working telephone number in E.164 format.
        billingTelephoneNumber:
          type: string
          description: Billing telephone number in E.164 format.
        customerName:
          type: string
          description: The subscriber name associated with the telephone number.
        authorizingPersonName:
          type: string
          description: The name of the person authorizing the CSR request.
        workingTelephoneNumbersOnAccount:
          type: array
          description: List of all telephone numbers on the account.
          items:
            type: string
        csrServiceAddress:
          type: object
          description: The service address for the CSR.
          properties:
            houseNumber:
              type: string
            streetName:
              type: string
            city:
              type: string
            stateCode:
              type: string
            zip:
              type: string
            country:
              type: string
            addressType:
              type: string
    csrOrderStatus:
      type: string
      description: The current status of the CSR order.
      enum:
        - RECEIVED
        - PROCESSING
        - ACTION_REQUIRED
        - COMPLETE
        - FAILED
        - REQUESTED_CANCEL
        - CANCELLED
    csrOrderResponseJson:
      type: object
      description: JSON response for a created CSR order.
      properties:
        orderId:
          type: string
          description: The Bandwidth-assigned identifier for this CSR order.
