    csrListResponseXmlExample:
      summary: XML example for listing CSR orders
      value: |-
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <CsrResponses>
            <TotalCount>3</TotalCount>
            <CsrResponse>
