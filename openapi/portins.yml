    csrUpdateRequestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/csrRequestJson'
          examples:
            example:
              $ref: '#/components/examples/csrUpdateRequestJsonExample'
        application/xml:
          schema:
            $ref: '#/components/schemas/csr'
          examples:
            example:
              $ref: '#/components/examples/csrUpdateRequestXmlExample'
  responses:
    csrListResponse200:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/csrResponsesJson'
          examples:
            example:
              $ref: '#/components/examples/csrListResponseJsonExample'
        application/xml:
          schema:
            $ref: '#/components/schemas/csrResponses'
          examples:
