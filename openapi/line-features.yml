      title: Link
      description: The URI link details to self or a related resource with the relation
      type: object
      properties:
        href:
          type: string
          description: URI of the link
          example: /resource/uri
        rel:
          type: string
          description: Specifies the relationship between this link and the resource
          example: self
        method:
          type: string
          description: HTTP method to be used
          example: GET
      required:
        - href
        - rel
        - method
    code:
      type: integer
      format: int32
      description: >-
        An application-specific error code for services with extensive error
        scenarios to supplement `description`
      minimum: 4
      example: 51130
    errorDescription:
      type: string
      description: >-
        A human-readable explanation that SHOULD be specific to this occurrence
        of the problem
      example: There was an issue with a field in your request body
    errorType:
      type: string
      description: >-
        A short, human-readable summary of the problem that SHOULD NOT change
        from occurrence to occurrence of the problem
      example: REQUEST_ERROR
    errorSource:
      title: Error Source
      type: object
      properties:
        parameter:
          type: string
          description: A string indicating which URI query parameter caused the error
          example: someParameter
        field:
          type: string
          description: A string indicating which request body field caused the error
          example: someField
        header:
          type: string
          description: A string indicating which header field caused the error
          example: someHeader
        reference:
          type: string
          description: >-
            A string that references a resource ID or path to the resource (or
            non-existent resource) causing the error
          example: /some/reference
