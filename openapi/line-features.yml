      in: query
      required: true
      schema:
        type: string
      example: '+19199918388'
    resultsPerPageDlda:
      description: The number of items to include in a page.
      example: 5000
      in: query
      name: size
      required: false
      schema:
        default: 500
        type: integer
    pageStartIdDlda:
      description: >-
        An ID of the first element in a page.  This value will indicate the
        first value, not the page number, of the initial entry in the page being
        requested.<br> It can be an id of address. The initial page is tagged
        with the ID `1`.
      example: '3'
      in: query
      name: page
      required: false
      schema:
        default: '1'
        type: string
    searchTextDlda:
      description: The text to search simultaneously through e911locationIds.
      example: name
      in: query
      name: suggestions
      required: false
      schema:
        type: string
