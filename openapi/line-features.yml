openapi: 3.0.1
info:
  title: Line Features
  description: >-
    Bandwidth's Line Features API


    This API provides endpoints to manage TN Options orders for phone number
    information as well as Line Information Database (LIDB) and 

    Directory Listing/Directory Assistance (DLDA) orders.
  contact:
    name: Bandwidth
    url: https://dev.bandwidth.com/apis/numbers-apis/line-features/
    email: support@bandwidth.com
  version: 1.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-service/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
security:
  - Basic: []
  - Bearer: []
paths:
  /accounts/{accountId}/tnoptions:
    get:
      tags:
        - TN Options
      description: >-
        Retrieve a list of the TN Options orders that are associated with the
        account. A maximum of 1,000 orders can be retrieved per request. If no
        date range or specific query parameter (marked by <b>*</b> below) is
        provided, the order results will be limited to the last two years.
      operationId: getTnOptionOrders
      summary: Retrieve list TN Options orders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/statusQueryParam'
        - $ref: '#/components/parameters/tnQueryParam'
        - $ref: '#/components/parameters/customerOrderIdQueryParam'
        - $ref: '#/components/parameters/modifiedDateFromQueryParam'
        - $ref: '#/components/parameters/modifiedDateToQueryParam'
        - $ref: '#/components/parameters/createdDateFromQueryParam'
        - $ref: '#/components/parameters/createdDateToQueryParam'
        - $ref: '#/components/parameters/lastModifiedAfterQueryParam'
        - $ref: '#/components/parameters/lastModifiedByQueryParam'
        - $ref: '#/components/parameters/orderIdFragmentQueryParam'
        - $ref: '#/components/parameters/orderIdDetailsQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/getTnOptionOrdersSummaryResponse'
        '400':
          $ref: '#/components/responses/getTnOptionOrders400Response'
    post:
      tags:
        - TN Options
      description: >
        Create TN Options order to assign line features to the telephone number.


        **The two data elements in the submission are:**

        - **TnOptionGroups**: A list of TnOptionGroup objects, each containing a
        list of telephone numbers and a set of TN Options to assign to all TNs
        in the list.

        - **CustomerOrderId**: Optional customer-defined reference ID for this
        order. Only alphanumeric values, dashes, and spaces are allowed. Max
        length is 255 characters (JSON) or 40 characters (XML). Not unique —
        Bandwidth applies no uniqueness constraint, so multiple orders may share
        the same value. Each order receives its own unique Bandwidth-assigned
        `orderId`.


        **Valid attributes for TnOptionGroup object:**


        | XML Attribute             | JSON Name               | Product     |
        Number Region | VCP Support        |

        |--------------------------
        |-------------------------|-------------|---------------|--------------------|

        | TelephoneNumbers          | phoneNumbers            |            
        |               | Both               |

        | PortOutPasscode           | portOutPasscode         | Numbers     |
        NANP          | Both               |

        | Protected                 | protected               | Numbers     |
        NANP          | Both               |

        | Sms                       | sms                     | Messaging  
        |               | Both               |

        | A2pSettings               | a2pSettings             | Messaging   |
        NANP          | Both               |

        | NNID                      | nnid                    | Messaging   |
        NANP          | Both               |

        | ESPID                     | espid                   | Voice       |
        NANP          | VCP Disabled Only  |

        | CallForward               | callForward             | Voice      
        |               | VCP Disabled Only  |

        | CallVerificationEnabled   | callVerificationEnabled | Voice       |
        NANP          | VCP Disabled Only  |

        | CallingNameDisplay        | callingNameDisplay      | Voice       |
        NANP          | VCP Disabled Only  |

        | FinalDestinationUri       | finalDestinationUri     | Voice       |
        NANP          | VCP Disabled Only  |

        | NumberFormat              | numberFormat            | Voice       |
        NANP          | VCP Disabled Only  |

        | OriginationRoutePlan      | originationRoutePlan    | Voice       |
        NANP          | VCP Disabled Only  |

        | PindropEnabled            | pindropEnabled          | Voice       |
        NANP          | VCP Disabled Only  |

        | RPIDFormat                | rpidFormat              | Voice       |
        NANP          | VCP Disabled Only  |

        | RewriteUser               | rewriteUser             | Voice       |
        NANP          | VCP Disabled Only  |


        **Valid attributes for A2P Settings object:**


        | XML Attribute             | JSON Name               | Product     |
        Number Region | VCP Support        |

        |--------------------------
        |-------------------------|-------------|---------------|--------------------|

        | CampaignId                | campaignId              | Messaging   |
        NANP          | Both

        | Action                    | action                  | Messaging   |
        NANP          | Both               |


        **Valid attributes for Origination Route Plan object:**


        | XML Attribute             | JSON Name               | Product     |
        Number Region | VCP Support        |

        |--------------------------
        |-------------------------|-------------|---------------|--------------------|

        | Id                        | id                      | Voice       |
        NANP          | VCP Disabled Only  |

        | Action                    | action                  | Voice       |
        NANP          | VCP Disabled Only  |

        | Route (object)            | route                   | Voice       |
        NANP          | VCP Disabled Only  |


        **Valid attributes for Route object:**


        | XML Attribute             | JSON Name               | Product     |
        Number Region | VCP Support        |

        |--------------------------
        |-------------------------|-------------|---------------|--------------------|

        | Name                      | name                    | Voice       |
        NANP          | VCP Disabled Only  |

        | Endpoint                  | endpoint                | Voice       |
        NANP          | VCP Disabled Only  |

        | Priority                  | priority                | Voice       |
        NANP          | VCP Disabled Only  |

        | Weight                    | weight                  | Voice       |
        NANP          | VCP Disabled Only  |

        | EndpointType              | endpointType            | Voice       |
        NANP          | VCP Disabled Only  |



        When attributes tagged NANP are passed in the request body, only North
        American Numbering Plan phone numbers are allowed and updated.


        **Values for each TnOptionGroup object attribute:**

        - **TelephoneNumbers**:  
          - A list of telephone numbers as an array of strings.  
          - Each string is an E.164 formatted telephone number. If not E.164, assumes NANP 10-digit format.
        - **PortOutPasscode**: `[{custom string value} | UNCHANGED |
        SYSTEM_DEFAULT]`

        - **Protected**: `[true | false | UNCHANGED | SYSTEM_DEFAULT]`

        - **Sms**: `[ON | OFF | UNCHANGED]`

        - **NNID**: `[{custom integer value} | UNCHANGED | SYSTEM_DEFAULT]`

        - **CallForward**: `[10-digit phone number (string)  | UNCHANGED |
        SYSTEM_DEFAULT]`

        - **CallVerificationEnabled**: `[true | false]`

        - **CallingNameDisplay**: `[ON | OFF | UNCHANGED | SYSTEM_DEFAULT]`

        - **ESPID**: `[{custom string value} | UNCHANGED | SYSTEM_DEFAULT]`

        - **FinalDestinationUri**: `[{custom string value} | UNCHANGED |
        SYSTEM_DEFAULT]`

        - **NumberFormat**: `[10DIGIT | 11DIGIT | E164 | UNCHANGED |
        SYSTEM_DEFAULT]`

        - **OriginationRoutePlan**: `object`
            - **Id**: UUID that Bandwidth generates to identify the route plan.
            - **Action**: `[UNCHANGED | OFF | AS_SPECIFIED]`
            - **Route**:
                - **Name**: `[{custom string value} | UNCHANGED | SYSTEM_DEFAULT]`
                - **Endpoint**: `[{custom string value} | UNCHANGED | SYSTEM_DEFAULT]`
                - **Priority**: `[1-1000]`
                - **Weight**: `[1-1000]`
                - **EndpointType**: `[TN | IPv4 | SIP | FQDN]`
        - **A2PSettings**: `object`
          - **CampaignId**: `[{custom string value} | UNCHANGED | SYSTEM_DEFAULT]`
          - **Action**: `[UNCHANGED | SYSTEM_DEFAULT | OFF | DELETE | AS_SPECIFIED]`
        - **PindropEnabled**: `[true | false]`

        - **RPIDFormat**: `[10DIGIT | 11DIGIT | E164 | UNCHANGED |
        SYSTEM_DEFAULT]`

        - **RewriteUser**: `[{custom string value} | UNCHANGED |
        SYSTEM_DEFAULT]`

        - For all the above attributes:  
          - `SYSTEM_DEFAULT`: Removes the element profile value, reverting the TN to default system behavior.  
          - `UNCHANGED`: Value remains unchanged (read before write model. Leaving the element out of the payload is equivalent to `UNCHANGED`).

        **A2pSettings attribute actions:**


        | Number attribute | Action value   | Description of
        action                                                                                           
        |

        |------------------|----------------|------------------------------------------------------------------------------------------------------------------|

        | LongCode         | SYSTEM_DEFAULT | Removes the per-TN A2P attributes,
        and it reverts to the Location/SIP Peer
        characteristics.                      |

        | LongCode         | AS_SPECIFIED   | Sets the message class and
        campaign ID - this is the default if
        unspecified.                                     |

        | LongCode         | OFF            | Will set the TN as a 'P' TN. Any
        values for Class or Campaign ID are not
        valid.                                  |

        | LongCode         | DELETE         | Will delete the campaign ID from
        TN. Any values for Class or Campaign ID are not
        valid.                          |

        | LongCode         | UNCHANGED      | Do nothing with respect to
        A2P.                                                                                 
        |

        | TollFree         | SYSTEM_DEFAULT | Removes the per-TN A2P attributes,
        and it reverts to the Location/SIP Peer
        characteristics.                      |

        | TollFree         | AS_SPECIFIED   | Sets the message class and
        campaign ID - this is the default if
        unspecified.                                     |

        | TollFree         | OFF            | If set to is 'ON', this is valid
        for Toll Free numbers. If set to 'OFF', this is invalid for Toll Free
        Numbers.  |

        | TollFree         | UNCHANGED      | Do nothing with respect to
        A2P.                                                                                 
        |
      operationId: createTnOptionOrder
      summary: Create TN Options order
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/tnOptionOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/tnOptionOrderCreatedResponse'
        '400':
          $ref: '#/components/responses/tnOptionOrder400Response'
  /accounts/{accountId}/tnoptions/{orderId}:
    get:
      tags:
        - TN Options
      description: Retrieve information about a TN Options order with specified ID.
      operationId: getTnOptionOrder
      summary: Retrieve TN Options order
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getTnOptionOrderResponse'
        '400':
          $ref: '#/components/responses/getTnOptionOrder400Response'
  /accounts/{accountId}/tnoptions/{orderId}/history:
    get:
      tags:
        - TN Options
      description: Retrieve the history information associated with an order.
      operationId: getOrderHistory
      summary: Retrieve TN Options order history
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getTnOptionOrderHistory200Response'
        '400':
          $ref: '#/components/responses/badTnOptionRequestError'
        '404':
          $ref: '#/components/responses/getTnOptionOrderHistory404Response'
  /accounts/{accountId}/lidbs:
    get:
      tags:
        - LIDB Orders
      operationId: listLidbOrders
      summary: List LIDB orders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/requiredTnQueryParam'
        - $ref: '#/components/parameters/lastModifiedAfterQueryParam'
        - $ref: '#/components/parameters/modifiedDateFromQueryParam'
        - $ref: '#/components/parameters/modifiedDateToQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/lidbOrderGet200Response'
        '400':
          $ref: '#/components/responses/lidbOrderGet400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    post:
      tags:
        - LIDB Orders
      operationId: createLidbOrder
      summary: Create LIDB order
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/lidbOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/lidbOrderPostSuccessResponse'
        '400':
          $ref: '#/components/responses/lidbOrderPostErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/lidbRemovalOrders:
    post:
      tags:
        - LIDB Orders
      operationId: createLidbRemovalOrder
      summary: Create LIDB removal order
      description: >
        This endpoint triggers an overwrite action with our CNAM vendors. The
        overwrite sets the CNAM value to Unknown for the specified phone
        number(s).

        This operation is typically used when the existing CNAM data needs to be
        deleted.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/lidbRemovalOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/lidbRemovalOrderPostSuccessResponse'
        '400':
          $ref: '#/components/responses/lidbRemovalOrderPostErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/lidbs/{lidbId}:
    get:
      tags:
        - LIDB Orders
      operationId: readLidbOrder
      summary: Fetch LIDB order status
      description: >
        The descriptive payload for the LIDB Orders query provides a broad range
        of information about the LIDB Order identified in the URL. Included
        amongst the information is:      
          - **errors**: The errors discovered with codes and explanations.
          - **Various Dates**: Such as order creation, modification, and completion dates.
          - **processingStatus** (`RECEIVED`, `PROCESSING`, `COMPLETE`, `PARTIAL`, `FAILED`): The overall status of the order.
          - **lidbPhoneNumberGroups**: List of LidbTnGroup elements that contains a list of TNs with SubscriberInformation, UseType (`RESIDENTIAL` or `BUSINESS`), and Visibility (`PUBLIC` or `PRIVATE`).
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/lidbIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/lidbOrderGetIdResponse'
        '400':
          $ref: '#/components/responses/lidbOrderGetId400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/lidbOrderGetId404Response'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/dldas:
    get:
      tags:
        - DLDA Orders
      operationId: readDldaOrders
      summary: List DLDA orders
      description: >
        Retrieve a list of the DLDA orders that are associated with the account.
        A maximum of 1,000 orders can be retrieved per request. 

        If no date range or specific query parameter is provided, the order
        results will be limited to the last two years. 

        Results can be sorted by a specified field.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParamDlda'
        - $ref: '#/components/parameters/tnQueryParamDlda'
        - $ref: '#/components/parameters/pageStartIdDlda'
        - $ref: '#/components/parameters/resultsPerPageDlda'
        - $ref: '#/components/parameters/searchTextDlda'
      responses:
        '200':
          $ref: '#/components/responses/dldaOrdersGet200Response'
        '400':
          $ref: '#/components/responses/dldaOrderGet400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    post:
      tags:
        - DLDA Orders
      operationId: createDldaOrder
      summary: Create DLDA order
      description: >
        Business Listings: Sorted starting from the beginning of the business
        name. Enter the full business name in the LastName field.Leave the
        FirstName field blank unless there is a non-sorting part of the name,
        which can be placed in FirstName. 

        Example: For "Joe's Pizza, the best pizza in town", use LastName: "Joe's
        Pizza", FirstName: "the best pizza in town". 

        Residential Listings: Sorted by the LastName field as usual.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParamDlda'
      requestBody:
        $ref: '#/components/requestBodies/dldaCreateOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/dldaOrdersPost201Response'
        '400':
          $ref: '#/components/responses/dldaOrdersPost400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/dldas/{orderId}:
    get:
      tags:
        - DLDA Orders
      operationId: readDldaOrder
      summary: Fetching DLDA order status
      description: Retrieve information about a DLDA Order with specified ID.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParamDlda'
        - $ref: '#/components/parameters/orderIdPathParamDlda'
      responses:
        '200':
          $ref: '#/components/responses/dldaOrderIdGet200Response'
        '400':
          $ref: '#/components/responses/dldaOrderGet400ErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/dldaOrderIdGet404ErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
    put:
      tags:
        - DLDA Orders
      operationId: updateDldaOrder
      summary: Update DLDA order
      parameters:
        - $ref: '#/components/parameters/accountIdPathParamDlda'
        - $ref: '#/components/parameters/orderIdPathParamDlda'
      requestBody:
        $ref: '#/components/requestBodies/dldaUpdateOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/dldaOrdersUpdate200Response'
        '400':
          $ref: '#/components/responses/dldaOrdersUpdate400Response'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
  /accounts/{accountId}/dldas/{orderId}/history:
    get:
      tags:
        - DLDA Orders
      operationId: readDldaOrderHistory
      summary: Fetch DLDA order history
      description: >
        Retrieve the history information associated with a named DLDA order.  

        This indicates the various states that the order has passed through, as
        well as the current state of the order as the last entry.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParamDlda'
        - $ref: '#/components/parameters/orderIdPathParamDlda'
      responses:
        '200':
          $ref: '#/components/responses/dldaOrderIdGetHistory200Response'
        '400':
          $ref: '#/components/responses/dldaOrderGet400ErrorResponse'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/dldaOrderIdGetHistory404ErrorResponse'
        '429':
          $ref: '#/components/responses/errorResponse429'
        '500':
          $ref: '#/components/responses/errorResponse500'
components:
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security 

        tokens called bearer tokens. The name “Bearer authentication” can be
        understood as “give access to the bearer

        of this token.” The client must send this token in the `Authorization`
        header when making requests to

        protected resources.


        - Example: `Authorization: Bearer <token>`


        Where `<token>` should be replaced with the token string without angle
        brackets.


        For more information, see the following guide:
        [Credentials](https://dev.bandwidth.com/docs/account/credentials/management)
  parameters:
    accountIdPathParam:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        example: 1234567
      description: The unique account associated with the order.
    orderIdPathParam:
      name: orderId
      description: >
        Order ID is the unique identifier for the TN Options order. It is a UUID
        that is generated by Bandwidth when

        the order is created. It can be used to retrieve the details of a
        specific TN Options order.
      in: path
      required: true
      schema:
        type: string
      example: bf1305b8-8998-1111-2222-51ba3ce52d4e
    statusQueryParam:
      name: status
      description: The status of the TN Options order being searched for.
      in: query
      required: false
      schema:
        type: string
        enum:
          - RECEIVED
          - PROCESSING
          - COMPLETE
          - PARTIAL
          - FAILED
      example: PROCESSING
    tnQueryParam:
      name: phoneNumber
      description: |
        A phone number that is referenced in the order.
      in: query
      required: false
      schema:
        type: string
      example: '+19199918388'
    customerOrderIdQueryParam:
      name: customerOrderId
      description: >
        Filter orders by a customer-assigned reference ID. Because
        `customerOrderId` is not unique — Bandwidth applies no uniqueness
        constraint — this query may return multiple orders if the same value was
        used across multiple orders. Each result will have a distinct
        Bandwidth-assigned `orderId`. To retrieve a single specific order, use
        its `orderId` instead.
      in: query
      required: false
      schema:
        type: string
      example: ABCCorp12345
    modifiedDateFromQueryParam:
      name: modifiedDateFrom
      description: >
        For Date-based searches, the starting date of a date range (inclusive)
        that will be used to find TN Options

        orders that were modified within the date range. It is in the form
        yyyy-MM-dd.
      in: query
      required: false
      schema:
        type: string
      example: '2013-10-22'
    modifiedDateToQueryParam:
      name: modifiedDateTo
      description: >
        For Date-based searches, the ending date of a date range (inclusive)
        that will be used to find TN Options orders

        that were modified within the date range.  It is in the form yyyy-MM-dd.
      in: query
      required: false
      schema:
        type: string
      example: '2013-10-25'
    createdDateFromQueryParam:
      name: createdDateFrom
      description: >
        Checks the order's creation date against this value. Orders that have a
        creation date after this date will

        be included. Format is yyyy-MM-dd.
      in: query
      required: false
      schema:
        type: string
      example: '2013-10-22'
    createdDateToQueryParam:
      name: createdDateTo
      description: >
        Checks the order's creation date against this value. Orders that have a
        creation date before this date will

        be included. Format is yyyy-MM-dd.
      in: query
      required: false
      schema:
        type: string
      example: '2013-10-25'
    lastModifiedAfterQueryParam:
      name: lastModifiedAfter
      description: >
        Checks the order's last modified date against this value. Orders that
        have a modification date after this date

        will be included. Format is yyyy-MM-dd.
      in: query
      required: false
      schema:
        type: string
      example: '2013-10-25'
    lastModifiedByQueryParam:
      name: lastModifiedBy
      description: >-
        This is the user-name of the user that last modified the TN Options
        order.
      in: query
      required: false
      schema:
        type: string
      example: smckinnon
    orderIdFragmentQueryParam:
      name: orderIdFragment
      description: >
        <b>*</b> This search parameter represents the internal Bandwidth App API
        ID that has been assigned to

        the TN Options order. This parameter is the first few characters of the
        internal ID - 

        the entire ID does not need to be specified.
      in: query
      required: false
      schema:
        type: string
      example: ed1c0bed-e2
