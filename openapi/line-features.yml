tags:
  - name: TN Options
    description: Manage options for telephone numbers
  - name: LIDB Orders
    description: >-
      The LIDB Orders API enables usres to add or otherwise manage a request to
      add Calling Line Information to a phone number. The creation of a "Line
      Information Data Base (LIDB)" work order causes an update of a person's
      calling name identification in a network database. This is used to change
      the display of their name on the phone of the people that they call. Use a
      GET request on /accounts/{accountId}/lidbs to retrieve information about
      outstanding LIDBs orders and a POST to create those orders. A maximum of
      1,000 orders can be retrieved per request. If no date range or specific
      query parameter (marked by <b class="required">*</b> below) is provided,
      the order results will be limited to the last two years.
  - name: DLDA Orders
    description: >-
      The DLDA API enables users to create, update, retrieve, and list Directory
      Listing/Directory Assistance (DLDA) orders to update street addresses for
      telephone numbers. Use GET requests on /accounts/{accountId}/dldas to
      retrieve information about outstanding DLDA orders and POST to create new
      orders. A maximum of 1,000 orders can be retrieved per request. If no date
      range or specific query parameter is provided, the order results will be
      limited to the last two years.
