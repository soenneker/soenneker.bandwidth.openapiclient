    dldaOrderIdGet200Response:
      description: >
        The descriptive payload for the DlDA Orders query provides a broad range
        of information about the DLDA Order identified in the URL. Included
        amongst the information is:      

        - **errors**: The errors discovered with codes and explanations.

        - **Various Dates**: Such as order creation, modification, and
        completion dates.

        - **processingStatus**: The overall status of the order (`RECEIVED`,
        `PROCESSING`, `COMPLETE`, `PARTIAL`, `FAILED`).

        - **DldaPhoneNumberGroups**: List of DldaPhoneNumberGroup elements that
        contains list of Phone Number with Directory Listing and Directory
        Assistance information, SubscriberType(RESIDENTIAL or BUSINESS),
        ListingType(LISTED, NON_LISTED or NON_PUBLISHED).
      content:
        application/xml:
          examples:
            dldaOrderIdGet200ExampleResponse:
              $ref: '#/components/examples/dldaOrderIdGetXmlExampleResponse'
          schema:
            $ref: '#/components/schemas/dldaOrderResponse'
        application/json:
          examples:
            dldaOrderIdGet200ExampleResponse:
              $ref: '#/components/examples/dldaOrderIdGetJsonExampleResponse'
          schema:
            $ref: '#/components/schemas/jsonDldaOrderResponse'
