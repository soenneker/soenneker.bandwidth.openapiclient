          anyOf:
            - type: string
              title: Enum Values
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
            - type: string
              title: Custom Value
              pattern: (\+1[2-9][0-9]{2}[2-9]{6}|[2-9][0-9]{5,17})
              description: >-
                This field must be a string representing a valid call forwarding
                number. It permits either:

                A US number in the format +1NXXNXXXXXX (where N is 2-9, X is
                0-9).

                A number with 6 to 18 digits, starting with a digit 2-9.
