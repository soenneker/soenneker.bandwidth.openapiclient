            - type: string
              title: Custom Value
              description: >-
                This field must be a string up to 30 characters long, containing
                only letters (a-z, A-Z), digits (0-9),

                and the following symbols: +, @, :, ., (, ), _, ;, ?, =, -. No
                spaces or other special characters are allowed.
              pattern: ^[a-zA-Z0-9+@:.()_;?=-]{0,30}$
        CallForward:
          anyOf:
            - type: string
              title: Enum Values
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
            - type: string
              title: Custom Value
              pattern: (\+1[2-9][0-9]{2}[2-9]{6}|[2-9][0-9]{5,17})
              description: >-
                This field must be a string representing a valid call forwarding
                number. It permits either:

                A US number in the format +1NXXNXXXXXX (where N is 2-9, X is
                0-9).

                A number with 6 to 18 digits, starting with a digit 2-9.
        CallingNameDisplay:
          type: string
          enum:
            - 'ON'
            - 'OFF'
            - UNCHANGED
            - SYSTEM_DEFAULT
        PortOutPasscode:
          anyOf:
            - title: Custom Passcode
              type: string
              minLength: 4
              maxLength: 10
              pattern: ^[a-zA-Z0-9]+$
              description: |
                Custom alphanumeric value (4-10 chars).
            - title: Enum Values
              type: string
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
        Protected:
          type: string
          enum:
            - 'true'
            - 'false'
            - UNCHANGED
            - SYSTEM_DEFAULT
        Sms:
          type: string
          enum:
            - 'ON'
            - 'OFF'
            - UNCHANGED
            - SYSTEM_DEFAULT
        FinalDestinationURI:
          anyOf:
            - title: Custom Value
              type: string
              minLength: 10
              maxLength: 60
              description: >
                a 10 digit telephone number or a SIP URI ( without the sip:
                prefix ) in the form address-string@host IP:port, where the host
                IP is an IPv4 address in the standard numerical n.n.n.n. form,
                and the port is numeric, and optional containing [a-z,A-Z,0-9],
                with ':', '.' and '@' to delimit the components of the overall
                string, and less than 60 characters long.
            - title: Enum Values
              type: string
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
        A2pSettings:
          $ref: '#/components/schemas/a2pSettings'
        NNID:
          anyOf:
            - title: Custom Value
              type: string
              minLength: 1
              maxLength: 64
            - title: Enum Values
              type: string
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
        ESPID:
          anyOf:
            - title: Custom Value
              type: string
              minLength: 1
              maxLength: 64
            - title: Enum Values
              type: string
              enum:
                - UNCHANGED
                - SYSTEM_DEFAULT
        OriginationRoutePlan:
          $ref: '#/components/schemas/originationRoutePlan'
        PindropEnabled:
          type: string
          enum:
            - 'true'
            - 'false'
            - UNCHANGED
            - SYSTEM_DEFAULT
        CallVerificationEnabled:
          type: string
          enum:
            - 'true'
            - 'false'
        TelephoneNumbers:
          type: array
          items:
            type: string
            description: 10-digit TN
            xml:
              name: TelephoneNumber
