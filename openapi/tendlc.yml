    phoneNumberParam:
      name: phoneNumber
      in: query
      description: Filtering and sorting parameter for `phoneNumber`.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Schema for string query parameter
        properties:
          contains:
