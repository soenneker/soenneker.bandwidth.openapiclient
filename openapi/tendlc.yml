  requestBodies:
    newCampaignRequest:
      description: Campaign request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/newCampaign'
      required: true
    updatedCampaignRequest:
      description: Campaign request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/updatedCampaign'
      required: true
  responses:
    brandResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/brandResponse'
      description: An individual TCR brand in the standard response envelope.
    brandListResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/brandListResponse'
      description: A paged list of TCR brands in the standard response envelope.
    campaignCreatedResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/campaignCreatedResponse'
      description: >-
        An accepted response containing the Bandwidth ID that can be used to
        track the campaign's creation.
    campaignCustomerResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/campaignCustomerResponse'
      description: An individual TCR campaign in the customer response envelope.
    campaignListResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/campaignListResponse'
      description: A paged list of TCR campaigns in the standard response envelope.
    getCampaignPhoneNumbersResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getCampaignPhoneNumbersResponse'
      description: Get a paged response of phone numbers associated with a campaign.
    errorResponse400:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse400'
      description: Bad request. Cannot process the request.
    errorResponse401:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse401'
      description: Client is providing incorrect or invalid credentials.
    errorResponse403:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse403'
      description: Client is not authorized for this action.
    errorResponse404:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse404'
      description: >-
        Not found (either the endpoint, or the resource; the ID of the resource
        will be the description field of this response).
    errorResponse405:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse405'
      description: Method not allowed.
    errorResponse409:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse409'
      description: Conflict. A resource has been changed or already exists.
    errorResponse500:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse500'
      description: Internal Server Error.
    errorResponse503:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse503'
      description: Service Unavailable Error.
    noBodyResponse:
      description: >-
        Accepted with no body content returned. Status may be 202 (accepted),
        204 (no content), or 429 (client is being rate-limited).
    historyListResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/historyListResponse'
      description: A paged list of history records for this resource.
    registrationResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/registrationResponse'
      description: A 10DLC registration record.
    registrationListResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/registrationListResponse'
      description: A 10DLC registration record.
  schemas:
    approval:
      description: >-
        The status of registering a campaign with a carrier or external
        connectivity partner.
      examples:
        - partnerId: ATT
          decision: APRROVED
          messageClass: T
          tpm: 300
          mmsTpm: 300
        - partnerId: TMOBILE
          decision: APRROVED
          brandTier: UPPER_MID
          brandDailyCap: 40000
      properties:
        partnerId:
          $ref: '#/components/schemas/enumPartnerId'
        decision:
          $ref: '#/components/schemas/enumApprovalDecision'
        reason:
          type: string
          maxLength: 2048
          description: >-
            If the campaign was declined, we expect to receive an explanation as
            to why the carrier rejected the campaign, and that will be provided
            here. If the reason is longer than 2,048 characters, it will be
            silently truncated.
        messageClass:
          description: AT&T message class qualified by brand for a desired use case.
          type: string
          examples:
            - T
        tpm:
          description: >-
            AT&T SMS message segment throughput per minute, qualified by the
            brand for a desired use case.
          type: integer
          examples:
            - 2400
        mmsTpm:
          description: >-
            AT&T MMS message segment throughput per minute, qualified by the
            brand for a desired use case.
          type: integer
          examples:
            - 50
        brandTier:
          $ref: '#/components/schemas/enumTmobileBrandTier'
        brandDailyCap:
          description: T-Mobile daily message quota, applying across campaigns and CSPs.
          type: integer
          examples:
            - 40000
    getCampaignPhoneNumbersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/registration'
        page:
          $ref: '#/components/schemas/responsePage'
        errors:
          description: The errors array will always be empty for successful responses.
          type: array
          items:
            $ref: '#/components/schemas/errorEntry'
          examples:
            - []
        links:
          items:
            $ref: '#/components/schemas/responseLink'
          readOnly: true
          type: array
    brand:
      description: The properties needed to create or update a TCR brand.
      required:
        - bandwidthId
        - customerProfileId
        - entityType
        - displayName
        - phone
        - country
        - brandRelationship
      properties:
        brandId:
          description: >-
            The TCR-generated identifier for this brand. The TCR and Bandwidth
            identifiers are interchangeable in the Bandwidth APIs and either can
            be used to retrieve information about the brand.
          type: string
          examples:
            - B1DER2J
        bandwidthId:
          description: >-
            The Bandwidth-generated identifier for this brand. The TCR and
            Bandwidth identifiers are interchangeable in the Bandwidth APIs and
            either can be used to retrieve information about the brand. The
            bandwidthId will be available on the brand before the TCR ID is
            available.
          type: string
          examples:
            - WEPTN2N2T5
        accounts:
          description: The accounts associated to this brand.
          type: array
          items:
            $ref: '#/components/schemas/brandAccount'
          examples:
            - accountId: '5001923'
              customerProfileId: 3IIzIFnRRQBE3AMzPpMTNo
            - accountId: '5001925'
              customerProfileId: 1D3FEV9bOfq6sWLSlRDebp
        createdDate:
          format: date-time
          type: string
          description: The time the brand was created in the TCR system.
          examples:
            - '2024-01-24T23:59:59Z'
        modifiedDate:
          format: date-time
          type: string
          description: The time the brand was last modified in the Bandwidth system.
          examples:
            - '2024-01-24T23:59:59Z'
        imported:
          type: boolean
        brandIdentityStatus:
          $ref: '#/components/schemas/enumBrandIdentityStatus'
        brandType:
          $ref: '#/components/schemas/enumBrandType'
        brandRelationship:
          $ref: '#/components/schemas/enumBrandRelationship'
        city:
          type: string
          maxLength: 100
          examples:
            - New York
        companyName:
          description: Legal Company Name. Not required for Sole Proprietor.
          type: string
          maxLength: 100
          examples:
            - Acme Amalgamated, Inc.
        displayName:
          type: string
          maxLength: 100
          examples:
            - Acme
        ein:
          description: >-
            Government assigned corporate tax ID, EIN is 9-digits in U.S. Not
            required for Sole_Proprietor.
          type: string
          maxLength: 9
          examples:
            - 214573154
        einIssuingCountry:
          description: ISO 2 character country code.
          type: string
          examples:
            - US
        email:
          description: Valid email address of brand support contact.
          type: string
          maxLength: 100
        evpVettingScore:
          description: External vetting provider's score for this brand.
          type: integer
          format: int32
          examples:
            - 200
        governmentEntity:
          description: >-
            Is this brand closely affiliated to a federal, state, local, or
            tribal government entity?
          type: boolean
        phone:
          description: Valid phone number in e.164 international format.
          type: string
          examples:
            - '+18009999999'
        politicalCommitteeLocale:
          $ref: '#/components/schemas/enumPoliticalCommitteeLocale'
        postalCode:
          description: Postal codes. Use 5 digit zipcode for United States.
          type: string
          maxLength: 5
          examples:
            - '12345'
        russell3000:
          description: Is this a publicly-traded company in the Russell 3000 index?
          type: boolean
        section527:
          description: >-
            Is this company a tax-exempt organization organized under Section
            527 of the U.S. Internal Revenue Code?
          type: boolean
        state:
          description: State name. Must be 2 letters code for United States.
          type: string
          maxLength: 2
          examples:
            - NC
        street:
          type: string
          maxLength: 100
          examples:
            - 123 Sesame St.
        stockExchange:
          $ref: '#/components/schemas/enumStockExchangeSymbols'
        stockSymbol:
          type: string
          examples:
            - BANDW
        taxExemptStatus:
          type: string
          description: >
            Nonprofit organization tax-exempt status per section 501 of the US
            tax code. Example: “501c3.” Please refer to
            https://ballotpedia.org/IRS_code,_section_501 for more information.
        website:
          type: string
          examples:
            - acme.com
        vertical:
          $ref: '#/components/schemas/enumVertical'
        businessContactEmail:
          description: >-
            Valid business email address of brand. This is a *mandatory* field
            for PUBLIC_PROFIT brands. For other types, TCR will ignore this
            value. This *cannot* be group/support email ID, i.e.
            support@company.com
          maxLength: 100
          type: string
        businessContactEmailVerifiedDate:
          description: >-
            Date when business email address was verified. This will be after
            TCR sends a 2FA email verification to the business email provided in
            businessContactEmail field. This will only be populated for
            PUBLIC_PROFIT brands after the verification is completed.
          maxLength: 100
          type: string
    brandAccount:
