    errorEntry:
      type: object
      properties:
        type:
          type: string
          description: >-
            A short, human-readable description of the type of error (e.g. "bad
            request").
          examples:
            - bad request
        description:
          type: string
          description: A full description of the error (e.g. "name cannot be blank").
          examples:
            - accountId is required
        source:
          type: object
          additionalProperties:
            type: string
          description: >
            A map from the type of source to a value for that type. The
            supported keys are: 1) POINTER (the value is a RFC6901 JSON pointer
            to a field in the request body); 2) PARAMETER (the value is a query
            parameter name); and 3) PATH (the value is a parameter name in the
            URI of the request). There will only be one entry in the source
            property, as each error is recorded separately in the errors array.
          examples:
            - POINTER: /accountId
