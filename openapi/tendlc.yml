          readOnly: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/campaignSummary'
          readOnly: true
        errors:
          description: The errors array will always be empty for successful responses.
          type: array
          items:
            $ref: '#/components/schemas/errorEntry'
          examples:
            - []
        page:
          $ref: '#/components/schemas/responsePage'
    campaign:
      description: The properties needed to create or update a TCR campaign.
      properties:
        campaignId:
          description: >-
            The TCR-generated identifier for campaign. The TCR and Bandwidth
            identifiers are interchangeable in the Bandwidth APIs and either can
            be used to retrieve information about the campaign.
          type: string
          examples:
            - CA9D2FS
        bandwidthId:
          description: >-
            The Bandwidth-generated identifier for this campaign. The TCR and
            Bandwidth identifiers are interchangeable in the Bandwidth APIs and
            either can be used to retrieve information about the campaign.
          type: string
          examples:
            - WEPTN2N2T5
        attMessageClass:
          type: string
          examples:
            - T
        cspId:
          type: string
          description: >-
            For import accounts, the CSP ID of their CSP account with TCR.
            Otherwise it's the Bandwidth CSP ID.
          examples:
            - S3TXDL4
        customerProfileId:
          description: The Bandwidth customer profile to associate to the brand.
          type: string
          examples:
            - 3IIzIFnRRQBE3AMzPpMTNo
        brandId:
          description: The TCR-generated identifier for the brand associated to this brand.
          type: string
          examples:
            - B1DER2J
        campaignName:
          description: >-
            A user-supplied name for this campaign. Because this name is not
            stored in TCR, imported campaigns will default to the campaign’s TCR
            ID, though this is editable via the Bandwidth APIs.
          type: string
          examples:
            - Acme, Inc.
        imported:
          description: Whether the campaign is imported from TCR
          type: boolean
        status:
          $ref: '#/components/schemas/enumCampaignStatus'
        createdDate:
          format: date-time
          description: The time the brand was created in the TCR system.
          type: string
        modifiedDate:
          format: date-time
          description: The time the brand was last modified in the Bandwidth system.
          type: string
        accountId:
          type: string
          description: The Bandwidth Account owning the campaign.
          examples:
            - '5001923'
        approvals:
          description: >-
            The status of the campaign’s acceptance by the external partners as
            well as the carriers. If a carrier suspends a campaign, this will
            also be reported here. The status of these approvals overall is
            reflected in the status of the campaign. For example, if any partner
            or carrier declines the campaign, the campaign’s status will be
            `DECLINED`.
          type: array
          items:
            $ref: '#/components/schemas/approval'
        usecase:
          $ref: '#/components/schemas/enumCampaignUsecases'
        subUsecases:
          type: array
          items:
            $ref: '#/components/schemas/enumCampaignUsecases'
        resellerId:
          description: >-
            Alphanumeric identifier of the reseller that you want to associate
            with this campaign.
          type: string
          examples:
            - R1D4SJK
        description:
          description: Summary description of this campaign.
          type: string
          minimum: 40
          maximum: 4096
          examples:
            - Effectively the name/label of the campaign
        embeddedLink:
          description: Does message generated by the campaign include URL link in SMS?
          default: false
          type: boolean
        embeddedPhone:
          description: Does message generated by the campaign include phone number in SMS?
          default: false
          type: boolean
        termsAndConditions:
          description: Does campaign include terms and conditions?
          default: false
          type: boolean
        numberPool:
          description: Does campaign utilize pool of phone numbers?
          default: false
          type: boolean
        ageGated:
          description: Age gated content in campaign?
          default: false
          type: boolean
        directLending:
          description: >-
            Will the campaign include content related to direct lending or other
            loan arrangements?
          default: false
          type: boolean
        subscriberOptIn:
          description: >-
            Does campaign require subscriber to opt-in before SMS is sent to
            subscriber?
          default: false
          type: boolean
        subscriberOptOut:
          description: Does campaign support subscriber opt-out keyword(s)?
          default: false
          type: boolean
        subscriberHelp:
          description: >-
            Have you implemented a response to the HELP keyword informing
            customers of how they can contact the message sender?
          default: false
          type: boolean
        sample1:
          description: >-
            Message sample. Some campaign tiers require 1 or more message
            samples.
          type: string
          minimum: 20
          maximum: 1024
        sample2:
          description: >-
            Message sample. Some campaign tiers require 2 or more message
            samples. Required for some usecases.
          type: string
          minimum: 20
          maximum: 1024
        sample3:
          description: >-
            Message sample. Some campaign tiers require 3 or more message
            samples. Required for some usecases.
          type: string
          minimum: 20
          maximum: 1024
        sample4:
          description: >-
            Message sample. Some campaign tiers require 4 or more message
            samples. Required for some usecases.
          type: string
          minimum: 20
          maximum: 1024
        sample5:
          description: >-
            Message sample. Some campaign tiers require 5 or more message
            samples. Required for some usecases.
          type: string
          minimum: 20
          maximum: 1024
        messageFlow:
          description: Message flow description.
          type: string
          minimum: 40
          maximum: 2048
        helpMessage:
          description: Help message of the campaign.
          type: string
          minimum: 20
          maximum: 1024
        helpKeywords:
          description: >-
            Help keywords of the campaign. TCR will default the value to HELP.
            Multiple keywords are comma separated without space.
          type: string
          maximum: 320
        optinMessage:
          description: Opt-In message of the campaign.
          type: string
          minimum: 20
          maximum: 1024
        optinKeywords:
          description: >-
            Opt-In keywords of the campaign. Multiple keywords are comma
            separated without space.
          type: string
          maximum: 320
        optoutMessage:
          description: Opt-Out message of the campaign.
          type: string
          minimum: 20
          maximum: 1024
        optoutKeywords:
          description: >-
            Opt-Out keywords of the campaign. TCR will default the value to
            STOP. Multiple keywords are comma separated without space.
          type: string
          maximum: 320
        privacyPolicyLink:
          description: Privacy policy link of the campaign.
          type: string
          maximum: 255
        termsAndConditionsLink:
          description: Terms and conditions link of the campaign.
          type: string
          maximum: 255
        embeddedLinkSample:
          description: Sample of an embedded link in messages.
          type: string
          maximum: 255
        vettingStatus:
          $ref: '#/components/schemas/enumCampaignVettingStatus'
      required:
        - brandId
        - usecase
        - description
        - sample1
        - messageFlow
        - helpMessage
        - optoutMessage
    newCampaign:
      description: The properties needed to create or update a TCR campaign.
      properties:
        campaignId:
          description: >-
            The TCR-generated identifier for campaign. The TCR and Bandwidth
            identifiers are interchangeable in the Bandwidth APIs and either can
            be used to retrieve information about the campaign.
          type: string
          examples:
            - CA9D2FS
        campaignName:
          description: >-
            A user-supplied name for this campaign. Because this name is not
            stored in TCR, imported campaigns will default to the campaign’s TCR
            ID, though this is editable via the Bandwidth APIs.
          type: string
          examples:
            - Acme, Inc.
      required:
        - campaignId
    updatedCampaign:
      description: The properties needed to create or update a TCR campaign.
      properties:
        campaignName:
          description: >-
            A user-supplied name for this campaign. Because this name is not
            stored in TCR, imported campaigns will default to the campaign’s TCR
            ID, though this is editable via the Bandwidth APIs.
          type: string
          examples:
            - Acme, Inc.
    campaignSummary:
      description: A summary description of a campaign.
      properties:
        campaignId:
          description: >-
            The TCR-generated identifier for campaign. The TCR and Bandwidth
            identifiers are interchangeable in the Bandwidth APIs and either can
            be used to retrieve information about the campaign.
          type: string
          examples:
            - CA9D2FS
        bandwidthId:
          description: >-
            The Bandwidth-generated identifier for this campaign. The TCR and
            Bandwidth identifiers are interchangeable in the Bandwidth APIs and
            either can be used to retrieve information about the campaign.
          type: string
          examples:
            - WEPTN2N2T5
        campaignName:
          description: >-
            A user-supplied name for this campaign. Because this name is not
            stored in TCR, imported campaigns will default to the campaign’s TCR
            ID, though this is editable via the Bandwidth APIs.
          type: string
          examples:
            - Acme, Inc.
        status:
          $ref: '#/components/schemas/enumCampaignStatus'
        customerProfileId:
          description: >-
            Alphanumeric identifier of the customer profile to associate with
            this campaign
          type: string
          examples:
            - 1TcAThKNW0B0Nwh0XwpdQT
        brandId:
          description: The TCR-generated identifier for this brand.
          type: string
          examples:
            - B1DER2J
        attMessageClass:
          type: string
          examples:
            - T
        usecase:
          $ref: '#/components/schemas/enumCampaignUsecases'
        description:
          description: Summary description of this campaign.
          type: string
          minimum: 40
          maximum: 4096
          examples:
            - Effectively the name/label of the campaign
        numberPool:
          description: Does campaign utilize pool of phone numbers?
          default: false
          type: boolean
        createdDate:
          format: date-time
          description: The time the brand was created in the TCR system.
          type: string
          examples:
            - 2024-09-24T21:52:03.876Z
        modifiedDate:
          format: date-time
          description: The time the brand was last modified in the Bandwidth system.
          type: string
          examples:
            - 2024-09-25T21:52:03.876Z
