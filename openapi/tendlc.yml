openapi: 3.1.0
info:
  title: A2P Campaign Management (10DLC)
  description: >
    *These APIs are available only to customers who have been onboarded for the
    10DLC Registration Center. They are not widely available to all customers
    yet. If you are interested in joining the Beta for the 10DLC Registration
    Center, please reach out to your Bandwidth support contact. Otherwise,
    please continue to reference the existing [Campaign Management
    APIs](https://dev.bandwidth.com/apis/numbers-apis/numbers/v1/#tag/10DLC).*


    APIs to register TCR brands and campaigns (or to import them if Bandwidth is
    not acting as a customers’s CSP), as well as APIs to register phone numbers
    to those campaigns in order to send A2P messages in the North American
    market.


    #### Account Types


    These beta APIs currently only support import customer accounts. They will
    eventually support both import and direct customer accounts. The behavior is
    always consistent for an account type, but reflects where the content of
    campaign management resides: with Bandwidth, or with The Campaign Registry.


    #### Bandwidth identifiers


    Some Bandwidth APIs return a `bandwidthId` for TCR resources that have a TCR
    identifier, such as `campaignId` and `brandId`. Because Bandwidth’s
    interaction with TCR is asynchronous, there are times when a resource exists
    in Bandwidth’s systems before it exists in TCR’s systems. In these
    situations we will return a `bandwidthId` which can be substituted for a
    `campaignId` or `brandId` where these would be included in an URL to
    reference that resource. Once a TCR identifier is available and being
    returned, you can switch to that identifier (though the Bandwidth ID will
    continue to work as an alternative).


    #### Rate Limiting


    API consumers may use these APIs at the rate of 3 requests per second, with
    unused requests “banked” (at the rate of 3 requests per second) up to 12
    requests, which can then be used to handle short periods of “bursty”
    traffic. This rate applies across the use of all v2 A2P APIs, not per API.
    If this limit is exceeded, the APIs will return HTTP 429 (Too Many
    Requests).


    Athena 10DLC returns the following headers on API requests to manage
    rate-limiting by clients:


    - `X-Rate-Limit-Limit` - the rate limit per second (currently 3)

    - `X-Rate-Limit-Remaining` - the number of remaining requests in this second
    (will be less than 3)

    - `X-Rate-Limit-Retry-After-Seconds` - the time to wait before further
    requests can be made (currently one second)


    In extraordinary circumstances, rate limits may need to change, so
    evaluating these headers is recommended.
  contact:
    name: Bandwidth Support
    email: support@bandwidth.com
    url: https://support.bandwidth.com
  termsOfService: https://www.bandwidth.com/legal/terms-of-use-bandwidthcom-web-sites/
  version: 0.0.1
security:
  - Basic: []
servers:
  - url: https://api.bandwidth.com/api/v2
paths:
  /accounts/{accountId}/tendlc/phoneNumbers:
    get:
      tags:
        - 10DLC
      summary: Get 10DLC phone numbers
      operationId: getTenDlcPhoneNumbers
      description: >
        **All customers.** Get all 10DLC phone numbers that have been registered
        for 10DLC A2P traffic under this account, across all campaigns. This is
        a paginated API that can be sorted and filtered by a number of the
        fields in the 10DLC records. For example, it accepts a customer profile
        ID to filter to those numbers that have been assigned to that customer
        profile.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/registrationStatusParam'
        - $ref: '#/components/parameters/phoneNumberParam'
        - $ref: '#/components/parameters/campaignIdParam'
        - $ref: '#/components/parameters/customerProfileIdParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/modifiedDateParam'
      responses:
        '200':
          $ref: '#/components/responses/registrationListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '409':
          $ref: '#/components/responses/errorResponse409'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/phoneNumbers/{phoneNumber}:
    get:
      tags:
        - 10DLC
      operationId: getTenDlcPhoneNumber
      summary: Get 10DLC phone number details
      description: >
        **All customers.** Get 10DLC phone number details, including information
        on the registration status of the number with the different mobile
        network operators.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/phoneNumberPathParam'
      responses:
        '200':
          $ref: '#/components/responses/registrationResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '409':
          $ref: '#/components/responses/errorResponse409'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/phoneNumbers/{phoneNumber}/history:
    get:
      tags:
        - 10DLC
      operationId: getTenDlcPhoneNumberHistory
      summary: Get 10DLC number provisioning history
      description: >
        **All customers.** Get the audit history of this 10DLC number, within
        the scope of activity occurring for this account. This is a paginated
        API sorted in reverse chronological order by default, but this can be
        changed with the `createdDate` query parameter.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/phoneNumberPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/messageParam'
        - $ref: '#/components/parameters/userNameParam'
      responses:
        '200':
          $ref: '#/components/responses/historyListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '409':
          $ref: '#/components/responses/errorResponse409'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/brands:
    get:
      tags:
        - Brands
      operationId: getBrands
      summary: Get all brands for this account
      description: >
        **All customers.** Get all brands that have been created for this
        account. This is a paginated API that can be sorted and filtered by a
        number of the fields in the brand record. For example, it accepts a
        customer profile ID to filter to the brand that has been assigned to
        that customer profile.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/customerProfileIdParam'
        - $ref: '#/components/parameters/bandwidthIdParam'
        - $ref: '#/components/parameters/brandIdParam'
        - $ref: '#/components/parameters/brandIdentityStatusParam'
        - $ref: '#/components/parameters/brandTypeParam'
        - $ref: '#/components/parameters/companyNameParam'
        - $ref: '#/components/parameters/displayNameParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/modifiedDateParam'
      responses:
        '200':
          $ref: '#/components/responses/brandListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/brands/{brandId}:
    get:
      tags:
        - Brands
      operationId: getBrand
      summary: Get details about a brand
      description: >
        Get details for this TCR brand (the actual details available to
        Bandwidth will differ substantially between import and direct
        customers).
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/brandIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/brandResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/campaigns:
    get:
      tags:
        - Campaigns
      operationId: getCampaigns
      summary: Get campaigns
      description: >
        **All customers.** Get all campaigns that have been created for this
        account. This is a paginated API that can be sorted and filtered by a
        number of the fields in the campaign record. For example, it accepts a
        customer profile ID to filter to those campaigns that have been assigned
        to that customer profile.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/brandIdParam'
        - $ref: '#/components/parameters/campaignNameParam'
        - $ref: '#/components/parameters/customerProfileIdsParam'
        - $ref: '#/components/parameters/campaignIdParam'
        - $ref: '#/components/parameters/bandwidthIdParam'
        - $ref: '#/components/parameters/campaignStatusParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/modifiedDateParam'
        - $ref: '#/components/parameters/vettingStatusParam'
      responses:
        '200':
          $ref: '#/components/responses/campaignListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
    post:
      tags:
        - Campaigns
      operationId: createCampaign
      summary: Create or import a new campaign
      description: >
        The manual import of a campaign only requires the `campaignId` field and
        optionally, the `campaignName` field. If a campaign name is not
        provided, the campaign’s ID will be used as the campaign’s name. All of
        the rest of the campaign will be retrieved from TCR. The `campaignName`
        is not stored in TCR’s system.


        The campaign will be associated to this account. A campaign cannot be
        imported into more than one account (though the brand it is associated
        to can span accounts). If the campaign has already been imported or is
        in the process of being imported (which can take some time), this
        endpoint will return a 409 (CONFLICT). If necessary, the campaign’s
        brand will be associated to this account (and it will be created if
        necessary). If the brand is created, it will be created with an
        accompanying customer profile to represent the brand (the profile can be
        edited after it is created). 


        If a campaign is changed outside of Bandwidth’s systems, we will receive
        notification and update the campaign, however, it is safe to re-import
        manually at any time.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/newCampaignRequest'
      responses:
        '202':
          $ref: '#/components/responses/campaignCreatedResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/campaigns/{campaignId}:
    get:
      tags:
        - Campaigns
      operationId: getCampaign
      summary: Get details about a campaign
      description: |
        **All customers.** Get details for this TCR campaign.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/campaignCustomerResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
    put:
      tags:
        - Campaigns
      operationId: updateCampaign
      summary: Update a campaign
      description: >-
        Import customers may submit a campaign to this endpoint to update the
        campaign name (if no `campaignName` is provided, or it is set to null,
        the campaign’s TCR ID will be used). All other fields can be left off as
        they will be ignored.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/updatedCampaignRequest'
      responses:
        '202':
          $ref: '#/components/responses/noBodyResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
    post:
      tags:
        - Campaigns
      operationId: refreshCampaign
      summary: Refresh a campaign from TCR’s system
      description: >
        Refresh the information in Bandwidth’s systems based on the records at
        TCR. This will not update the brand or 10DLC registrations associated
        with the campaign. This is useful if a state change occurs in the
        campaign that has not been detected by Bandwidth.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
      responses:
        '204':
          $ref: '#/components/responses/noBodyResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '409':
          $ref: '#/components/responses/errorResponse409'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
    delete:
      tags:
        - Campaigns
      operationId: deactivateCampaign
      summary: Deactivate a campaign
      description: >
        Delete a campaign from Bandwidth's system, starting by deregistering any
        associated phone numbers on the campaign. If any phone number fails to
        deregister, we will not delete the campaign. 

        Review the history of the campaign to see the status of the
        deactivation.


        The campaign will be removed from Bandwidth’s system. Any associated
        brand is left alone, even if this was the last campaign on that brand.
        The campaign remains in the TCR system.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
      responses:
        '202':
          $ref: '#/components/responses/noBodyResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/campaigns/{campaignId}/phoneNumbers:
    get:
      tags:
        - 10DLC
      operationId: getCampaignPhoneNumbers
      summary: Get 10DLC numbers on campaign
      description: >-
        **All customers.** Get all phone numbers associated with a campaign.
        This includes numbers that are correctly assigned and numbers that
        Bandwidth believes to be currently registered to the campaign in
        external systems due to provisioning errors.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/phoneNumberParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/modifiedDateParam'
        - $ref: '#/components/parameters/customerProfileIdParam'
      responses:
        '200':
          $ref: '#/components/responses/getCampaignPhoneNumbersResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/campaigns/{campaignId}/history:
    get:
      tags:
        - Campaigns
      operationId: getCampaignHistory
      summary: Get campaign provisioning history
      description: >
        **All customers.** Get the provisioning history for a campaign. This is
        a paginated API sorted in reverse chronological order, but this can be
        changed with the `createdDate` query parameter.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/campaignIdPathParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/messageParam'
        - $ref: '#/components/parameters/userNameParam'
      responses:
        '200':
          $ref: '#/components/responses/historyListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
  /accounts/{accountId}/tendlc/brands/{brandId}/history:
    get:
      tags:
        - Brands
      operationId: getBrandHistory
      summary: Get brand provisioning history
      description: >
        **All customers.** Get the provisioning history for a TCR brand. By
        default these records are sorted in reverse chronological order, but
        they can be sorted and filtered using the `createdDate` query parameter.
        This is a paginated API.
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/brandIdPathParam'
        - $ref: '#/components/parameters/brandIdParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/createdDateParam'
        - $ref: '#/components/parameters/messageParam'
        - $ref: '#/components/parameters/userNameParam'
      responses:
        '200':
          $ref: '#/components/responses/historyListResponse'
        '400':
          $ref: '#/components/responses/errorResponse400'
        '401':
          $ref: '#/components/responses/errorResponse401'
        '403':
          $ref: '#/components/responses/errorResponse403'
        '404':
          $ref: '#/components/responses/errorResponse404'
        '405':
          $ref: '#/components/responses/errorResponse405'
        '429':
          $ref: '#/components/responses/noBodyResponse'
        '500':
          $ref: '#/components/responses/errorResponse500'
        '503':
          $ref: '#/components/responses/errorResponse503'
components:
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your  HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`. Example: `Authorization:
        Basic ZGVtbZpwQDU1dzByZA==`.
  parameters:
    accountIdPathParam:
      name: accountId
      description: User's account ID.
      in: path
      required: true
      schema:
        type: string
        examples:
          - '1234567'
    displayNameParam:
      name: displayName
      in: query
      description: Filtering and sorting parameter for `displayName`
      style: deepObject
      explode: true
      required: false
      schema:
        title: String query parameter
        description: Scheme for string query parameter
        properties:
          contains:
            $ref: '#/components/schemas/displayName'
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: Acme
          - sort: DESC
    companyNameParam:
      name: companyName
      in: query
      description: Filtering and sorting parameter for `companyName`
      style: deepObject
      explode: true
      required: false
      schema:
        title: String query parameter
        description: Scheme for string query parameter
        properties:
          contains:
            $ref: '#/components/schemas/companyName'
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: Acme, Inc.
          - sort: DESC
    brandTypeParam:
      name: brandType
      in: query
      description: Filtering and sorting parameter for `brandType`
      style: deepObject
      explode: true
      required: false
      schema:
        title: String query parameter
        description: Scheme for string query parameter
        properties:
          contains:
            $ref: '#/components/schemas/enumBrandType'
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: NON_PROFIT
          - sort: DESC
    brandIdentityStatusParam:
      name: brandIdentityStatus
      in: query
      description: Filtering and sorting parameter for `brandIdentityStatus`
      style: deepObject
      explode: true
      required: false
      schema:
        title: String query parameter
        description: Scheme for string query parameter
        properties:
          contains:
            $ref: '#/components/schemas/enumBrandIdentityStatus'
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: VERIFIED
          - sort: DESC
    brandIdParam:
      name: brandId
      in: query
      description: >-
        Filtering and sorting parameter for `brandId`. This will be the
        TCR-assigned brand ID.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: BABC
          - sort: DESC
    brandIdPathParam:
      name: brandId
      description: >-
        This can be the TCR-assigned brand ID or the Bandwidth-assigned
        identifier for this brand, even before it is submitted to TCR.
      in: path
      required: true
      schema:
        type: string
        examples:
          - B5DG4HH
    campaignIdParam:
      name: campaignId
      in: query
      description: >-
        Filtering and sorting parameter for `campaignId`. This will be the
        TCR-assigned identifier for the campaign.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: CAB
          - sort: DESC
    campaignIdPathParam:
      name: campaignId
      description: >-
        This ID can be the TCR-assigned identifier for the campaign, or the
        internally generated identifier used by Bandwidth to track the campaign
        before it is submitted to TCR. The latter is returned when a campaign is
        created.
      in: path
      required: true
      schema:
        type: string
        examples:
          - CABCDEF
    bandwidthIdParam:
      name: bandwidthId
      in: query
      description: >-
        Filtering parameter for `bandwidthId`, the internally generated
        identified used by Bandwidth.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String query parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
        examples:
          - contains: WEPTN2N2T5
    campaignNameParam:
      name: campaignName
      description: Sorting and filtering parameter for `campaignName`.
      in: query
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - contains: Acme, Inc.
          - sort: DESC
    createdDateParam:
      name: createdDate
      in: query
      description: Sorting and filtering parameter for `createdDate`.
      style: deepObject
      explode: true
      required: false
      schema:
        title: DateTime Query Parameter
        description: Scheme for date & time query parameter
        properties:
          lt:
            type: string
            format: date-time
          gt:
            type: string
            format: date-time
          sort:
            $ref: '#/components/schemas/sort'
        examples:
          - lt: '2024-01-24T00:00:00Z'
          - gt: '2024-01-24T23:59:59Z'
          - sort: DESC
    customerProfileIdParam:
      name: customerProfileId
      in: query
      description: Filtering parameter for `customerProfileId`.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
        examples:
          - contains: Xa39
    customerProfileIdsParam:
      name: customerProfileIds
      in: query
      description: >-
        Filtering parameter for a list of `customerProfileId`. The API will
        return entities where the `customerProfileId` matches any of the values
        in the list.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: array
            items:
              type: string
        examples:
          - contains: '[a,b,c]'
    limitParam:
      name: limit
      in: query
      description: Limit (page size) for pagination
      required: false
      schema:
        type: number
        default: 50
        maximum: 250
        examples:
          - limit: 10
    messageParam:
      name: message
      in: query
      description: Filtering and sorting parameter for `message`.
      style: deepObject
      explode: true
      required: false
      schema:
        title: String Query Parameter
        description: Scheme for string query parameter
        properties:
          contains:
            type: string
        examples:
          - contains: created
    modifiedDateParam:
      description: Sorting parameter for `modifiedDate`.
      explode: true
      in: query
      name: modifiedDate
      required: false
      schema:
        description: Scheme for date & time query parameter
        examples:
          - gt: '2024-01-24T23:59:59Z'
          - lt: '2024-01-24T00:00:00Z'
          - sort: DESC
        properties:
          gt:
            format: date-time
            type: string
          lt:
            format: date-time
            type: string
          sort:
            $ref: '#/components/schemas/sort'
        title: DateTime Query Parameter
      style: deepObject
    offsetParam:
      name: offset
      in: query
      description: Offset for pagination (from zero, the first returned record)
      required: false
      schema:
