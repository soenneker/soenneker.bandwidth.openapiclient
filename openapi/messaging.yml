        - high
      example: default
    messageStatusEnum:
      type: string
      description: >-
        The status of the message. One of RECEIVED QUEUED SENDING SENT FAILED
        DELIVERED ACCEPTED UNDELIVERED.
      enum:
        - RECEIVED
        - QUEUED
        - SENDING
        - SENT
        - FAILED
        - DELIVERED
        - ACCEPTED
        - UNDELIVERED
      example: RECEIVED
    listMessageDirectionEnum:
      type: string
      description: The direction of the message. One of INBOUND OUTBOUND.
      enum:
        - INBOUND
        - OUTBOUND
      example: INBOUND
    messageDirectionEnum:
      type: string
      description: The direction of the message. One of in out.
      enum:
        - in
        - out
      example: in
    messageTypeEnum:
      type: string
      description: The type of message. Either SMS or MMS.
      enum:
        - sms
        - mms
        - rcs
      example: sms
    productTypeEnum:
      type: string
      description: The type of product associated with the message.
      enum:
        - LOCAL_A2P
        - P2P
        - SHORT_CODE_REACH
        - TOLL_FREE
        - HOSTED_SHORT_CODE
        - ALPHA_NUMERIC
        - RBM_MEDIA
        - RBM_RICH
        - RBM_CONVERSATIONAL
      example: P2P
    fieldError:
      type: object
      properties:
        fieldName:
          type: string
          description: The name of the field that contains the error
          example: from
        description:
          type: string
          description: The error associated with the field
          example: >-
            '+invalid' must be replaced with a valid E164 formatted telephone
            number
    messagesList:
      title: MessagesList
      type: object
      properties:
        totalCount:
          type: integer
          description: >-
            The total number of messages matched by the search. When the request
            has limitTotalCount set to true this value is limited to 10,000.
          example: 100
        pageInfo:
          $ref: '#/components/schemas/pageInfo'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/listMessageItem'
    listMessageItem:
      title: listMessageItem
      type: object
      properties:
        messageId:
          type: string
          description: The message id
          example: 1589228074636lm4k2je7j7jklbn2
        accountId:
          type: string
          description: The account id associated with this message.
          example: '9900000'
        sourceTn:
          type: string
          description: The source phone number of the message.
          example: '+15554443333'
        destinationTn:
          type: string
          description: The recipient phone number of the message.
          example: '+15554442222'
        messageStatus:
          $ref: '#/components/schemas/messageStatusEnum'
        messageDirection:
          $ref: '#/components/schemas/listMessageDirectionEnum'
        messageType:
          $ref: '#/components/schemas/messageTypeEnum'
        segmentCount:
          $ref: '#/components/schemas/segmentCount'
        errorCode:
          type: integer
          description: The numeric error code of the message.
          example: 9902
        receiveTime:
          type: string
          format: date-time
          description: The ISO 8601 datetime of the message.
          example: 2020-04-07T14:03:07.000Z
        carrierName:
          type: string
          nullable: true
          description: >-
            The name of the carrier. Not currently supported for MMS coming
            soon.
          example: other
        messageSize:
          type: integer
          description: The size of the message including message content and headers.
          nullable: true
          example: 27
        messageLength:
          type: integer
          description: The length of the message content.
          example: 18
        attachmentCount:
          type: integer
          description: The number of attachments the message has.
          nullable: true
          example: 1
        recipientCount:
          type: integer
          description: The number of recipients the message has.
          nullable: true
          example: 1
        campaignClass:
          type: string
          description: The campaign class of the message if it has one.
          nullable: true
          example: T
        campaignId:
          type: string
          description: The campaign ID of the message if it has one.
          nullable: true
          example: CJEUMDK
        bwLatency:
          type: integer
          description: >-
            The Bandwidth latency of the message in seconds. Only available for
            accounts with the Advanced Quality Metrics feature enabled.
          nullable: true
          example: 20
        carrierLatency:
          type: integer
          description: >-
            The carrier latency of the message in seconds. Only available for
            OUTBOUND messages from accounts with the Advanced Quality Metrics
            feature enabled.
          nullable: true
          example: 20
        callingNumberCountryA3:
          type: string
          description: The A3 country code of the calling number.
          nullable: true
          example: USA
        calledNumberCountryA3:
          type: string
          description: The A3 country code of the called number.
          nullable: true
          example: USA
        product:
          type: string
          description: The messaging product associated with the message.
          nullable: true
          example: P2P
        location:
          type: string
          description: The location ID associated with this message.
          nullable: true
          example: 123ID
    pageInfo:
      title: PageInfo
      type: object
      properties:
        prevPage:
          type: string
          description: The link to the previous page for pagination.
          example: >-
            https://messaging.bandwidth.com/api/v2/users/accountId/messages?messageStatus=DLR_EXPIRED&nextPage=DLAPE902
        nextPage:
          type: string
          description: The link to the next page for pagination.
          example: >-
            https://messaging.bandwidth.com/api/v2/users/accountId/messages?messageStatus=DLR_EXPIRED&prevPage=GL83PD3C
        prevPageToken:
          type: string
          description: The isolated pagination token for the previous page.
          example: DLAPE902
        nextPageToken:
          type: string
          description: The isolated pagination token for the next page.
          example: GL83PD3C
    messagingRequestError:
      title: MessagingRequestError
      type: object
      properties:
        type:
          type: string
        description:
          type: string
      required:
        - type
        - description
    createMessageRequestError:
      title: CreateMessageRequestError
      type: object
      properties:
        type:
          type: string
        description:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/fieldError'
      required:
        - type
        - description
    id:
      type: string
      description: The ID of the message.
      example: 1589228074636lm4k2je7j7jklbn2
    media:
      title: Media
      type: object
      properties:
        content:
          type: string
        contentLength:
          type: integer
          example: 1024
        mediaName:
          type: string
          example: image.png
    segmentCount:
      type: integer
      description: >-
        The number of segments the user's message is broken into before sending
        over carrier networks.
      example: 1
    tag:
      title: Tag
      type: string
      description: >-
        A custom string that will be included in callback events of the message.
        Max 1024 characters.
      example: custom string
    expiration:
      type: string
      format: date-time
      description: >-
        A string with the date/time value that the message will automatically
        expire by. This must be a valid RFC-3339 value, e.g.,
        2021-03-14T01:59:26Z or 2021-03-13T20:59:26-05:00. Must be a date-time
        in the future.
      example: '2021-02-01T11:29:18-05:00'
    carrierName:
      type: string
      description: >-
        The name of the Authorized Message Provider (AMP) that handled this
        message. 

        In the US, this is the carrier that the message was sent to.

        This field is present only when this account feature has been enabled.
      example: AT&T
    message:
      title: Message
      type: object
      properties:
        id:
          type: string
          description: The id of the message.
          example: 1589228074636lm4k2je7j7jklbn2
        owner:
          type: string
          description: The Bandwidth phone number associated with the message.
          example: '+15554443333'
        applicationId:
          $ref: '#/components/schemas/applicationId'
        time:
          type: string
          format: date-time
          description: The datetime stamp of the message in ISO 8601
          example: 2024-12-02T20:15:57.278Z
        segmentCount:
          $ref: '#/components/schemas/segmentCount'
        direction:
          $ref: '#/components/schemas/messageDirectionEnum'
        to:
          uniqueItems: true
          type: array
          items:
            type: string
          description: The phone number recipients of the message.
          example:
            - '+15552223333'
        from:
          type: string
          description: The phone number the message was sent from.
          example: '+15553332222'
        media:
          uniqueItems: true
          type: array
          items:
            type: string
          description: >-
            The list of media URLs sent in the message. Including a `filename`
            field in the `Content-Disposition` header of the media linked with a
            URL will set the displayed file name. This is a best practice to
            ensure that your media has a readable file name.
          example:
            - https://dev.bandwidth.com/images/bandwidth-logo.png
        text:
          type: string
          description: The contents of the message.
          example: Hello world
        tag:
          $ref: '#/components/schemas/tag'
        priority:
          $ref: '#/components/schemas/priorityEnum'
        expiration:
          $ref: '#/components/schemas/expiration'
    messageRequest:
      title: MessageRequest
      type: object
      required:
        - applicationId
        - to
        - from
      properties:
        applicationId:
          $ref: '#/components/schemas/applicationId'
        to:
          uniqueItems: true
          type: array
          description: The phone number(s) the message should be sent to in E164 format.
          example:
            - '+15554443333'
            - '+15552223333'
          items:
            type: string
        from:
          type: string
          description: >-
            Either an alphanumeric sender ID or the sender's Bandwidth phone
            number in E.164 format, which must be hosted within Bandwidth and
            linked to the account that is generating the message. 

            Alphanumeric Sender IDs can contain up to 11 characters, upper-case
            letters A-Z, lower-case letters a-z, numbers 0-9, space, hyphen -,
            plus +, underscore _ and ampersand &. Alphanumeric Sender IDs must
            contain at least one letter.
          example: '+15551113333'
        text:
          $ref: '#/components/schemas/messageText'
        media:
          $ref: '#/components/schemas/messageMedia'
        tag:
          $ref: '#/components/schemas/tag'
        priority:
          $ref: '#/components/schemas/priorityEnum'
        expiration:
          $ref: '#/components/schemas/expiration'
    messageText:
      type: string
      description: The contents of the text message. Must be 2048 characters or less.
      maxLength: 2048
      example: Hello world
    messageMedia:
      type: array
      items:
        type: string
        format: uri
        maxLength: 4096
      description: |-
        A list of URLs to include as media attachments as part of the message.
        Each URL can be at most 4096 characters.
      example:
        - https://dev.bandwidth.com/images/bandwidth-logo.png
        - https://dev.bandwidth.com/images/github_logo.png
    createMultiChannelMessageResponse:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          example: []
        data:
          $ref: '#/components/schemas/multiChannelMessageResponseData'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/errorObject'
          example: []
    multiChannelError:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          example: []
        data:
          type: object
          nullable: true
          example: null
        errors:
          type: array
          items:
            $ref: '#/components/schemas/errorObject'
    link:
      type: object
      properties:
        rel:
          type: string
        href:
          type: string
    errorObject:
      type: object
      properties:
        type:
          description: A concise summary of the error used for categorization.
          type: string
        description:
          description: A detailed explanation of the error.
          type: string
        source:
          $ref: '#/components/schemas/errorSource'
      required:
        - type
        - description
        - source
    errorSource:
      title: Error Source
      type: object
      description: Specifies relevant sources of the error, if any.
      properties:
        parameter:
          type: string
          description: The relevant URI query parameter causing the error
        field:
          type: string
          description: The request body field that led to the error
        header:
          type: string
          description: The header field that contributed to the error
        reference:
          type: string
          description: A resource ID or path linked to the error
    multiChannelMessageChannelEnum:
      description: The channel of the multi-channel message.
      type: string
      enum:
        - RBM
        - SMS
        - MMS
      example: RBM
    multiChannelSenderId:
      type: string
      description: The sender ID of the message. This could be an alphanumeric sender ID.
      example: BandwidthRBM
    multiChannelDestination:
      type: string
      description: The phone number the message should be sent to in E164 format.
      example: '+15552223333'
    multiChannelDestinations:
      uniqueItems: true
      type: array
      description: The destination phone number(s) of the message, in E164 format.
      example:
        - '+15554443333'
      items:
        type: string
    rbmMessageContentText:
      title: RBM Text
      type: object
      properties:
        text:
          type: string
          description: >-
            The text associated with the message. Must be 3270 characters or
            less
          maxLength: 3270
          example: Hello world
        suggestions:
          $ref: '#/components/schemas/multiChannelFullActions'
      required:
        - text
    rbmMediaHeightEnum:
      type: string
      description: The height of the media.
      enum:
        - SHORT
        - MEDIUM
        - TALL
      example: SHORT
    rbmMessageContentFile:
      title: RBM Rich Media File
      type: object
      properties:
        fileUrl:
          type: string
          format: uri
          description: The URL of the media file. 100MB is the maximum file size.
          example: https://dev.bandwidth.com/images/bandwidth-logo.png
          maxLength: 1000
        thumbnailUrl:
          type: string
          format: uri
          description: The URL of the thumbnail image. Applies only to video file media.
          example: https://dev.bandwidth.com/images/bandwidth-logo.png
          maxLength: 1000
      required:
        - fileUrl
    mmsMessageContentFile:
      title: MMS Media File
      type: object
      properties:
        fileUrl:
          type: string
          format: uri
          description: >-
            The URL of a media attachment.


            For MMS, the API limits file size to 3.5MB. Specific carriers and
            channels may have a smaller limit that could cause a large file to
            fail, see
            [here](https://support.bandwidth.com/hc/en-us/articles/360014235473-What-are-the-MMS-file-size-limits)
            for more details.
          example: https://dev.bandwidth.com/images/bandwidth-logo.png
          maxLength: 1000
      required:
        - fileUrl
    rbmMessageMedia:
      title: RBM Media
      type: object
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/rbmMessageContentFile'
        suggestions:
          $ref: '#/components/schemas/multiChannelFullActions'
      required:
        - media
    rbmCardContent:
      type: object
      properties:
        title:
          type: string
          description: The title of the card. Must be 200 characters or less.
          maxLength: 200
          example: Bandwidth
        description:
          type: string
          description: The description of the card. Must be 2000 characters or less.
          maxLength: 2000
          example: Bandwidth is a communications platform as a service (CPaaS) company.
        media:
          allOf:
            - $ref: '#/components/schemas/rbmMessageContentFile'
            - type: object
              properties:
                height:
                  $ref: '#/components/schemas/rbmMediaHeightEnum'
          required:
            - height
        suggestions:
          description: >-
            An array of suggested actions for the recipient that will be
            displayed on the rich card.
          type: array
          items:
            $ref: '#/components/schemas/multiChannelAction'
          maxItems: 4
    rbmStandaloneCard:
      title: Standalone Card
      type: object
      properties:
        orientation:
          $ref: '#/components/schemas/standaloneCardOrientationEnum'
        thumbnailImageAlignment:
          $ref: '#/components/schemas/thumbnailAlignmentEnum'
        cardContent:
          $ref: '#/components/schemas/rbmCardContent'
        suggestions:
          $ref: '#/components/schemas/multiChannelFullActions'
      required:
        - orientation
        - thumbnailImageAlignment
        - cardContent
    standaloneCardOrientationEnum:
      type: string
      enum:
        - HORIZONTAL
        - VERTICAL
      example: VERTICAL
    thumbnailAlignmentEnum:
      type: string
      description: >-
        The alignment of the thumbnail image in the card. Only applicable if the
        card using horizontal orientation.
      enum:
        - LEFT
        - RIGHT
      example: LEFT
    rbmMessageCarouselCard:
      title: Carousel
      type: object
      properties:
        cardWidth:
          $ref: '#/components/schemas/cardWidthEnum'
        cardContents:
          type: array
          items:
            $ref: '#/components/schemas/rbmCardContent'
          maxItems: 10
        suggestions:
          $ref: '#/components/schemas/multiChannelFullActions'
      required:
        - cardContents
        - cardWidth
    cardWidthEnum:
      type: string
      enum:
        - SMALL
        - MEDIUM
      example: SMALL
    smsMessageContent:
      title: SMS Text
      type: object
      properties:
        text:
          $ref: '#/components/schemas/messageText'
      required:
        - text
    mmsMessageContent:
      title: MMS Message
      type: object
      properties:
        text:
          $ref: '#/components/schemas/messageText'
        media:
          type: array
          items:
            $ref: '#/components/schemas/mmsMessageContentFile'
    rbmMessageContentRichCard:
      title: RBM Rich Card
      oneOf:
        - $ref: '#/components/schemas/rbmStandaloneCard'
        - $ref: '#/components/schemas/rbmMessageCarouselCard'
    rbmActionTypeEnum:
      type: string
      enum:
        - REPLY
        - DIAL_PHONE
        - SHOW_LOCATION
        - CREATE_CALENDAR_EVENT
        - OPEN_URL
        - REQUEST_LOCATION
      example: REPLY
    rbmOpenUrlEnum:
      type: string
      description: >-
        Specifies how the URL should be opened on a mobile device.

        - `BROWSER` Opens the URL in the device's default browser. If
        application is not set or the device doesn’t support WebView, this
        option is used by default. 

        - `WEBVIEW` Opens the URL in an in-app WebView.
      enum:
        - BROWSER
        - WEBVIEW
      example: WEBVIEW
    rbmWebViewEnum:
      type: string
      description: >-
        Defines the layout of the WebView on a mobile device. It must be defined
        when application is set to `WEBVIEW`

        - `FULL` WebView takes the full screen. 

        - `HALF` WebView takes half of the screen.

        - `TALL` WebView takes three-quarters of the screen.
      enum:
        - FULL
        - HALF
        - TALL
    rbmActionText:
      title: Text
      type: string
      description: Displayed text for user to click
      maxLength: 25
      example: Hello world
    rbmActionPostbackData:
      title: Post Back Data
      type: string
      format: byte
      description: Base64 payload the customer receives when the reply is clicked.
      maxLength: 2048
      example: SGVsbG8gd29ybGQ=
    rbmActionBase:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/rbmActionTypeEnum'
        text:
          $ref: '#/components/schemas/rbmActionText'
        postbackData:
          $ref: '#/components/schemas/rbmActionPostbackData'
      required:
        - text
        - postbackData
        - type
    rbmActionDial:
      allOf:
        - $ref: '#/components/schemas/rbmActionBase'
        - title: Dial Phone
          type: object
          properties:
            phoneNumber:
              type: string
              description: The phone number to dial. Must be E164 format.
              example: '+15552223333'
          required:
            - phoneNumber
    rbmActionViewLocation:
      allOf:
        - $ref: '#/components/schemas/rbmActionBase'
        - title: Show Location
          type: object
          properties:
            latitude:
              type: string
              format: double
              description: The latitude of the location.
              example: '37.7749'
            longitude:
              type: string
              format: double
              description: The longitude of the location.
              example: '-122.4194'
            label:
              type: string
              description: The label of the location.
              example: San Francisco
              maxLength: 100
          required:
            - latitude
            - longitude
    multiChannelActionCalendarEvent:
      allOf:
        - $ref: '#/components/schemas/rbmActionBase'
        - title: Calendar Event
          type: object
          properties:
            title:
              type: string
              description: The title of the event.
              example: Meeting with John
              maxLength: 100
            startTime:
              type: string
              format: date-time
              description: The start time of the event.
              example: 2022-09-14T18:20:16.000Z
            endTime:
              type: string
              format: date-time
              description: The end time of the event.
              example: 2022-09-14T18:20:16.000Z
            description:
              type: string
              description: The description of the event.
              example: Discuss the new project
              maxLength: 500
          required:
            - title
            - startTime
            - endTime
    rbmActionOpenUrl:
      allOf:
        - $ref: '#/components/schemas/rbmActionBase'
        - title: Open URL
          type: object
          properties:
            url:
              type: string
              format: uri
              description: The URL to open in browser.
              example: https://dev.bandwidth.com
              maxLength: 2048
            application:
              $ref: '#/components/schemas/rbmOpenUrlEnum'
            webviewViewMode:
              $ref: '#/components/schemas/rbmWebViewEnum'
          required:
            - url
    multiChannelFullActions:
      type: array
      description: An array of suggested actions for the recipient.
      items:
        $ref: '#/components/schemas/multiChannelAction'
      maxItems: 11
    multiChannelAction:
      anyOf:
        - $ref: '#/components/schemas/rbmActionBase'
        - $ref: '#/components/schemas/rbmActionDial'
        - $ref: '#/components/schemas/rbmActionViewLocation'
        - $ref: '#/components/schemas/multiChannelActionCalendarEvent'
        - $ref: '#/components/schemas/rbmActionOpenUrl'
      discriminator:
        propertyName: type
        mapping:
          REPLY: '#/components/schemas/rbmActionBase'
          DIAL_PHONE: '#/components/schemas/rbmActionDial'
          SHOW_LOCATION: '#/components/schemas/rbmActionViewLocation'
          CREATE_CALENDAR_EVENT: '#/components/schemas/multiChannelActionCalendarEvent'
          OPEN_URL: '#/components/schemas/rbmActionOpenUrl'
          REQUEST_LOCATION: '#/components/schemas/rbmActionBase'
    multiChannelChannelListObjectBase:
      type: object
      properties:
        from:
          $ref: '#/components/schemas/multiChannelSenderId'
        applicationId:
          $ref: '#/components/schemas/applicationId'
        channel:
          $ref: '#/components/schemas/multiChannelMessageChannelEnum'
      required:
        - from
        - applicationId
        - channel
    multiChannelChannelListRBMObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListObjectBase'
        - type: object
          properties:
            content:
              description: The content of the message.
              oneOf:
                - $ref: '#/components/schemas/rbmMessageContentText'
                - $ref: '#/components/schemas/rbmMessageMedia'
                - $ref: '#/components/schemas/rbmMessageContentRichCard'
      required:
        - content
    multiChannelChannelListSMSObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListObjectBase'
        - type: object
          properties:
            content:
              $ref: '#/components/schemas/smsMessageContent'
      required:
        - content
    multiChannelChannelListMMSObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListObjectBase'
        - type: object
          properties:
            content:
              $ref: '#/components/schemas/mmsMessageContent'
      required:
        - content
    multiChannelChannelListRBMResponseObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListRBMObject'
        - $ref: '#/components/schemas/multiChannelChannelListOwnerObject'
    multiChannelChannelListSMSResponseObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListSMSObject'
        - $ref: '#/components/schemas/multiChannelChannelListOwnerObject'
    multiChannelChannelListMMSResponseObject:
      allOf:
        - $ref: '#/components/schemas/multiChannelChannelListMMSObject'
        - $ref: '#/components/schemas/multiChannelChannelListOwnerObject'
    multiChannelChannelListRequestObject:
      anyOf:
        - $ref: '#/components/schemas/multiChannelChannelListRBMObject'
        - $ref: '#/components/schemas/multiChannelChannelListSMSObject'
        - $ref: '#/components/schemas/multiChannelChannelListMMSObject'
      discriminator:
        propertyName: channel
        mapping:
          RBM: '#/components/schemas/multiChannelChannelListRBMObject'
          SMS: '#/components/schemas/multiChannelChannelListSMSObject'
          MMS: '#/components/schemas/multiChannelChannelListMMSObject'
    multiChannelChannelListOwnerObject:
      type: object
      properties:
        owner:
          type: string
          description: >-
            The Bandwidth senderId associated with the message. Identical to
            'from'.
      required:
        - owner
    multiChannelChannelListResponseObject:
      anyOf:
        - $ref: '#/components/schemas/multiChannelChannelListRBMResponseObject'
        - $ref: '#/components/schemas/multiChannelChannelListSMSResponseObject'
        - $ref: '#/components/schemas/multiChannelChannelListMMSResponseObject'
      discriminator:
        propertyName: channel
        mapping:
          RBM: '#/components/schemas/multiChannelChannelListRBMResponseObject'
          SMS: '#/components/schemas/multiChannelChannelListSMSResponseObject'
          MMS: '#/components/schemas/multiChannelChannelListMMSResponseObject'
    multiChannelMessageRequest:
      description: Multi-Channel Message Request
      type: object
      properties:
        to:
          $ref: '#/components/schemas/multiChannelDestination'
        channelList:
          type: array
          description: >-
            A list of message bodies. The messages will be attempted in the
            order they are listed. Once a message sends successfully, the others
            will be ignored.
          items:
            $ref: '#/components/schemas/multiChannelChannelListRequestObject'
          maxItems: 4
        tag:
          $ref: '#/components/schemas/tag'
        priority:
          $ref: '#/components/schemas/priorityEnum'
        expiration:
          $ref: '#/components/schemas/expiration'
      required:
        - to
        - channelList
    multiChannelMessageResponseData:
      description: The data returned in a multichannel message response.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/id'
        time:
          description: The time the message was received by the Bandwidth API.
          type: string
          format: date-time
          example: 2025-01-01T18:20:16.000Z
        direction:
          $ref: '#/components/schemas/messageDirectionEnum'
        to:
          $ref: '#/components/schemas/multiChannelDestinations'
        channelList:
          type: array
          description: >-
            A list of message bodies. The messages will be attempted in the
            order they are listed. Once a message sends successfully, the others
            will be ignored.
          items:
            $ref: '#/components/schemas/multiChannelChannelListResponseObject'
          maxItems: 4
        tag:
          $ref: '#/components/schemas/tag'
        priority:
          $ref: '#/components/schemas/priorityEnum'
        expiration:
          $ref: '#/components/schemas/expiration'
      required:
        - id
        - time
        - direction
        - to
        - channelList
    multiChannelMessageContent:
      description: The structure of the content field of a multichannel message.
      type: object
      properties:
        text:
          type: string
        media:
          $ref: '#/components/schemas/rbmMessageContentFile'
    rbmSuggestionResponse:
      type: object
      properties:
        text:
          type: string
          description: The text associated with the suggestion response.
          example: Yes, I would like to proceed
        postbackData:
          $ref: '#/components/schemas/rbmActionPostbackData'
    rbmLocationResponse:
      type: object
      properties:
        latitude:
          type: string
          format: double
          description: The latitude of the client's location.
          example: '37.7749'
        longitude:
          type: string
          format: double
          description: The longitude of the client's location.
          example: '-122.4194'
    callback:
      description: >-
        Callbacks are divided into two types based on direction of the related
        message:

        - `statusCallback` indicates status of an outbound MT SMS, MMS, or RBM
        message.

        - `inboundCallback` indicates an inbound MO message or a multichannel
        message client's response to a suggestion or location request.
      type: object
      oneOf:
        - $ref: '#/components/schemas/statusCallback'
        - $ref: '#/components/schemas/inboundCallback'
      discriminator:
        propertyName: type
        mapping:
          message-sending: '#/components/schemas/statusCallback'
          message-sent: '#/components/schemas/statusCallback'
          message-delivered: '#/components/schemas/statusCallback'
          message-failed: '#/components/schemas/statusCallback'
          message-read: '#/components/schemas/statusCallback'
          message-received: '#/components/schemas/inboundCallback'
          request-location-response: '#/components/schemas/inboundCallback'
          suggestion-response: '#/components/schemas/inboundCallback'
    statusCallback:
      type: object
      description: >-
        Represents a status callback for an outbound MT SMS or MMS or RBM
        message.
      properties:
        time:
          type: string
          format: date-time
          example: 2024-12-02T20:15:57.278Z
        eventTime:
          type: string
          description: >-
            Represents the time at which the message was read, for
            `message-read` callbacks.
          format: date-time
          example: 2024-12-02T20:15:58.278Z
        type:
          $ref: '#/components/schemas/statusCallbackTypeEnum'
        to:
          type: string
          description: >-
            The destination phone number the message was sent to.

            For status callbacks, this the the Bandwidth user's client phone
            number.
          example: '+15552223333'
        description:
          type: string
          description: A detailed description of the event described by the callback.
          example: Message delivered to carrier.
        message:
          $ref: '#/components/schemas/statusCallbackMessage'
        errorCode:
          type: integer
          description: Optional error code, applicable only when type is `message-failed`.
          example: 4405
        carrierName:
          $ref: '#/components/schemas/carrierName'
      required:
        - time
        - type
        - to
        - description
        - message
    inboundCallback:
      type: object
      description: Represents an inbound callback.
      properties:
        time:
          type: string
          format: date-time
          example: 2024-12-02T20:15:57.278Z
        type:
          $ref: '#/components/schemas/inboundCallbackTypeEnum'
        to:
          type: string
          description: >
            The destination phone number the message was sent to. 

            For inbound callbacks, this is the Bandwidth number or alphanumeric
            identifier that received the message.
          example: '+15552223333'
        description:
          type: string
          description: A detailed description of the event described by the callback.
          example: Incoming message received
        message:
          $ref: '#/components/schemas/inboundCallbackMessage'
        carrierName:
          $ref: '#/components/schemas/carrierName'
      required:
        - time
        - type
        - to
        - description
        - message
    statusCallbackTypeEnum:
      type: string
      description: >-
        The possible status callbacks when sending an MT SMS or MMS or RBM
        message:

        - `message-sending` indicates that Bandwidth is sending the message to
        the upstream provider.

        - `message-delivered` indicates that the message was successfully sent.

        - `message-failed` indicates that the message could not be sent to the
        intended recipient.

        - `message-read` indicates that the RBM message was read by the
        recipient.
      enum:
        - message-sending
        - message-delivered
        - message-failed
        - message-read
      example: message-delivered
    inboundCallbackTypeEnum:
      type: string
      description: >-
        The possible inbound callback types originating from MO messages or
        multichannel message client responses:

        - `message-received` indicates an MO message from a Bandwidth user's
        client to a Bandwidth number.

        - `request-location-response` indicates a response to a location request
        sent by the Bandwidth user's client after receiving an RBM message. 

        - `suggestion-response` indicates a response to a suggestion sent by the
        Bandwidth user's client after receiving an RBM message.
      enum:
        - message-received
        - request-location-response
        - suggestion-response
      example: message-received
    statusCallbackMessage:
      description: Message payload schema within a callback
      type: object
      properties:
        id:
          type: string
          description: A unique identifier of the message.
          example: 1661365814859loidf7mcwd4qacn7
        owner:
          type: string
          description: >-
            The Bandwidth phone number or alphanumeric identifier associated
            with the message.
          example: '+15553332222'
        applicationId:
          $ref: '#/components/schemas/applicationId'
        time:
          type: string
          format: date-time
          example: 2024-12-02T20:15:57.666Z
        segmentCount:
          $ref: '#/components/schemas/segmentCount'
        direction:
          $ref: '#/components/schemas/messageDirectionEnum'
        to:
          description: The phone number recipients of the message.
          uniqueItems: true
          type: array
          items:
            type: string
          example:
            - '+15552223333'
        from:
          type: string
          description: >-
            The Bandwidth phone number or alphanumeric identifier the message
            was sent from.
          example: '+15553332222'
        text:
          type: string
          example: Hello world
        tag:
          $ref: '#/components/schemas/tag'
        media:
          type: array
          description: Optional media, not applicable for sms
          items:
            type: string
            format: uri
          example:
            - https://dev.bandwidth.com/images/bandwidth-logo.png
            - https://dev.bandwidth.com/images/github_logo.png
        priority:
          $ref: '#/components/schemas/priorityEnum'
        channel:
          $ref: '#/components/schemas/multiChannelMessageChannelEnum'
      required:
        - id
        - owner
        - applicationId
        - time
        - segmentCount
        - direction
        - to
        - from
    inboundCallbackMessage:
      allOf:
        - $ref: '#/components/schemas/statusCallbackMessage'
        - type: object
          properties:
            content:
              $ref: '#/components/schemas/multiChannelMessageContent'
            suggestionResponse:
              $ref: '#/components/schemas/rbmSuggestionResponse'
            locationResponse:
              $ref: '#/components/schemas/rbmLocationResponse'
      required:
        - id
        - owner
        - applicationId
        - time
        - segmentCount
        - direction
        - to
        - from
