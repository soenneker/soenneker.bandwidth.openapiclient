  examples:
    listTriggersExample:
      value:
        links:
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents/{incidentId}/triggers
            rel: self
            method: GET
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents/{incidentId}/triggers
            rel: first
            method: GET
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents/{incidentId}/triggers?offset=1&limit=100
            rel: next
            method: GET
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents/{incidentId}/triggers?offset=1000&limit=100
            rel: last
            method: GET
        data:
          - triggerId: ceda15dd-adea-40c3-a70e-9e8dde3b7c79
            user: myUsername
            alertId: 051997bc-20c5-4896-95ce-3d2d46dfd250
            triggerType: SEND_PSAP_OUTAGE_ALERT
            triggerStatus: RECEIVED
            acceptedCount: 0
            invalidCount: 0
            updated: '2024-11-08T21:47:04.608Z'
            totalNumber: 6000
          - triggerId: 9e8dde3b7c79-adea-40c3-a70e-9e8dde3b7c79
            user: myUsername
            alertId: 3d2d46dfd250-20c5-4896-95ce-3d2d46dfd250
            triggerType: TEST_SEND_PSAP_OUTAGE_ALERT
            triggerStatus: COMPLETED
            acceptedCount: 2
            invalidCount: 0
            updated: '2024-11-08T20:47:04.608Z'
            totalNumber: 2
        errors: []
        page:
