          totalElements: 1000
          totalPages: 10
          pageNumber: 0
    listIncidentsExample:
      summary: List Incidents
      value:
        links:
          - href: /accounts/{accountId}/emergency/psap-alerts/incidents
            rel: self
            method: GET
          - href: /accounts/{accountId}/emergency/psap-alerts/incidents
            rel: first
            method: GET
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents?offset=1&limit=20
            rel: next
            method: GET
          - href: >-
              /accounts/{accountId}/emergency/psap-alerts/incidents?offset=1000&limit=20
            rel: last
            method: GET
        data:
          - incidentId: '1'
            status: CREATED
            startTime: '2024-08-27T15:30:00Z'
            lastUpdated: '2024-08-27T18:30:00Z'
            outageImpact: CALL_COMPLETION
            areasAffected:
              - NC
              - CO
            alerts:
              - alertId: 051997bc-20c5-4896-95ce-3d2d46dfd250
                triggerId: ceda15dd-adea-40c3-a70e-9e8dde3b7c79
                alertTime: '2024-08-27T15:30:00Z'
                alertType: INITIAL
                causeOfOutage: a network disruption
                expectedRestorationTime: '2024-08-27T20:00:00Z'
          - incidentId: '1234568'
            status: ACTIVE
            startTime: '2024-08-27T15:30:00Z'
            lastUpdated: '2024-08-27T18:30:00Z'
            outageImpact: LOCATION_INFORMATION
            areasAffected:
              - USA
            alerts:
              - alertId: 95ce95ce95ce-20c5-4896-95ce-3d2d46dfd250
                triggerId: adeaadea-adea-40c3-a70e-9e8dde3b7c79
                alertTime: '2024-08-27T15:30:00Z'
                alertType: INITIAL
                causeOfOutage: unknown
                expectedRestorationTime: '2024-08-27T20:00:00Z'
              - alertId: 20c520c5-20c5-4896-95ce-3d2d46dfd250
                triggerId: ceda15dd-adea-40c3-a70e-9e8dde3b7c79
                alertTime: '2024-08-27T15:30:00Z'
                alertType: UPDATE
                causeOfOutage: a network disruption
                expectedRestorationTime: '2024-08-27T20:00:00Z'
        errors: []
        page:
          pageSize: 2
          totalElements: 10
          totalPages: 5
          pageNumber: 0
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic ZGVtbZpwQDU1dzByZA==`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security tokens called bearer
        tokens. The name “Bearer authentication” can be understood as “give
        access to the bearer of this token.” The client must send this token in
        the Authorization header when making requests to protected resources.


        Example: `Authorization: Bearer <token>`
security:
  - Basic: []
  - Bearer: []
