        totalCount:
          description: The total count of orders returned in the response.
          type: integer
          example: 2
        orders:
          type: array
          items:
            $ref: '#/components/schemas/importPhoneNumberOrder'
    importPhoneNumberSubscriber:
      type: object
      properties:
        name:
          type: string
        serviceAddress:
          $ref: '#/components/schemas/address'
    importTnOrder:
      type: object
      properties:
        CustomerOrderId:
          type: string
          description: >-
            The customer-defined reference ID for this order, if one was
            provided at creation. Not unique — Bandwidth applies no uniqueness
            constraint, so multiple orders may share the same value. Each order
            has a distinct Bandwidth-assigned `orderId`.
        OrderCreateDate:
          type: string
        AccountId:
          type: string
        CreatedByUser:
          type: string
        LastModifiedDate:
          type: string
        SiteId:
          type: string
        SipPeerId:
          type: string
        TelephoneNumbers:
          type: array
          items:
            $ref: '#/components/schemas/telephoneNumber'
        LoaAuthorizingPerson:
          type: string
        LoaType:
          type: string
          enum:
            - CARRIER
            - SUBSCRIBER
        Warnings:
          type: array
          items:
            $ref: '#/components/schemas/warningXml'
        Subscriber:
          $ref: '#/components/schemas/importTnSubscriber'
        ProcessingStatus:
          description: >-
            Status of the Hosted Messaging Order request.


            RECEIVED - Order has been received without errors and will be
            processed through further validation.


            PROCESSING - The order has passed initial validation and is now
            being processed.Order will remain in processing status if any of the
            requested telphone numbers remain pending processing.


            COMPLETE - This implies that this order has been successfully
            processed and hosted messaging has been enabled on all requested
            telephone numbers.


            PARTIAL - This implies that this order has been successfully
            processed and hosted messaging was enabled on all except few of the
            numbers, reasons for same can be found in  Warning section.


            FAILED - This implies that this order has been failed. None of the
            telphone numbers requested were enabled for hosted messaging,
            reasons for same can be found in Errors and Warning section.
          type: string
          enum:
            - RECEIVED
            - PROCESSING
            - COMPLETE
            - PARTIAL
            - FAILED
        Errors:
          type: array
          items:
            $ref: '#/components/schemas/errorXml'
        PendingTelephoneNumbers:
          description: List of telephone numbers that are pending processing.
          type: array
          items:
            $ref: '#/components/schemas/telephoneNumber'
        FailedTelephoneNumbers:
          description: >-
            List of telephone numbers that failed processing, with reasons
            detailed in the Warning section.
          type: array
          items:
            $ref: '#/components/schemas/telephoneNumber'
        SuccessTelephoneNumbers:
          description: List of telephone numbers successfully processed.
          type: array
          items:
            $ref: '#/components/schemas/telephoneNumber'
