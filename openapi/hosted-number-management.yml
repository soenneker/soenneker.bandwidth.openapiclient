  parameters:
    accountIdPathParam:
      description: User's account ID.
      example: '1234567'
      in: path
      name: accountId
      required: true
      schema:
        type: string
    createdDateFromQueryParam:
      name: createdDateFrom
      description: >-
        Checks the order's creation date against this value. Orders that have a
        creation date after this date will be included. Format is yyyy-MM-dd
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-22'
    createdDateToQueryParam:
      name: createdDateTo
      description: >-
        Checks the order's creation date against this value. Orders that have a
        creation date before this date will be included. Format is yyyy-MM-dd
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-25'
    customerOrderIdQueryParam:
      name: customerOrderId
      description: >
        Filter orders by a customer-assigned reference ID. Because
        `customerOrderId` is not unique — Bandwidth applies no uniqueness
        constraint — this query may return multiple orders if the same value was
        used across multiple orders. Each result will have a distinct
        Bandwidth-assigned `orderId`. To retrieve a single specific order, use
        its `orderId` instead.
      in: query
      schema:
        type: string
      example: ABCCorp12345
    documentTypeQueryParam:
      name: documentType
      description: |-
        This query parameter allows you to include the document type metadata
        at the same time you upload the file.
      in: query
      required: false
      schema:
        enum:
          - LOA
          - INVOICE
          - CSR
          - OTHER
        type: string
      example: LOA
    loaTypeQueryParam:
      name: loaType
      description: Indentify the LoaType on phone numbers.
      in: query
      required: false
      schema:
        type: string
        enum:
          - SUBSCRIBER
          - CARRIER
          - ALL
        default: ALL
      example: SUBSCRIBER
    metaDataQueryParam:
      name: metadata
      description: >-
        If true, the response will contain document name and type. If false, the
        response will only list the file names.
      in: query
      required: false
      schema:
        type: boolean
      example: true
    modifiedDateFromQueryParam:
      name: modifiedDateFrom
      description: >-
        For Date-based searches, the starting date of a date range (inclusive)
        that will be used to find Import Phone Number Orders that were modified
        within the date range. It is in the form yyyy-MM-dd.
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-22'
    removeImportedModifiedDateFromQueryParam:
      name: modifiedDateFrom
      description: >-
        For Date-based searches, the starting date of a date range (inclusive)
        that will be used to find Remove Imported Phone Number Orders that were
        modified within the date range. It is in the form yyyy-MM-dd.
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-22'
    modifiedDateToQueryParam:
      name: modifiedDateTo
      description: >-
        For Date-based searches, the ending date of a date range (inclusive)
        that will be used to find Import Phone Number Orders that were modified
        within the date range. It is in the form yyyy-MM-dd.
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-25'
    orderIdPathParam:
      name: orderId
      description: ID of order to retrieve
      in: path
      required: true
      schema:
        type: string
      example: bf1305b8-8998-1111-2222-51ba3ce52d4e
    removeImportedModifiedDateToQueryParam:
      name: modifiedDateTo
      description: >-
        For Date-based searches, the ending date of a date range (inclusive)
        that will be used to find Remove Imported Phone Number Orders that were
        modified within the date range. It is in the form yyyy-MM-dd.
      in: query
      schema:
        type: string
        format: date
      example: '2013-10-25'
    phoneNumberQueryParam:
      name: phoneNumber
      description: A phone number that is referenced in the order
      in: query
      schema:
        type: string
      example: '+19199918388'
    statusQueryParam:
      name: status
      description: The status of the order being searched for.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - PROCESSING
            - COMPLETE
            - PARTIAL
            - FAILED
  requestBodies:
    postImportMessagingPhoneNumberOrdersLoasRequest:
      content:
        '*/*':
          schema:
            format: binary
            type: string
    postImportMessagingPhoneNumberOrdersRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/importPhoneNumberOrdersRequest'
          examples:
            example:
              value:
                customerOrderId: ICPA123ABC
                subAccountId: 743
                locationId: 303716
                subscriber:
                  - name: ABC Inc.
                    serviceAddress:
                      - houseNumber: 11235
                        streetName: Back
                        city: Denver
                        stateCode: CO
                        zip: 27541
                        county: Canyon
                loaAuthorizingPerson: The Authguy
                loaType: CARRIER
                phoneNumbers:
                  - '+19199918388'
                  - '+14158714245'
                  - '+14352154439'
                  - '+14352154466'
        application/xml:
          schema:
            $ref: '#/components/schemas/importTnOrdersRequest'
          examples:
            example:
              value: |
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <ImportTnOrder>
                  <CustomerOrderId>ICPA123ABC</CustomerOrderId>
                  <SiteId>743</SiteId>
                  <SipPeerId>303716</SipPeerId>
                  <Subscriber>
                    <Name>ABC Inc.</Name>
                    <ServiceAddress>
                      <HouseNumber>11235</HouseNumber>
                      <StreetName>Back</StreetName>
                      <City>Denver</City>
                      <StateCode>CO</StateCode>
                      <Zip>27541</Zip>
                      <County>Canyon</County>
                    </ServiceAddress>
                  </Subscriber>
                  <LoaAuthorizingPerson>The Authguy</LoaAuthorizingPerson>
                  <LoaType>CARRIER</LoaType>
                  <TelephoneNumbers>
                    <TelephoneNumber>+19199918388</TelephoneNumber>
                    <TelephoneNumber>+14158714245</TelephoneNumber>
                    <TelephoneNumber>+14352154439</TelephoneNumber>
                    <TelephoneNumber>+14352154466</TelephoneNumber>
                  </TelephoneNumbers>
                </ImportTnOrder>
    postRemoveImportedPhoneNumberOrderRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/removeImportedPhoneNumberOrderRequest'
          examples:
            example:
              value:
                customerOrderId: ICPA123ABC
                phoneNumbers:
                  - '+19199918388'
                  - '+14158714245'
                  - '+14352154439'
                  - '+14352154466'
        application/xml:
          schema:
            $ref: '#/components/schemas/removeImportedTnOrderRequest'
          examples:
            example:
              value: |-
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <RemoveImportedTnOrder>
                   <CustomerOrderId>ICPA123ABC</CustomerOrderId>
                   <TelephoneNumbers>
                      <TelephoneNumber>+19199918388</TelephoneNumber>
                      <TelephoneNumber>+14158714245</TelephoneNumber>
                      <TelephoneNumber>+14352154439</TelephoneNumber>
                      <TelephoneNumber>+14352154466</TelephoneNumber>
                   </TelephoneNumbers>
                </RemoveImportedTnOrder>
  responses:
    getImportMessagingPhoneNumberOrdersHistoryResponse:
      description: OK
      content:
        application/json:
          examples:
            example:
              value:
                orderHistory:
                  - orderDate: '2015-06-16T14:03:10.225Z'
                    note: Hosted Messaging order is received.
                    author: admin
                    status: RECEIVED
                  - orderDate: '2015-06-16T14:03:10.330Z'
                    note: Hosted Messaging order is processing.
                    author: admin
                    status: PROCESSING
                  - orderDate: '2015-06-16T14:03:10.789Z'
                    note: Hosted Messaging order is partial.
                    author: admin
                    status: PARTIAL
          schema:
            $ref: '#/components/schemas/orderHistory'
        application/xml:
          examples:
            example:
              value: |
                <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
                <OrderHistoryWrapper>
                   <OrderHistory>
                     <OrderDate>2015-06-16T14:03:10.225Z</OrderDate>
                     <Note>Import TN order is received.</Note>
                     <Author>admin</Author>
                     <Status>RECEIVED</Status>
                   </OrderHistory>
                   <OrderHistory>
                     <OrderDate>2015-06-16T14:03:10.330Z</OrderDate>
                     <Note>Import TN order is processing.</Note>
                     <Author>admin</Author>
                     <Status>PROCESSING</Status>
                   </OrderHistory>
                   <OrderHistory>
                     <OrderDate>2015-06-16T14:03:10.789Z</OrderDate>
                     <Note>Import TN order is partial.</Note>
                     <Author>admin</Author>
                     <Status>PARTIAL</Status>
                   </OrderHistory>
                 </OrderHistoryWrapper>
          schema:
            $ref: '#/components/schemas/orderHistoryWrapper'
    getImportMessagingPhoneNumberOrdersLoas400ErrorResponse:
      description: Bad Request
      content:
        application/json:
          examples:
            example:
