openapi: 3.0.1
info:
  title: Hosted Number Management
  description: >-
    Bandwidth's Hosted Number Management APIs


    This API provides endpoints to manage hosted telephone numbers, either for
    voice and messaging. 


    Note that specs are still being moved over from the [Numbers
    section](https://dev.bandwidth.com/apis/numbers-apis/numbers)
  contact:
    name: Bandwidth
    url: https://support.bandwidth.com
    email: support@bandwidth.com
  version: 1.0.0
  termsOfService: https://www.bandwidth.com/legal/terms-of-use-bandwidthcom-web-sites/
servers:
  - url: https://api.bandwidth.com/api/v2
    description: Production
security:
  - Basic: []
  - Bearer: []
tags:
  - name: Hosted Messaging
paths:
  /accounts/{accountId}/importPhoneNumberOrders/messaging:
    get:
      tags:
        - Hosted Messaging
      description: >
        Retrieves the importPhoneNumberOrders requests for the given account ID.
        A maximum of 1,000 orders can be retrieved per request. If no date range
        or required query parameter is provided, the order results will be
        limited to the last two years.


        In this table are presented capabilities that are not universally
        available. The following request query parameters are only allowed for
        numbers from specific region/country:

        | Number Region | Request Query Parameter |

        |:--------------|:------------------------|

        |NANP|loaType|
      summary: List Hosted Messaging Orders
      operationId: readImportMessagingPhoneNumberOrders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/statusQueryParam'
        - $ref: '#/components/parameters/phoneNumberQueryParam'
        - $ref: '#/components/parameters/customerOrderIdQueryParam'
        - $ref: '#/components/parameters/createdDateFromQueryParam'
        - $ref: '#/components/parameters/createdDateToQueryParam'
        - $ref: '#/components/parameters/modifiedDateFromQueryParam'
        - $ref: '#/components/parameters/modifiedDateToQueryParam'
        - $ref: '#/components/parameters/loaTypeQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/getImportMessagingPhoneNumberOrdersResponse'
        '400':
          $ref: >-
            #/components/responses/getImportMessagingPhoneNumberOrders400ErrorResponse
    post:
      tags:
        - Hosted Messaging
      description: >-
        Creates an importPhoneNumberOrder request to add numbers under the given
        sub account ID and location ID as specified in the body.

        A successfully submitted order will have a status of "RECEIVED". A
        successfully completed order will have a status of "COMPLETE" if all of
        the telephone numbers were successfully imported and  "PARTIAL" if some
        of the telephone numbers were imported. A failed order with will have a
        staus of "FAILED" and no telephone numbers would have been imported.


        The following request parameters are only required for numbers from
        specific region/country:

        | Number Region | Request Parameter |

        |:--------------|:------------------------|

        |NANP|LoaAuthorizingPerson|

        |NANP|LoaType|

        |NANP|Subscriber|
      summary: Create Hosted Messaging Order
      operationId: createImportMessagingPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/postImportMessagingPhoneNumberOrdersRequest'
      responses:
        '201':
          $ref: '#/components/responses/postImportMessagingPhoneNumberOrdersResponse'
        '400':
          $ref: >-
            #/components/responses/postImportMessagingPhoneNumberOrders400ErrorResponse
  /accounts/{accountId}/importPhoneNumberOrders/messaging/{orderId}:
    get:
      tags:
        - Hosted Messaging
      description: >-
        Retrieve an order to import hosted messaging to a phone number by order
        ID
      summary: Get Hosted Messaging Order
      operationId: retrieveImportMessagingPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/getImportMessagingPhoneNumberOrderResponse'
        '400':
          $ref: >-
            #/components/responses/getImportMessagingPhoneNumber400ErrorOrderResponse
  /accounts/{accountId}/importPhoneNumberOrders/messaging/{orderId}/history:
    get:
      tags:
        - Hosted Messaging
      description: Retrieves the history of the specified importPhoneNumberOrder.
      summary: Get Hosted Messaging Order History
      operationId: readImportMessagingPhoneNumberOrderHistory
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: >-
            #/components/responses/getImportMessagingPhoneNumberOrdersHistoryResponse
  /accounts/{accountId}/importPhoneNumberOrders/messaging/{orderId}/loas:
    get:
      description: >-
        Retrieves the list of the LOA files associated with the order. Only for
        orders involving NANP numbers.
      operationId: listImportMessagingPhoneNumberOrderLoas
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
        - $ref: '#/components/parameters/metaDataQueryParam'
      responses:
        '200':
          $ref: >-
            #/components/responses/getImportMessagingPhoneNumberOrdersLoasResponse
        '400':
          $ref: >-
            #/components/responses/getImportMessagingPhoneNumberOrdersLoas400ErrorResponse
      summary: List Hosted Messaging Order LOA files
      tags:
        - Hosted Messaging
    post:
      description: >-
        POSTing to the /loas resource will enable the upload of the file.  The
        key attribute to the POST is ensuring that the headers are correctly set
        to support the file upload.<br>

        Query parameter or header documentType can be used to specify type of
        document on upload.

        <p>When uploading documents using the /loas resource, you must specify
        the MIME type of the document being upload using the Content-Type HTTP
        header.</p>

        <p>The LOA document must be uploaded using one of the following MIME
        types:</p>

        <ul>

        <li>application/pdf</li>

        <li>text/plain</li>

        <li>image/jpeg</li>

        <li>image/png</li>

        <li>image/tiff</li>

        <li>text/csv</li>

        <li>application/vnd.ms-excel</li>

        <li>application/vnd.openxmlformats-officedocument.spreadsheetml.sheet</li>

        <li>application/msword</li>

        <li>application/vnd.openxmlformats-officedocument.wordprocessingml.document</li>

        </ul>
      operationId: createImportMessagingPhoneNumberOrderLoas
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
        - $ref: '#/components/parameters/documentTypeQueryParam'
      requestBody:
        $ref: >-
          #/components/requestBodies/postImportMessagingPhoneNumberOrdersLoasRequest
      responses:
        '201':
          $ref: >-
            #/components/responses/postImportMessagingPhoneNumberOrdersLoasResponse
      summary: Upload LOA File for Import Phone Number Order [NANP]
      tags:
        - Hosted Messaging
  /accounts/{accountId}/removeImportedPhoneNumberOrders/messaging:
    get:
      tags:
        - Hosted Messaging
      description: >-
        Retrieves the Remove Imported Messaging Tn Orders requests for the given
        account ID.

        A maximum of 1,000 orders can be retrieved per request. If no date range
        or specific query parameter as required is provided, the order results
        will be limited to the last two years.
      summary: List Orders for Removing Hosted Messaging
      operationId: listRemoveImportedTnOrders
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/statusQueryParam'
        - $ref: '#/components/parameters/phoneNumberQueryParam'
        - $ref: '#/components/parameters/customerOrderIdQueryParam'
        - $ref: '#/components/parameters/createdDateFromQueryParam'
        - $ref: '#/components/parameters/createdDateToQueryParam'
        - $ref: '#/components/parameters/removeImportedModifiedDateFromQueryParam'
        - $ref: '#/components/parameters/removeImportedModifiedDateToQueryParam'
      responses:
        '200':
          $ref: >-
            #/components/responses/getRemoveImportedMessagingPhoneNumberOrdersResponse
    post:
      tags:
        - Hosted Messaging
      description: >
        Create an order to remove imported phone numbers for messaging from the
        given account ID. An optional customer ID can be provided in the request
        body to track the order. A successfully submitted order will have a
        status of "PROCESSING". A successfully completed order will have a
        status of "COMPLETE" if all of the phone numbers were successfully
        removed and  "PARTIAL" if some of the phone numbers were removed. A
        failed order will have a status of "FAILED" and no phone numbers would
        have been removed.
      summary: Create Order to Remove Hosted Messaging
      operationId: createRemoveImportedPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/postRemoveImportedPhoneNumberOrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/postRemoveImportedMessagingTnOrdersResponse'
        '400':
          $ref: >-
            #/components/responses/postRemoveImportedMessagingTnOrders400ErrorResponse
  /accounts/{accountId}/removeImportedPhoneNumberOrders/messaging/{orderId}:
    get:
      tags:
        - Hosted Messaging
      description: Retrieve an order to remove hosted messaging from a phone number by ID
      summary: Get Order to Remove Hosted Messaging
      operationId: retrieveRemoveImportedPhoneNumberOrder
      parameters:
        - $ref: '#/components/parameters/accountIdPathParam'
        - $ref: '#/components/parameters/orderIdPathParam'
      responses:
        '200':
          $ref: >-
            #/components/responses/getRemoveImportedMessagingPhoneNumberOrderResponse
        '400':
          $ref: >-
            #/components/responses/getRemoveImportedMessagingPhoneNumberOrder400ErrorResponse
components:
  securitySchemes:
    Basic:
      type: http
      scheme: basic
      description: >-
        Basic authentication is a simple authentication scheme built into the
        HTTP protocol. To use it, send your HTTP requests with an Authorization
        header that contains the word Basic followed by a space and a
        base64-encoded string `username:password`.

        Example: `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=`
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer authentication (also called token authentication) is an HTTP
        authentication scheme that involves security 

        tokens called bearer tokens. The name “Bearer authentication” can be
        understood as “give access to the bearer

        of this token.” The client must send this token in the `Authorization`
        header when making requests to

        protected resources.


        - Example: `Authorization: Bearer <token>`


        Where `<token>` should be replaced with the token string without angle
        brackets.


        For more information, see the following guide:
        [Credentials](https://dev.bandwidth.com/docs/account/credentials/management)
  schemas:
    addressXml:
      type: object
      properties:
        HousePrefix:
          description: >-
            The HousePrefix is the non-numeric address number prefix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        HouseNumber:
          description: >-
            The HouseNumber is the street address number of the ServiceAddress.
            HouseNumber is mandatory for port-in orders in which the
            ServiceAddress is mandatory.
          type: string
        HouseSuffix:
          description: >-
            The HouseSuffix is the non-numeric address number suffix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        PreDirectional:
          description: >-
            The PreDirectional is the non-numeric street name prefix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        StreetName:
          description: >-
            The StreetName is mandatory in cases where the ServiceAddress is
            mandatory.
          type: string
        StreetSuffix:
          description: >-
            The StreetSuffix is the street suffix of the ServiceAddress. This
            element is optional when not needed to fully specify the
            ServiceAddress.
          type: string
        PostDirectional:
          description: >-
            The PostDirectional is the street name post directional of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        AddressLine2:
          description: >-
            AddressLine2 is used to specify Unit, Suite, Floor, etc. in the
            Service Address. AddressLine2 is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        City:
          description: City is mandatory in cases where the ServiceAddress is mandatory.
          type: string
        StateCode:
          description: >-
            StateCode is the 2-letter abbreviation of the state of the
            ServiceAddress. StateCode is mandatory in cases where the
            ServiceAddress is mandatory.
          type: string
        Zip:
          description: >-
            Zip is the Zip Code of the ServiceAddress. Zip is mandatory in cases
            where the ServiceAddress is mandatory.
          type: string
        PlusFour:
          description: >-
            PlusFour is the 4 digits that are sometimes suffixed to the Zip
            Code.
          type: string
        County:
          description: The county where the subscriber or business is located.
          type: string
        Country:
          description: >-
            Country is the country of the ServiceAddress. This value will be
            derived from the StateCode, so it should generally be omitted.
          type: string
        ResetAddressFields:
          type: boolean
        Latitude:
          type: string
        Longitude:
          type: string
        AddressType:
          $ref: '#/components/schemas/addressTypeXml'
    address:
      properties:
        addressLine2:
          description: >-
            AddressLine2 is used to specify Unit, Suite, Floor, etc. in the
            Service Address. AddressLine2 is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        addressType:
          $ref: '#/components/schemas/addressType'
        city:
          description: City is mandatory in cases where the ServiceAddress is mandatory.
          type: string
        country:
          description: >-
            Country is the country of the ServiceAddress. This value will be
            derived from the StateCode, so it should generally be omitted.
          type: string
        county:
          description: The county where the subscriber or business is located.
          type: string
        houseNumber:
          description: >-
            The HouseNumber is the street address number of the ServiceAddress.
            HouseNumber is mandatory for port-in orders in which the
            ServiceAddress is mandatory.
          type: string
        housePrefix:
          description: >-
            The HousePrefix is the non-numeric address number prefix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        houseSuffix:
          description: >-
            The HouseSuffix is the non-numeric address number suffix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        latitude:
          type: string
        longitude:
          type: string
        plusFour:
          description: >-
            PlusFour is the 4 digits that are sometimes suffixed to the Zip
            Code.
          type: string
        postDirectional:
          description: >-
            The PostDirectional is the street name post directional of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        preDirectional:
          description: >-
            The PreDirectional is the non-numeric street name prefix of the
            ServiceAddress. This element is optional when not needed to fully
            specify the ServiceAddress.
          type: string
        resetAddressFields:
          type: boolean
        stateCode:
          description: >-
            StateCode is the 2-letter abbreviation of the state of the
            ServiceAddress. StateCode is mandatory in cases where the
            ServiceAddress is mandatory.
          type: string
        streetName:
          description: >-
            The StreetName is mandatory in cases where the ServiceAddress is
            mandatory.
          type: string
        streetSuffix:
          description: >-
            The StreetSuffix is the street suffix of the ServiceAddress. This
            element is optional when not needed to fully specify the
            ServiceAddress.
          type: string
        zip:
          description: >-
            Zip is the Zip Code of the ServiceAddress. Zip is mandatory in cases
            where the ServiceAddress is mandatory.
          type: string
      type: object
    addressTypeXml:
      type: string
      enum:
        - SERVICE
        - BILLING
        - DLDA
        - E911
    addressType:
      enum:
        - SERVICE
        - BILLING
        - DLDA
        - E911
      type: string
    error:
      title: Error
      type: object
      properties:
        phoneNumbers:
          description: List of telephone numbers related to the error
          type: array
          items:
            $ref: '#/components/schemas/phoneNumber'
        code:
          description: A numeric code representing the specific error
          type: integer
        description:
          description: Details about the error
          type: string
    errorXml:
      title: Error
      type: object
      properties:
        TelephoneNumbers:
          description: List of telephone numbers related to the error
          type: array
          items:
            $ref: '#/components/schemas/telephoneNumber'
        Code:
          description: A numeric code representing the specific error
          type: integer
        Description:
          description: Details about the error
          type: string
    fileData:
      properties:
        fileMetaData:
          $ref: '#/components/schemas/fileMetaData'
        fileName:
          description: The name that was associated with the file when it was uploaded.
          type: string
      type: object
    fileDataXml:
      description: Optional metadata associated with the file that was uploaded.
      properties:
        FileMetaData:
          $ref: '#/components/schemas/fileMetaDataXml'
        FileName:
          description: The name that was associated with the file when it was uploaded.
          type: string
      type: object
    fileListResponse:
      properties:
        fileCount:
          description: Total count of files in response.
          type: integer
        fileData:
          description: Optional metadata associated with the file that was uploaded.
          items:
            $ref: '#/components/schemas/fileData'
          type: array
        resultCode:
          description: Result code of fetching the list of files from AWS.
          type: integer
        resultMessage:
          description: Results of the attempt to fetch the list of files.
          type: string
      type: object
    fileListResponseXml:
      properties:
        fileListResponse:
          properties:
            fileCount:
              description: Total count of files in response.
              type: integer
            fileData:
              $ref: '#/components/schemas/fileDataXml'
            resultCode:
              description: Result code of fetching the list of files from AWS.
              type: integer
            resultMessage:
              description: Results of the attempt to fetch the list of files.
              type: string
          type: object
      type: object
    fileMetaData:
      properties:
        documentName:
          description: Name of particular document.
          type: string
        documentType:
          description: Enum of possible file type.
          enum:
            - LOA
            - INVOICE
            - CSR
            - OTHER
          type: string
      type: object
    fileMetaDataXml:
      properties:
        DocumentName:
          description: Name of particular document.
          type: string
        DocumentType:
          description: Enum of possible file type.
          enum:
            - LOA
            - INVOICE
            - CSR
            - OTHER
          type: string
      type: object
    fileUploadResponse:
      properties:
        fileName:
          description: >-
            The (optional) name that was associated with the file when it was
            uploaded.
          type: string
        resultCode:
          description: Result code of fetching the list of files from AWS.
          type: integer
        resultMessage:
          description: Results of the attempt to fetch the list of files.
          type: string
      type: object
    fileUploadResponseXml:
      properties:
        FileUploadResponse:
          properties:
            fileName:
              description: >-
                The (optional) name that was associated with the file when it
                was uploaded.
              type: integer
            resultCode:
              description: Result code of fetching the list of files from AWS.
              type: integer
            resultMessage:
              description: Results of the attempt to fetch the list of files.
              type: string
          type: object
      type: object
    getImportPhoneNumberLoasErrorResponse:
      properties:
        code:
          description: The Bandwidth-defined error code.
          type: integer
          example: 7200
        description:
          description: A description of the error.
          type: string
          example: The order ID was not found
      type: object
    getImportPhoneNumberLoasErrorResponseXml:
      properties:
        ErrorResponse:
          properties:
            irisStatus:
              properties:
                Code:
                  description: The Bandwidth-defined error code.
                  type: integer
                  example: 7200
                Description:
                  description: A description of the error.
                  type: string
                  example: The order ID was not found
              type: object
          type: object
      type: object
    importPhoneNumberOrder:
      type: object
      properties:
        customerOrderId:
          description: >-
            Optional customer-defined reference ID for this order. Only
            alphanumeric values, dashes and spaces are allowed. Max length is
            255 characters. Not unique — Bandwidth applies no uniqueness
            constraint, so multiple orders may share the same value. Each order
            receives its own unique Bandwidth-assigned `orderId`.
          type: string
          example: CustomerOrderId
        phoneNumberCount:
          description: The count of phone numbers in the order.
          type: integer
          example: 2
        orderId:
          description: >-
            The unique identifier string created by Bandwidth to refer to the
            order.
          type: string
          example: 8dc32f09-2329-4c73-b702-526f46b02712
        orderType:
          description: >-
            The type of order. For import phone number orders, this will always
            be import_tn_orders.
          type: string
          enum:
            - import_tn_orders
        orderDate:
          description: The date and time the order was created.
          type: string
          example: '2025-04-22T20:24:11Z'
        accountId:
          description: The account ID the order is associated with.
          type: integer
          example: 14
        userId:
          description: The ID of the user that created the order.
          type: string
          example: systemUser
        lastModifiedDate:
          description: The date and time the order was last modified.
          type: string
          example: '2025-04-22T20:24:11Z'
        orderStatus:
          type: string
          enum:
            - RECEIVED
            - PROCESSING
            - COMPLETE
            - PARTIAL
            - FAILED
    importPhoneNumberOrdersRequest:
      title: ImportTnOrder
      required:
        - phoneNumbers
        - subAccountId
      properties:
        phoneNumbers:
          description: List of telephone numbers to be moved
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/phoneNumber'
        subAccountId:
          description: A sub account ID to which telephone number will be moved
          type: integer
        customerOrderId:
          description: >-
            Optional customer-defined reference ID for this order. Only
            alphanumeric values, dashes and spaces are allowed. Max length is 40
            characters. Not unique — Bandwidth applies no uniqueness constraint,
            so multiple orders may share the same value. Each order receives its
            own unique Bandwidth-assigned `orderId`.
          type: string
        locationId:
          description: >-
            A location ID of provided site to which telephone number will be
            moved
          type: integer
        subscriber:
          description: Subscriber information.
          properties:
            name:
              description: Subscriber business / customer name.
              maxLength: 45
              type: string
            serviceAddress:
              description: address
              properties:
                houseNumber:
                  description: Street address number.
                  type: integer
                streetName:
                  description: Street name.
                  type: string
                city:
                  description: City.
                  type: string
                stateCode:
                  description: Two letter state code.
                  type: string
                zip:
                  description: Zip code.
                  type: string
        loaAuthorizingPerson:
          description: First and last name of person who authorized LOA.
          type: string
        loaType:
          description: Identify the LoaType on TNs.
          type: string
          enum:
            - SUBSCRIBER
            - CARRIER
          default: SUBSCRIBER
    importPhoneNumberOrdersErrorResponse:
      type: object
      properties:
        errorCode:
          description: The Bandwidth-defined error code.
          type: integer
          example: 12512
        description:
          description: A description of the error.
          type: string
          example: Telephone number '"xxxx"' is not valid
    importPhoneNumberOrdersErrorResponseXml:
      type: object
      properties:
        ImportTnOrdersReportResponse:
          $ref: '#/components/schemas/responseStatus'
    importPhoneNumberOrdersResponse:
      type: object
      properties:
        customerOrderId:
          type: string
          description: >-
            The customer-defined reference ID for this order, if one was
            provided at creation. Not unique — Bandwidth applies no uniqueness
            constraint, so multiple orders may share the same value. Each order
            has a distinct Bandwidth-assigned `orderId`.
        orderCreateDate:
          type: string
        accountId:
          type: integer
        createdByUser:
          type: string
        lastModifiedDate:
          type: string
        subAccountId:
          type: integer
        locationId:
          type: integer
        phoneNumbers:
          type: array
          items:
            $ref: '#/components/schemas/phoneNumber'
        loaAuthorizingPerson:
          type: string
        loaType:
          type: string
          enum:
            - CARRIER
            - SUBSCRIBER
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/warning'
        subscriber:
          $ref: '#/components/schemas/importPhoneNumberSubscriber'
        processingStatus:
          description: >-
            Status of the Hosted Messaging Order request.


            RECEIVED - Order has been received without errors and will be
            processed through further validation.


            PROCESSING - The order has passed initial validation and is now
            being processed.Order will remain in processing status if any of the
            requested telphone numbers remain pending processing.


            COMPLETE - This implies that this order has been successfully
            processed and hosted messaging has been enabled on all requested
            telephone numbers.


            PARTIAL - This implies that this order has been successfully
            processed and hosted messaging was enabled on all except few of the
            numbers, reasons for same can be found in  Warning section.


            FAILED - This implies that this order has been failed. None of the
            telphone numbers requested were enabled for hosted messaging,
            reasons for same can be found in Errors and Warning section.
          type: string
          enum:
            - RECEIVED
            - PROCESSING
            - COMPLETE
            - PARTIAL
            - FAILED
        errors:
          type: array
          items:
            $ref: '#/components/schemas/error'
        pendingTelephoneNumbers:
          description: List of phone numbers that are pending processing.
          type: array
          items:
            $ref: '#/components/schemas/phoneNumber'
        failedTelephoneNumbers:
          description: >-
            List of phone numbers that failed processing, with reasons detailed
            in the Warning section.
          type: array
          items:
            $ref: '#/components/schemas/phoneNumber'
        successTelephoneNumbers:
          description: List of phone numbers successfully processed.
          type: array
          items:
            $ref: '#/components/schemas/phoneNumber'
